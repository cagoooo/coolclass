<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Fraunces:opsz,ital,wght@9..144,1,500;9..144,1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="crayon.css">
<style>
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap;
    font-size: 13px; color: var(--ink);
    margin-bottom: 14px;
  }
  .legend-item { display: inline-flex; align-items: center; gap: 6px; }
  .legend-chip {
    width: 26px; height: 26px;
    border: 2px solid var(--ink);
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 900;
    font-size: 13px;
  }

  /* 表格容器 */
  .sheet-wrap {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: var(--rad-lg);
    padding: 22px;
    box-shadow: var(--shadow);
    overflow-x: auto;
  }
  .sheet-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
  }
  .sheet-title {
    font-size: 20px;
    font-weight: 900;
    color: var(--ink);
  }
  .sheet-stats {
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  table.sheet {
    border-collapse: collapse;
    width: 100%;
    font-size: 14px;
    table-layout: fixed;
  }
  table.sheet th, table.sheet td {
    border: 2px solid var(--ink);
    padding: 4px 2px;
    text-align: center;
    height: 38px;
  }
  table.sheet thead th {
    background: var(--ink);
    color: var(--paper);
    font-weight: 900;
    position: sticky; top: 0;
    z-index: 1;
  }
  table.sheet thead th.weekend { background: var(--r); color: #fff; }
  table.sheet thead th.sunday  { background: var(--r); color: #fff; }
  table.sheet thead .wkday { font-size: 11px; font-weight: 500; opacity: .85; }

  table.sheet tbody th {
    background: var(--y);
    font-weight: 900;
    width: 100px;
    color: var(--ink);
    font-size: 13px;
  }
  table.sheet tbody th .stu-num {
    display: inline-block;
    background: var(--ink); color: var(--y);
    border-radius: 999px;
    padding: 2px 10px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 900;
    font-size: 12px;
  }
  table.sheet tbody th .stu-name {
    display: block;
    font-weight: 700;
    font-size: 12px;
    color: var(--ink);
    margin-top: 2px;
  }

  table.sheet td.weekend-cell { background: #fde4e4; cursor: default; }
  table.sheet td.weekend-cell .mark { color: #c0a0a0; }
  table.sheet td {
    cursor: pointer;
    transition: background .15s;
    background: #fff;
  }
  table.sheet td:not(.weekend-cell):hover { background: var(--y); }
  table.sheet td .mark {
    display: inline-block;
    min-width: 24px; min-height: 24px;
    line-height: 24px;
    border-radius: 6px;
    font-weight: 900;
    font-size: 14px;
  }
  .m-present .mark { color: var(--g); font-size: 18px; }
  .m-late    .mark { background: var(--y);     color: var(--ink); }
  .m-leave   .mark { background: var(--p);     color: #fff; }
  .m-absent  .mark { background: var(--r);     color: #fff; }
  .m-empty   .mark { color: #d0c8e0; }

  /* 標示選擇彈窗 */
  .picker {
    position: fixed;
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 14px;
    padding: 8px;
    box-shadow: 5px 5px 0 var(--ink);
    display: none; gap: 6px;
    z-index: 200;
    flex-direction: row;
  }
  .picker.show { display: flex; }
  .picker button {
    width: 44px; height: 44px;
    border: 2px solid var(--ink);
    border-radius: 8px;
    cursor: pointer;
    font-weight: 900;
    font-size: 18px;
    font-family: inherit;
  }
  .picker button:hover { transform: scale(1.08); }
  .pk-present { background: var(--g); color: #1a3e22; }
  .pk-late    { background: var(--y); color: var(--ink); }
  .pk-leave   { background: var(--p); color: #fff; }
  .pk-absent  { background: var(--r); color: #fff; }
  .pk-clear   { background: #fff; color: var(--ink); }

  /* 工具列 */
  .top-toolbar {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: var(--rad-lg);
    padding: 18px 22px;
    box-shadow: var(--shadow);
    margin-bottom: 22px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 14px;
    align-items: end;
  }
  @media (max-width: 720px) {
    .top-toolbar { grid-template-columns: 1fr; }
  }
  .tb-field label {
    display: block; font-size: 12px; font-weight: 700;
    color: var(--muted); margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .tb-field input {
    width: 100%;
    padding: 10px 14px;
    border: 3px solid var(--ink);
    border-radius: var(--rad-sm);
    font-size: 15px;
    font-family: inherit;
    background: #fff;
    font-weight: 700;
    color: var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .tb-field input[readonly] {
    background: var(--paper-2);
    cursor: not-allowed;
  }
  .tb-field input:focus { outline: none; background: var(--y); }

  @media print {
    body { background: #fff !important; }
    .home-btn, .top-toolbar, .btn-bar, .page-hero, .legend,
    .sheet-stats, footer.f, .bg-deco { display: none !important; }
    .sheet-wrap { box-shadow: none; padding: 0; margin: 0; border: none; }
    table.sheet { font-size: 11px; }
    table.sheet th, table.sheet td { height: 24px; padding: 2px; border-color: #888; }
    @page { size: A4 landscape; margin: 12mm 10mm; }
  }

  /* ========== v3.2 RWD ========== */
  @media (max-width: 600px) {
    /* 工具列：欄位堆疊 */
    .toolbar { grid-template-columns: 1fr !important; gap: 10px !important; padding: 14px; }
    .field label { font-size: 12px; }
    .field input { padding: 8px 10px; font-size: 14px; }
    .btn-group { gap: 6px; flex-wrap: wrap; }
    .btn-group .btn { padding: 8px 12px; font-size: 12px; flex: 1 1 auto; min-width: 0; }

    /* 表格區：保持橫滑可用 + sticky 第一欄 */
    .sheet-wrap { padding: 14px; border-radius: var(--rad); box-shadow: 4px 4px 0 var(--ink) !important; }
    .sheet-head { flex-direction: column; align-items: flex-start; gap: 6px; }
    .sheet-title { font-size: 16px; }
    .sheet-stats { font-size: 12px; }

    table.sheet { font-size: 11px; }
    table.sheet th, table.sheet td { padding: 3px 1px; height: 28px; }
    table.sheet tbody th { width: 64px; }
    table.sheet tbody th .stu-num { font-size: 10px; padding: 1px 6px; }
    table.sheet tbody th .stu-name { font-size: 11px; }
    table.sheet .mark { font-size: 11px; min-width: 16px; min-height: 16px; line-height: 18px; }

    /* 黏住第一欄（座號 + 姓名），讓使用者橫滑時仍能對應 */
    table.sheet tbody th { position: sticky; left: 0; z-index: 1; }
    table.sheet thead th:first-child { position: sticky; left: 0; z-index: 2; }

    .legend { font-size: 12px; gap: 8px; padding: 0 8px; }
  }
  @media (max-width: 380px) {
    table.sheet { font-size: 10px; }
    table.sheet tbody th { width: 56px; }
    table.sheet tbody th .stu-name { font-size: 10px; }
  }
</style>
<script src="tweaks.js"></script>
</head>
<body>

<div class="bg-deco" aria-hidden="true">
  <span class="blob blob-b"></span>
  <span class="blob blob-y"></span>
  <span class="dots dots-2"></span>
</div>

<a class="home-btn" href="index.html">← 回主頁</a>

<div class="wrap wide">

  <section class="page-hero">
    <div>
      <span class="eyebrow">ATTENDANCE · 月度</span>
      <h1>每天點一下，<br>月底<em>直接匯出</em>給教務處。</h1>
      <p class="sub">
        <b>✓ 出席　遲 遲到　假 請假　✕ 缺席</b>　·　點格子循環切換，長按 / 右鍵叫出選單。週末會自動跳過。
      </p>
    </div>
    <div class="right-aux">
      <span class="big" id="heroMonth">5</span>
      <span class="sml">月份 · <span id="heroYear">2026</span></span>
    </div>
  </section>

  <!-- 工具列 -->
  <div class="top-toolbar">
    <div class="tb-field">
      <label>📚 班級名稱（共用名單）</label>
      <input type="text" id="className" readonly placeholder="（請到「班級名單」設定）">
    </div>
    <div class="tb-field">
      <label>👥 學生人數（共用名單）</label>
      <input type="number" id="studentCount" min="1" max="60" value="30" readonly>
    </div>
    <div class="tb-field">
      <label>📅 月份</label>
      <input type="month" id="monthPick">
    </div>
    <div class="tb-field">
      <button class="btn primary lg" onclick="apply()">🔍 載入</button>
    </div>
  </div>

  <div class="btn-bar" style="margin-bottom: 18px;">
    <a class="btn" href="roster.html">👥 編輯班級名單</a>
    <button class="btn y" onclick="window.print()">🖨️ 列印 / 存 PDF</button>
    <button class="btn b" onclick="exportCSV()">📊 匯出 CSV</button>
    <button class="btn p" onclick="exportJSON()">📤 匯出 JSON</button>
    <button class="btn r" onclick="resetMonth()" style="margin-left:auto;">🔄 清空此月</button>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="legend-chip" style="background:var(--g);color:#1a3e22;">✓</span>出席</span>
    <span class="legend-item"><span class="legend-chip" style="background:var(--y);">遲</span>遲到</span>
    <span class="legend-item"><span class="legend-chip" style="background:var(--p);color:#fff;">假</span>請假</span>
    <span class="legend-item"><span class="legend-chip" style="background:var(--r);color:#fff;">✕</span>缺席</span>
    <span class="legend-item" style="color:var(--muted);">　空白＝週末／未填　|　點格子可循環切換，長按出選單</span>
  </div>

  <div class="sheet-wrap">
    <div class="sheet-head">
      <div class="sheet-title" id="sheetTitle">請選擇月份後按「載入」</div>
      <div class="sheet-stats" id="sheetStats"></div>
    </div>
    <table class="sheet" id="sheetTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="picker" id="picker">
    <button class="pk-present" data-mark="present" title="出席">✓</button>
    <button class="pk-late"    data-mark="late"    title="遲到">遲</button>
    <button class="pk-leave"   data-mark="leave"   title="請假">假</button>
    <button class="pk-absent"  data-mark="absent"  title="缺席">✕</button>
    <button class="pk-clear"   data-mark="empty"   title="清除">⌫</button>
  </div>

  <footer class="f">
    Made with ♥ by <a href="https://www.smes.tyc.edu.tw/modules/tadnews/page.php?ncsn=11&nsn=16#a5" target="_blank" rel="noopener">阿凱老師</a> · 桃園市龍潭區石門國民小學
    <div class="ver">© 2026 · v3 “Crayon Pop”</div>
  </footer>
</div>

<div class="toast" id="toast">已存檔</div>

<script src="roster.js"></script>
<script src="sw-update.js" defer></script>
<script src="nav.js" defer></script>
<script>
if (!window.AkaiRoster) {
  const KEY = 'akai_roster_v1';
  window.AkaiRoster = {
    load() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) return { className: '', count: 30, names: {} };
        const o = JSON.parse(raw);
        return { className: o.className || '', count: parseInt(o.count) || 30, names: o.names || {} };
      } catch { return { className: '', count: 30, names: {} }; }
    },
    getName(n) { return this.load().names[String(n)] || ''; }
  };
}
</script>

<script src="attendance.js"></script>
</body>
</html>
