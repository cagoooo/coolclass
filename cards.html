  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {

    border-radius: 32px;

  .card-back {

    color: #fff;

    font-size: 28px;
    text-shadow: 2px 2px 0 rgba(0,0,0,.1);
    letter-spacing: 4px;
  }
  .card-back .sub-hint {
    color: rgba(255,255,255,.85); margin-top: 6px; font-size: 14px;
    letter-spacing: 2px;
  }

  .card-front {
    background:
      radial-gradient(circle at 50% 10%, rgba(255,255,255,.7), transparent 60%),
      linear-gradient(180deg, var(--c1, #ffd1dc) 0%, var(--c2, #c5e3f6) 100%);
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,.15);
    text-align: center;
  }
  .card-front .keyword {
    font-size: 18px; font-weight: 700; letter-spacing: 8px;
    margin-bottom: 6px; opacity: .9;
  }
  .card-front .category {
    font-size: 12px; letter-spacing: 4px;
    background: rgba(255,255,255,.3);
    display: inline-block;
    padding: 4px 14px;
    border-radius: 999px;
    margin-bottom: 18px;
    backdrop-filter: blur(4px);
  }
  .card-front .quote {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(20px, 4vw, 28px);
    font-weight: 700;
    line-height: 1.7;
    padding: 10px 4px;
    text-align: center;
  }
  .card-front .tail {

<script>
// 三句指定固定句（c=fixed）
const FIXED = [
  { quote: '遇到再怎麼難過的事，也要說對的話。',           keyword: '溫柔', cat: 'fixed' },
  { quote: '沒有壞的孩子，只有氣餒的孩子。',               keyword: '理解', cat: 'fixed' },
  { quote: '用我的穩定面對孩子的不穩定。',                   keyword: '穩定', cat: 'fixed' },
];

const CATS = {
  fixed:    { label: '阿凱心錨',   c1: '#ffd1dc', c2: '#ffe5b8', kwPool: ['溫柔','理解','穩定','信念','陪伴'] },
  steady:   { label: '心態安定',   c1: '#c5e3f6', c2: '#a8d4ec', kwPool: ['平靜','穩定','安心','沉著','清明','澄澈','安住','從容','寧靜','安然'] },
  child:    { label: '陪伴孩子',   c1: '#ffe5b8', c2: '#ffc890', kwPool: ['理解','傾聽','耐心','陪伴','看見','回應','溫柔','支持','鼓勵','同行'] },
  self:     { label: '自我鼓勵',   c1: '#c8f0d0', c2: '#a8d8b0', kwPool: ['勇氣','成長','善待','信任','前進','值得','堅持','溫暖','希望','力量'] },
  belief:   { label: '教育信念',   c1: '#e2d3f4', c2: '#c8b0e4', kwPool: ['信念','陪伴','溫柔','可能','差異','力量','灌溉','示範','看見','學習'] },
  healing:  { label: '溫柔療癒',   c1: '#ffd1e8', c2: '#ffb8d4', kwPool: ['療癒','溫柔','安然','輕盈','照亮','希望','慢活','寧靜','溫暖','安放'] },
};

// 一、心態安定款
const STEADY = [

  '用心態去戰勝心情，用穩定去陪伴世界。',
  '保持一顆不被情緒、雜務干擾的心，是教師的溫柔底氣。',

  '今天的風再大，我也能選擇穩穩站好。',
  '我不必完美，只要願意再向前一步。',
  '安靜一下，力量就會回來。',
  '我選擇用平靜迎接挑戰，而不是用焦慮迎接今天。',
  '心慢下來，世界就不那麼急了。',
  '我能決定今天的節奏。',
  '我可以為自己按下暫停，再重新呼吸。',
  '我的情緒不需要被壓抑，只需要被看見。',
  '我真正需要的，只是一點點內心的空白。',
  '我給自己一個微笑，事情就會變得不一樣。',
  '心安定，孩子才安定。',
  '坐穩自己的椅子，再陪孩子走路。',
  '我願意用理解化開心裡的結。',
  '讓自己更柔軟，而不是更堅硬。',
  '溫柔是一種選擇，也是一種力量。',
  '平靜是一種能力，而我正在練習它。',
];

// 二、陪伴孩子款
const CHILD = [
  '孩子的混亂不是故意，是他在尋找方法。',
  '我願意在孩子的低谷裡，成為那盞不滅的小燈。',
  '孩子的每一句抱怨，都藏著一個需要。',
  '他不是不懂事，他只是不會表達。',
  '今天的叛逆，是明天的探索力。',
  '我站在孩子的立場想一想，就看見更多了。',
  '我願意為孩子提供情緒的緩衝區，而不是放大器。',
  '孩子的委屈值得被聽見，而不是被否定。',
  '鼓勵是一種陪伴，不是讚美的替代品。',
  '孩子跌倒的瞬間，教師先蹲下，而不是先糾正。',
  '他的哭鬧，是在說「我很需要你」。',
  '孩子的眼淚不是麻煩，是理解的入口。',
  '孩子不是難帶，他只是需要更多的安全感。',
  '我願意為孩子示範：失敗不等於結束。',
  '我說的每句話，都能成為孩子的力量來源。',
  '孩子的慢，是在用自己的節奏成長。',
  '需要被理解的，可能不是行為，而是背後的心。',
  '幫孩子找到方法，比責備來得有效。',
  '每個孩子都值得再一次機會。',
  '我先穩，孩子才會慢慢穩。',
];

// 三、教師自我鼓勵款
const SELF = [
  '我正在成為更好的自己，不需要急。',
  '今天的我，已經比昨天更靠近理想一點。',
  '我的努力不會白費，只是需要時間。',
  '我可以選擇善待自己，而不是苛責自己。',
  '我值得被理解，也值得休息。',
  '我是一位正在進步的老師，不是完美的老師。',
  '保持學習，就是最美的示範。',
  '每一次堅持，都是一種力量。',
  '我能做到的，比我以為的更多。',
  '我不是一個人，我有同行者。',
  '小小的前進，也是一種勝利。',
  '好好照顧自己，是對孩子更深的愛。',
  '我所付出的一切，都在孩子心裡留下痕跡。',
  '我值得為自己喝采。',
  '我願意在忙碌裡找回自己。',
  '我正在慢慢變成我想遇見的那種老師。',
  '我不需要「撐住」，我可以「照顧」自己。',
  '我擁有的比我以為的多。',
  '我願意給自己更多溫柔。',
  '今天的我值得被肯定。',
];

// 四、教育信念款
const BELIEF = [
  '教育是一場看不見終點的旅程，但每一步都有意義。',
  '孩子的成長，不需要急著開花。',
  '我相信孩子，也相信自己的引導。',
  '每堂課都是重新開始的機會。',
  '我不只裝備知識，我在陪孩子成為自己。',
  '影響孩子的不是教材，而是我的語氣。',
  '鼓勵永遠比比較來得有效。',
  '問對問題，比給對答案更重要。',
  '我希望孩子學會的，是力量，而不是順從。',
  '安全感是所有學習的起點。',
  '教室是孩子成長的練習場，不是評分場。',
  '孩子的差異，是教育的禮物。',
  '每一次回頭看孩子，都讓他更靠近我。',
  '教育不是控制，而是陪伴。',
  '孩子如何看自己，比成績更重要。',
  '我願意用鼓勵點亮孩子的可能。',
  '影響往往悄悄發生，不用急著看見結果。',
  '我選擇相信每個孩子都願意做好。',
  '我把焦點放在孩子的力量，而非孩子的不足。',
  '用溫柔灌溉，孩子就會生長。',
];

// 五、溫柔療癒款
const HEALING = [
  '我值得被安放，而不是被推動。',
  '靜下來，就聽得見自己的需要。',
  '心裡亮一點，世界也亮一點。',
  '今天的陽光很好，也願我的心被照亮。',
  '一點點暖意，就能走很遠。',
  '我把心裡的灰塵拍一拍，重新開始。',
  '難過並不代表我不夠堅強。',
  '我給自己的每一個擁抱，都算數。',
  '我願意把心放軟，而不是放棄。',
  '我正在學習以更輕柔的方式生活。',
  '我的努力值得被自己看見。',
  '心被照顧了，力量自然生長。',
  '雨過後的彩虹，是給有耐心的人。',
  '每一天都能重新開始一次。',
  '人生不必快，但要穩穩地走。',
  '我讓自己慢下來，世界也變得溫柔。',
  '心裡有希望，就不會迷路。',
  '我願意為自己點一盞燈。',
  '世界可能很吵，但我可以很安靜。',
  '我值得在自己的生命裡，被溫柔地對待。',
];

// 組成完整卡庫
function buildDeck() {
  const deck = [];
  FIXED.forEach(c => deck.push({ ...c }));
  const push = (arr, catKey) => arr.forEach((q, i) => {
    const pool = CATS[catKey].kwPool;
    deck.push({ quote: q, keyword: pool[i % pool.length], cat: catKey });
  });
  push(STEADY, 'steady');
  push(CHILD,  'child');
  push(SELF,   'self');
  push(BELIEF, 'belief');
  push(HEALING,'healing');
  return deck;
}
const DECK = buildDeck();

const STORAGE_KEY = 'akai_cards_v1';
let favs = loadFavs();
let currentFilter = 'all';
let currentCard = null;
let flipped = false;

function loadFavs() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveFavs() { localStorage.setItem(STORAGE_KEY, JSON.stringify(favs)); }

function renderFilters() {
  const el = document.getElementById('filters');
  const cats = [['all','🌈 全部'], ...Object.entries(CATS).map(([k,v]) => [k, v.label])];
  el.innerHTML = '';
  cats.forEach(([key, label]) => {
    const b = document.createElement('button');
    b.className = 'filter-btn' + (currentFilter === key ? ' on' : '');
    b.textContent = label;
    b.onclick = () => { currentFilter = key; renderFilters(); };
    el.appendChild(b);
  });
}

function pickRandom() {
  const pool = currentFilter === 'all' ? DECK : DECK.filter(d => d.cat === currentFilter);
  if (pool.length === 0) return null;
  // 避免連續抽到同一張
  let pick;
  let tries = 0;
  do {
    pick = pool[Math.floor(Math.random() * pool.length)];
    tries++;
  } while (currentCard && pick.quote === currentCard.quote && tries < 10);
  return pick;
}

function drawCard() {
  const next = pickRandom();
  if (!next) return;
  // 翻回卡背 → 換內容 → 翻面
  const inner = document.getElementById('cardInner');
  if (flipped) {
    inner.classList.remove('flipped');
    setTimeout(() => {
      currentCard = next;
      paintCard();
      inner.classList.add('flipped');
      flipped = true;
    }, 400);
  } else {
    currentCard = next;
    paintCard();
    inner.classList.add('flipped');
    flipped = true;
  }
  updateFavBtn();
}

function paintCard() {
  if (!currentCard) return;
  const cat = CATS[currentCard.cat];
  const front = document.getElementById('cardFront');
  front.style.setProperty('--c1', cat.c1);
  front.style.setProperty('--c2', cat.c2);
  document.getElementById('keyword').textContent = currentCard.keyword;
  document.getElementById('category').textContent = cat.label;
  document.getElementById('quote').textContent = currentCard.quote;
  document.getElementById('seq').textContent = `No. ${String(DECK.indexOf(currentCard) + 1).padStart(3, '0')}`;
}

function toggleFav() {
  if (!currentCard) return;
  const exists = favs.findIndex(f => f.quote === currentCard.quote);
  if (exists >= 0) {
    favs.splice(exists, 1);
  } else {
    favs.unshift({ ...currentCard, ts: Date.now() });
  }
  saveFavs();
  updateFavBtn();
  renderWall();
}

function updateFavBtn() {
  const btn = document.getElementById('favBtn');
  if (!currentCard) {
    btn.textContent = '🌟 收藏到能量牆';
    btn.classList.remove('saved');
    return;
  }
  const saved = favs.some(f => f.quote === currentCard.quote);
  btn.textContent = saved ? '⭐ 已收藏（再點取消）' : '🌟 收藏到能量牆';
  btn.classList.toggle('saved', saved);
}

function renderWall() {
  const grid = document.getElementById('wallGrid');
  document.getElementById('favCount').textContent = favs.length;
  if (favs.length === 0) {
    grid.innerHTML = '<div class="empty-wall">還沒收藏任何卡片，抽到喜歡的就點「收藏」吧 ✨</div>';
    return;
  }
  grid.innerHTML = '';
  favs.forEach(f => {
    const cat = CATS[f.cat] || CATS.fixed;
    const div = document.createElement('div');
    div.className = 'mini-card';
    div.style.background = `linear-gradient(135deg, ${cat.c1}, ${cat.c2})`;
    div.innerHTML = `
      <button class="mini-del" title="移除">✕</button>
      <div class="mini-keyword">${f.keyword} · ${cat.label}</div>
      <div class="mini-quote">${f.quote}</div>
    `;
    div.querySelector('.mini-del').onclick = () => {
      favs = favs.filter(x => x.quote !== f.quote);
      saveFavs(); renderWall(); updateFavBtn();
    };
    grid.appendChild(div);
  });
}

function clearWall() {
  if (favs.length === 0) return;
  if (!confirm('要清空整面能量牆嗎？')) return;
  favs = [];
  saveFavs();
  renderWall();
  updateFavBtn();
}

// 點卡片也能翻
document.getElementById('cardInner').addEventListener('click', drawCard);
document.getElementById('drawBtn').addEventListener('click', drawCard);
document.getElementById('favBtn').addEventListener('click', toggleFav);

renderFilters();
renderWall();
</script>

</body>
</html>
