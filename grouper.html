<style>
  /* 模式切換 */
  .mode-pick {
    display: flex; gap: 0;
    border: 3px solid var(--ink);
    border-radius: 999px;
    overflow: hidden;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .mode-pick button {
    padding: 9px 18px;
    border: none;
    background: #fff;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    color: var(--ink);
    font-size: 13px;
  }
  .mode-pick button + button { border-left: 3px solid var(--ink); }
  .mode-pick button.on { background: var(--ink); color: var(--paper); }

  .ctrl-row {
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .ctrl-row label { font-weight: 700; color: var(--ink); font-size: 14px; }

  .switch {
    display: inline-flex; align-items: center; gap: 10px;
    cursor: pointer; font-weight: 700; font-size: 14px;
  }
  .switch input { display: none; }
  .switch .knob {
    width: 44px; height: 24px;
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 999px;
    position: relative;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .switch .knob::after {
    content: ''; position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: var(--ink);
    border-radius: 50%;
    transition: transform .2s;
  }
  .switch input:checked + .knob { background: var(--g); }
  .switch input:checked + .knob::after { transform: translateX(20px); }

  /* 分組卡片 */
  .groups {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
  }
  .group-card {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: var(--rad-lg);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    animation: slideUp .4s cubic-bezier(.34,1.56,.64,1) backwards;
    position: relative;
  }
  @keyframes slideUp {
    from { transform: translateY(20px) scale(.9); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  .group-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 3px dashed var(--ink);
  }
  .group-head .num-tag {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--g-color, var(--y));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 900;
    font-size: 22px;
    flex-shrink: 0;
  }
  .group-head .title {
    font-weight: 900;
    font-size: 20px;
    line-height: 1.2;
  }
  .group-head .title small {
    display: block;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .members {
    display: flex; flex-direction: column; gap: 8px;
  }
  .member {
    background: var(--g-bg, var(--y));
    color: var(--ink);
    border: 2px solid var(--ink);
    border-radius: var(--rad-sm);
    padding: 8px 12px;
    font-size: 15px;
    font-weight: 700;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .member .num {
    background: var(--ink);
    color: var(--g-color, var(--y));
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 12px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 900;
  }
  .member.leader::after {
    content: '👑';
    margin-left: auto;
    font-size: 16px;
  }

  @media print {
    body { background: #fff !important; }
    .home-btn, .block, .btn-bar, .page-hero, footer.f, .bg-deco { display: none !important; }
    .group-card { box-shadow: none !important; break-inside: avoid; animation: none; border-width: 2px; }
    .groups { gap: 8mm; grid-template-columns: repeat(3, 1fr); }
    @page { size: A4; margin: 10mm; }
  }

  /* ========== v3.2 RWD ========== */
  @media (max-width: 600px) {
    .ctrl-row { gap: 8px; flex-wrap: wrap; }
    .ctrl-row label { font-size: 13px; }
    .mode-pick button { padding: 7px 14px; font-size: 12px; }
    .switch { font-size: 12px; }
    .switch .knob { width: 38px; height: 22px; }

    .groups { grid-template-columns: 1fr !important; gap: 12px; }
    .group-card { padding: 14px 16px; border-radius: var(--rad); box-shadow: 4px 4px 0 var(--ink) !important; }
    .group-head { gap: 8px; margin-bottom: 10px; padding-bottom: 8px; }
    .group-head .num-tag { width: 36px; height: 36px; font-size: 18px; }
    .group-head .title { font-size: 17px; }
    .group-head .title small { font-size: 11px; }
    .member { padding: 6px 10px; font-size: 13px; }
    .member.leader::after { font-size: 14px; }

    .btn-bar { gap: 6px; flex-wrap: wrap; }
    .btn-bar .btn { padding: 8px 12px; font-size: 13px; }
  }
</style>

  <span class="blob blob-p"></span>
  <span class="blob blob-y"></span>
  <span class="dots dots-1"></span>
  <span class="squig squig-2"></span>
</div>

<a class="home-btn" href="index.html">← 回主頁</a>

<div class="wrap">

  <section class="page-hero">
    <div>
      <span class="eyebrow">GROUPS · 隨機分組</span>
      <h1>洗牌、<em>分組</em>、印名牌，<br>三秒搞定。</h1>
      <p class="sub">
        <span class="badge" id="classBadge">— · 30 人</span>

    <div class="right-aux">
      <span class="big" id="heroGroups">—</span>
      <span class="sml">組 · 已分</span>

  </section>

  <!-- 設定 -->
  <section class="block">
    <div class="block-head">
      <div class="step">⚙</div>
      <h2>分組設定</h2>
    </div>
    <div class="ctrl-row">
      <label>分組方式：</label>
      <div class="mode-pick" id="modePick">
        <button data-mode="groups" class="on">設定 N 組</button>
        <button data-mode="size">每組 N 人</button>
      </div>
    </div>
    <div class="ctrl-row">
      <label id="paramLabel">組數：</label>
      <input type="number" class="input" id="paramN" min="2" max="30" value="5" style="width:100px;">
      <label class="switch" style="margin-left:8px;">
        <input type="checkbox" id="pickLeader">
        <span class="knob"></span>
        自動選組長 👑
      </label>
    </div>
    <div class="btn-bar" style="border-top:2px dashed var(--ink);padding-top:16px;margin-top:12px;">
      <button class="btn primary lg" onclick="shuffle()">🎲 開始分組！</button>
      <button class="btn b" onclick="copyText()">📋 複製文字版</button>
      <button class="btn y" onclick="window.print()">🖨️ 列印 A4 名牌</button>
      <a class="btn" href="roster.html" style="margin-left:auto;">👥 編輯班級名單</a>
    </div>
  </section>

  <div id="result" class="groups">
    <div class="empty" style="grid-column:1/-1;"><b>還沒分組</b>按上面的「🎲 開始分組！」開始 ✨</div>
  </div>

  <footer class="f">
    Made with ♥ by <a href="https://www.smes.tyc.edu.tw/modules/tadnews/page.php?ncsn=11&nsn=16#a5" target="_blank" rel="noopener">阿凱老師</a> · 桃園市龍潭區石門國民小學
    <div class="ver">© 2026 · v3 “Crayon Pop”</div>
  </footer>
</div>

<div class="toast" id="toast">已複製</div>

<script src="roster.js"></script>
<script src="sw-update.js" defer></script>
<script src="nav.js" defer></script>
<script src="shortcuts.js" defer></script>
<script src="akai-store.js" defer></script>
<script src="empty-state.js" defer></script>
<script>
if (!window.AkaiRoster) {
  const KEY = 'akai_roster_v1';
  window.AkaiRoster = {
    load() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) return { className: '', count: 30, names: {} };
        const o = JSON.parse(raw);
        return { className: o.className || '', count: parseInt(o.count) || 30, names: o.names || {} };
      } catch { return { className: '', count: 30, names: {} }; }
    },
    getName(n) { return this.load().names[String(n)] || ''; }
  };
}
</script>

<script>
const STORAGE_KEY = 'akai_grouper_v1';
const COLORS = [
  { bg: '#ffd6e7', color: '#ff97c5', name: '🌸 粉櫻' },
  { bg: '#ffe1c8', color: '#ff9d4d', name: '🍊 鮮橘' },
  { bg: '#fff4b8', color: '#ffd23f', name: '🌻 暖陽' },
  { bg: '#d4f0c2', color: '#6bcb77', name: '🍃 薄荷' },
  { bg: '#c8e5ff', color: '#4d96ff', name: '💧 海洋' },
  { bg: '#e0cdff', color: '#b070ff', name: '💜 紫羅' },
  { bg: '#ffc8d8', color: '#ff6b6b', name: '🌷 玫紅' },
  { bg: '#b8e0d0', color: '#4ec5d8', name: '🌳 森綠' },
  { bg: '#ffe4a8', color: '#ff9d4d', name: '🍯 蜂蜜' },
  { bg: '#d0d8f0', color: '#5a6dcc', name: '🌌 星空' },
];

let state = loadState();
let groups = [];

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return {
      mode: obj.mode || 'groups',
      paramN: obj.paramN || 5,
      pickLeader: !!obj.pickLeader,
      lastGroups: obj.lastGroups || null,
    };
  } catch { return { mode: 'groups', paramN: 5, pickLeader: false }; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function renderControls() {
  document.querySelectorAll('#modePick button').forEach(b => {
    b.classList.toggle('on', b.dataset.mode === state.mode);
  });
  document.getElementById('paramLabel').textContent = state.mode === 'groups' ? '組數：' : '每組人數：';
  document.getElementById('paramN').value = state.paramN;
  document.getElementById('pickLeader').checked = state.pickLeader;

  const r = AkaiRoster.load();
  const badge = document.getElementById('classBadge');
  badge.textContent = r.className ? `🏫 ${r.className} · ${r.count} 人` : `👥 ${r.count || 30} 人 · 未設定班級`;
}

document.querySelectorAll('#modePick button').forEach(b => {
  b.onclick = () => {
    state.mode = b.dataset.mode;
    saveState();
    renderControls();
  };
});
document.getElementById('paramN').onchange = (e) => {
  state.paramN = parseInt(e.target.value) || 5;
  saveState();
};
document.getElementById('pickLeader').onchange = (e) => {
  state.pickLeader = e.target.checked;
  saveState();
};

function shuffle() {
  const r = AkaiRoster.load();
  const n = r.count || 30;
  const all = [];
  for (let i = 1; i <= n; i++) all.push({ num: i, name: AkaiRoster.getName(i) });

  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }

  let numGroups;
  if (state.mode === 'groups') {
    numGroups = Math.max(1, Math.min(state.paramN, n));
  } else {
    numGroups = Math.max(1, Math.ceil(n / state.paramN));
  }

  groups = Array.from({ length: numGroups }, () => []);
  all.forEach((stu, i) => groups[i % numGroups].push(stu));

  if (state.pickLeader) {
    groups.forEach(g => { if (g.length > 0) g[0].leader = true; });
  }

  state.lastGroups = groups;
  saveState();
  render();
}

function render() {
  const wrap = document.getElementById('result');
  document.getElementById('heroGroups').textContent = groups && groups.length > 0 ? groups.length : '—';
  if (!groups || groups.length === 0) {
    wrap.innerHTML = '<div class="empty" style="grid-column:1/-1;"><b>還沒分組</b>按上面的「🎲 開始分組！」開始 ✨</div>';
    return;
  }
  wrap.innerHTML = '';
  groups.forEach((g, i) => {
    const c = COLORS[i % COLORS.length];
    const card = document.createElement('div');
    card.className = 'group-card';
    card.style.setProperty('--g-bg', c.bg);
    card.style.setProperty('--g-color', c.color);
    card.style.animationDelay = (i * 0.08) + 's';
    card.innerHTML = `
      <div class="group-head">
        <div class="num-tag">${i+1}</div>
        <div class="title">第 ${i+1} 組<small>${c.name} · ${g.length} 人</small></div>
      </div>
      <div class="members"></div>
    `;
    const members = card.querySelector('.members');
    g.forEach(stu => {
      const m = document.createElement('div');
      m.className = 'member' + (stu.leader ? ' leader' : '');
      const dispName = stu.name || `${stu.num} 號`;
      m.innerHTML = `<span class="num">${stu.num}</span> <span>${escapeHtml(dispName)}</span>`;
      members.appendChild(m);
    });
    wrap.appendChild(card);
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function copyText() {
  if (!groups || groups.length === 0) { alert('還沒分組喔'); return; }
  const lines = [];
  const r = AkaiRoster.load();
  if (r.className) lines.push(`🏫 ${r.className} 分組`);
  lines.push(`📅 ${new Date().toLocaleString('zh-TW')}`);
  lines.push('');
  groups.forEach((g, i) => {
    lines.push(`【第 ${i+1} 組】`);
    g.forEach(stu => {
      const tag = stu.leader ? '👑 ' : '   ';
      lines.push(`${tag}${stu.num} 號 ${stu.name || ''}`);
    });
    lines.push('');
  });
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => flash('✓ 已複製到剪貼簿'), () => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    flash('✓ 已複製');
  });
}

function flash(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(window._flashT);
  window._flashT = setTimeout(() => t.classList.remove('show'), 1400);
}

if (state.lastGroups && state.lastGroups.length > 0) groups = state.lastGroups;

window.addEventListener('storage', (e) => {
  if (e.key === 'akai_roster_v1') renderControls();
});
window.addEventListener('focus', renderControls);

renderControls();
render();
</script>
