<style>
  /* 跑馬燈主舞台 */
  .marquee-box {
    position: relative;
    width: 100%;
    height: 160px;
    background: var(--m-bg, var(--ink));
    border: 4px solid var(--ink);
    border-radius: var(--rad-lg);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center;
    cursor: pointer;
  }
  .marquee-track {
    display: flex;
    white-space: nowrap;
    animation: scroll var(--speed, 25s) linear infinite;
    color: var(--m-color, var(--y));
    font-size: var(--m-size, 60px);
    font-weight: 900;
    text-shadow: 0 0 14px var(--m-glow, rgba(255,210,63,.55)), 2px 2px 0 rgba(0,0,0,.3);
    letter-spacing: 4px;
  }
  .marquee-track.paused { animation-play-state: paused; }
  .marquee-track .item { padding: 0 80px; display: inline-flex; align-items: center; }
  .marquee-track .sep { margin: 0 30px; opacity: .5; font-size: 0.7em; }
  @keyframes scroll {
    from { transform: translateX(100%); }
    to   { transform: translateX(-100%); }
  }

  body.fullscreen .home-btn { opacity: .15; }
  body.fullscreen .page-hero,
  body.fullscreen .block,
  body.fullscreen footer.f { display: none; }
  body.fullscreen .bg-deco { opacity: .15; }
  body.fullscreen .marquee-stage { margin: 0; padding: 0; }
  body.fullscreen .marquee-box {
    height: 100vh;
    border: 0;
    border-radius: 0;
    box-shadow: none;
  }
  body.fullscreen .marquee-track {
    font-size: clamp(80px, 14vw, 200px);
  }

  /* 浮層：時鐘 + 倒數 */
  .overlay-top {
    position: absolute;
    top: 16px; left: 0; right: 0;
    display: flex; justify-content: space-between;
    padding: 0 24px;
    pointer-events: none;
    z-index: 5;
  }
  .clock-w, .cd-w {
    background: rgba(0,0,0,.4);
    color: #fff;
    border: 2px solid rgba(255,255,255,.35);
    padding: 8px 16px;
    border-radius: 14px;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 2px;
    backdrop-filter: blur(6px);
    display: none;
  }
  .clock-w.on, .cd-w.on { display: inline-block; }
  body.fullscreen .clock-w, body.fullscreen .cd-w {
    font-size: clamp(28px, 4vw, 56px);
    padding: 12px 26px;
    border-radius: 20px;
  }
  body.fullscreen .overlay-top { top: 30px; padding: 0 50px; }
  .cd-w.warn { background: rgba(255,107,107,.85); animation: pulse 1s infinite; }
  .cd-w.done { background: rgba(107,203,119,.9); }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .cd-w .lbl { font-size: .65em; opacity: .85; margin-right: 6px; }

  /* 訊息清單 */
  .msg-list {
    display: flex; flex-direction: column; gap: 8px;
    max-height: 280px; overflow-y: auto;
    padding-right: 4px;
  }
  .msg-item {
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: var(--rad-sm);
    padding: 10px 12px;
    display: flex; gap: 10px; align-items: center;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .msg-item.off { opacity: .45; }
  .msg-item input[type="text"] {
    flex: 1; border: none; outline: none;
    font-size: 15px; background: transparent;
    font-family: inherit; padding: 4px;
    font-weight: 700;
  }
  .msg-item input[type="text"]:focus {
    background: var(--y);
    border-radius: 6px;
  }
  .msg-item .toggle { cursor: pointer; width: 20px; height: 20px; flex-shrink: 0; }
  .msg-item .del {
    background: var(--ink); color: #fff; border: none;
    width: 24px; height: 24px; border-radius: 50%;
    cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .msg-item .del:hover { background: var(--r); }

  .add-row {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .add-row input { flex: 1; }

  .templates { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .templates button {
    background: var(--y); border: 2px dashed var(--ink);
    padding: 6px 12px; border-radius: 999px;
    cursor: pointer; font-family: inherit; font-size: 12px;
    color: var(--ink); font-weight: 700;
  }
  .templates button:hover { background: var(--ink); color: var(--y); }

  /* 設定 row */
  .setting-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }
  .setting-row > label {
    width: 90px; flex-shrink: 0;
    font-size: 14px; font-weight: 700;
    color: var(--ink);
  }
  .setting-row .val {
    min-width: 60px; text-align: right;
    font-weight: 700; font-size: 13px;
    font-family: 'Fraunces', serif; font-style: italic;
  }
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    flex: 1; height: 12px;
    background: var(--paper-2);
    border: 2px solid var(--ink);
    border-radius: 999px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px;
    background: var(--y);
    border: 3px solid var(--ink);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--ink);
  }
  input[type="range"]::-moz-range-thumb {
    width: 24px; height: 24px;
    background: var(--y);
    border: 3px solid var(--ink);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--ink);
  }
  input[type="color"] {
    width: 50px; height: 38px; padding: 2px;
    border: 3px solid var(--ink);
    border-radius: var(--rad-sm);
    background: #fff;
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .select-styled {
    padding: 8px 12px;
    border: 3px solid var(--ink);
    border-radius: var(--rad-sm);
    background: #fff;
    font-family: inherit;
    font-weight: 700;
    color: var(--ink);
    box-shadow: 2px 2px 0 var(--ink);
  }

  /* 主題快選 */
  .theme-pick { display: flex; gap: 8px; flex-wrap: wrap; }
  .theme-pick button {
    width: 48px; height: 48px;
    border-radius: 12px;
    cursor: pointer;
    border: 3px solid var(--ink);
    box-shadow: 2px 2px 0 var(--ink);
    transition: transform .15s, box-shadow .15s;
  }
  .theme-pick button:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--ink); }
  .theme-pick button.on {
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 var(--y);
  }

  /* 兩欄 */
  .panel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
  }
  @media (max-width: 720px) {
    .panel-grid { grid-template-columns: 1fr; }
  }

  .quick-cd {
    background: var(--y); border: 2px dashed var(--ink);
    padding: 6px 12px; border-radius: 999px;
    cursor: pointer; font-family: inherit; font-size: 13px;
    color: var(--ink); font-weight: 700;
  }
  .quick-cd:hover { background: var(--ink); color: var(--y); }
  .quick-cd.r { background: var(--r); color: #fff; }
  .quick-cd.r:hover { background: var(--ink); color: var(--r); }

  .hint-fullscreen {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: var(--ink); color: var(--paper);
    border: 3px solid var(--ink);
    padding: 10px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 700;
    display: none; pointer-events: none;
    box-shadow: 4px 4px 0 var(--y);
  }
  body.fullscreen .hint-fullscreen { display: block; animation: fade 3s forwards; }
  @keyframes fade { to { opacity: 0; } }

  /* ========== v3.2 RWD ========== */
  @media (max-width: 600px) {
    .marquee-box { height: 100px; border-radius: var(--rad); border-width: 3px; }
    .marquee-track { font-size: clamp(28px, 8vw, 48px); }
    .marquee-track .item { padding: 0 40px; }
    .marquee-track .sep { margin: 0 18px; }
    .clock-widget, .countdown-widget { font-size: 16px; padding: 6px 12px; border-radius: 10px; }
    .overlay-top { padding: 0 16px; top: 10px; }

    .panel-grid { grid-template-columns: 1fr !important; gap: 16px; }
    .msg-item { padding: 8px 10px; }
    .msg-item input[type="text"] { font-size: 13px; }
    .add-row { gap: 6px; }
    .add-row input { padding: 8px 10px; font-size: 13px; }
    .templates button { font-size: 11px; padding: 4px 8px; }

    .setting-row { gap: 8px; flex-wrap: wrap; }
    .setting-row label { width: auto; font-size: 12px; }
    .theme-pick button { width: 36px; height: 36px; }
    .quick-cd { font-size: 11px; padding: 4px 8px; }
    .action-row { gap: 8px; }
    .action-row button { padding: 10px 14px; font-size: 13px; }
  }
</style>

<script>
const STORAGE_KEY = 'akai_marquee_v1';

const THEMES = [
  { name: '深紫',   bg: '#2a1f4a',   text: '#ffd23f' },
  { name: '日出',   bg: 'linear-gradient(135deg, #ff9d4d 0%, #ffd23f 100%)', text: '#ffffff' },
  { name: '海洋',   bg: 'linear-gradient(135deg, #4d96ff 0%, #4ec5d8 100%)', text: '#ffffff' },
  { name: '森林',   bg: 'linear-gradient(135deg, #1a3e22 0%, #6bcb77 100%)', text: '#ffd23f' },
  { name: '櫻花',   bg: 'linear-gradient(135deg, #ff97c5 0%, #ffd6e7 100%)', text: '#2a1f4a' },
  { name: '彩虹',   bg: 'linear-gradient(135deg, #ff6b6b 0%, #ffd23f 25%, #6bcb77 50%, #4d96ff 75%, #b070ff 100%)', text: '#ffffff' },
  { name: '純黑',   bg: '#1a1230', text: '#ffffff' },
  { name: '紅榜',   bg: '#ff6b6b', text: '#ffd23f' },
];

const PRESET = [
  { text: '🌟 歡迎來到我們的教室！', on: true },
  { text: '📚 今天上學認真學習，記得帶笑容回家 😊', on: true },
  { text: '🎯 班級目標：互相幫忙、勇敢嘗試、開心學習', on: true },
];

let state = loadState();
let paused = false;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const obj = JSON.parse(raw);
    if (!Array.isArray(obj.messages) || obj.messages.length === 0) obj.messages = PRESET.slice();
    return obj;
  } catch { return defaultState(); }
}
function defaultState() {
  return {
    messages: PRESET.slice(),
    speed: 30,
    fontSize: 60,
    themeIdx: 0,
    bg: THEMES[0].bg,
    text: THEMES[0].text,
    showClock: true,
    clockFormat: 'HH:mm',
    showCountdown: false,
    cdLabel: '距下課',
    cdTargetISO: null,
  };
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderMessages() {
  const list = document.getElementById('msgList');
  list.innerHTML = '';
  state.messages.forEach((m, i) => {
    const row = document.createElement('div');
    row.className = 'msg-item' + (m.on ? '' : ' off');
    row.innerHTML = `
      <input type="checkbox" class="toggle" ${m.on ? 'checked' : ''}>
      <input type="text" value="">
      <button class="del" title="刪除">✕</button>
    `;
    const cb = row.querySelector('.toggle');
    const txt = row.querySelector('input[type="text"]');
    txt.value = m.text;
    cb.onchange = () => {
      state.messages[i].on = cb.checked;
      saveState(); renderMessages(); renderTrack();
    };
    txt.onchange = () => {
      state.messages[i].text = txt.value;
      saveState(); renderTrack();
    };
    row.querySelector('.del').onclick = () => {
      if (!confirm('刪除這則訊息？')) return;
      state.messages.splice(i, 1);
      saveState(); renderMessages(); renderTrack();
    };
    list.appendChild(row);
  });
}

function addMsg() {
  const inp = document.getElementById('newMsg');
  const v = inp.value.trim();
  if (!v) return;
  state.messages.push({ text: v, on: true });
  inp.value = '';
  saveState();
  renderMessages();
  renderTrack();
}
document.getElementById('newMsg').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addMsg();
});

function quickAdd(template) {
  document.getElementById('newMsg').value = template;
  document.getElementById('newMsg').focus();
}

function renderTrack() {
  const track = document.getElementById('marqueeTrack');
  const active = state.messages.filter(m => m.on && m.text.trim());
  if (active.length === 0) {
    track.innerHTML = '<span class="item">📢 還沒有訊息，下方加幾則吧～</span>';
    return;
  }
  track.innerHTML = active.map(m => `<span class="item">${escapeHtml(m.text)}</span><span class="sep">●</span>`).join('');
}

function applyStyles() {
  const box = document.getElementById('marqueeBox');
  const track = document.getElementById('marqueeTrack');
  box.style.setProperty('--m-bg', state.bg);
  box.style.background = state.bg;
  track.style.setProperty('--m-color', state.text);
  track.style.color = state.text;
  track.style.setProperty('--speed', (90 - state.speed) + 's');
  track.style.setProperty('--m-size', state.fontSize + 'px');
  track.style.fontSize = state.fontSize + 'px';
  track.style.setProperty('--m-glow', state.text + '99');
  track.style.textShadow = `0 0 14px ${state.text}99, 2px 2px 0 rgba(0,0,0,.3)`;
}

function colorOf(s) { return s.startsWith('#') ? s : '#2a1f4a'; }

function renderSettings() {
  document.getElementById('speed').value = state.speed;
  document.getElementById('fontSize').value = state.fontSize;
  document.getElementById('bgColor').value = colorOf(state.bg);
  document.getElementById('textColor').value = state.text;
  applyStyles();
  renderThemePick();
  updateLabels();
}

function updateLabels() {
  const speedLabels = { 10: '極慢', 20: '慢', 30: '中', 40: '中', 50: '中快', 60: '快', 70: '極快', 80: '飛快' };
  let key = 30;
  Object.keys(speedLabels).forEach(k => { if (state.speed >= parseInt(k)) key = k; });
  document.getElementById('speedVal').textContent = speedLabels[key];
  document.getElementById('fontVal').textContent = state.fontSize + 'px';
}

function renderThemePick() {
  const wrap = document.getElementById('themePick');
  wrap.innerHTML = '';
  THEMES.forEach((t, i) => {
    const b = document.createElement('button');
    b.style.background = t.bg;
    b.title = t.name;
    if (state.themeIdx === i) b.classList.add('on');
    b.onclick = () => {
      state.themeIdx = i;
      state.bg = t.bg;
      state.text = t.text;
      document.getElementById('bgColor').value = colorOf(t.bg);
      document.getElementById('textColor').value = t.text;
      saveState();
      applyStyles();
      renderThemePick();
    };
    wrap.appendChild(b);
  });
}

document.getElementById('speed').oninput = (e) => { state.speed = parseInt(e.target.value); applyStyles(); updateLabels(); };
document.getElementById('speed').onchange = saveState;
document.getElementById('fontSize').oninput = (e) => { state.fontSize = parseInt(e.target.value); applyStyles(); updateLabels(); };
document.getElementById('fontSize').onchange = saveState;
document.getElementById('bgColor').onchange = (e) => { state.bg = e.target.value; state.themeIdx = -1; saveState(); applyStyles(); renderThemePick(); };
document.getElementById('textColor').onchange = (e) => { state.text = e.target.value; saveState(); applyStyles(); };

function togglePause() {
  paused = !paused;
  document.getElementById('marqueeTrack').classList.toggle('paused', paused);
  document.getElementById('pauseBtn').textContent = paused ? '▶ 播放' : '⏸ 暫停';
}

function toggleFullscreen() {
  document.body.classList.toggle('fullscreen');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.body.classList.contains('fullscreen')) {
    document.body.classList.remove('fullscreen');
  }
  if (e.key === ' ' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    togglePause();
  }
});

function saveAll() { saveState(); flash('✓ 設定已存檔'); }

function flash(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(window._flashT);
  window._flashT = setTimeout(() => t.classList.remove('show'), 1400);
}

/* 時鐘 + 倒數 */
function pad(n) { return String(n).padStart(2, '0'); }
function formatClock(d, fmt) {
  const h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
  if (fmt === 'HH:mm:ss') return `${pad(h)}:${pad(m)}:${pad(s)}`;
  if (fmt === 'hh:mm') {
    const ampm = h >= 12 ? 'PM' : 'AM';
    const hh = h % 12 || 12;
    return `${pad(hh)}:${pad(m)} ${ampm}`;
  }
  return `${pad(h)}:${pad(m)}`;
}

function updateClock() {
  const el = document.getElementById('clockWidget');
  if (state.showClock) {
    el.classList.add('on');
    el.textContent = formatClock(new Date(), state.clockFormat || 'HH:mm');
  } else {
    el.classList.remove('on');
  }
}

function updateCountdown() {
  const el = document.getElementById('countdownWidget');
  const val = document.getElementById('cdValue');
  if (!state.showCountdown || !state.cdTargetISO) {
    el.classList.remove('on', 'warn', 'done');
    return;
  }
  el.classList.add('on');
  el.querySelector('.lbl').textContent = state.cdLabel || '倒數';
  const target = new Date(state.cdTargetISO).getTime();
  const now = Date.now();
  let diff = Math.floor((target - now) / 1000);
  if (diff <= 0) { val.textContent = '時間到！'; el.classList.add('done'); el.classList.remove('warn'); return; }
  el.classList.remove('done');
  if (diff <= 60) el.classList.add('warn'); else el.classList.remove('warn');
  const hh = Math.floor(diff / 3600);
  const mm = Math.floor((diff % 3600) / 60);
  const ss = diff % 60;
  val.textContent = hh > 0 ? `${hh}:${pad(mm)}:${pad(ss)}` : `${pad(mm)}:${pad(ss)}`;
}

function tick() { updateClock(); updateCountdown(); }
setInterval(tick, 1000);

document.getElementById('showClock').onchange     = (e) => { state.showClock = e.target.checked; saveState(); tick(); };
document.getElementById('clockFormat').onchange   = (e) => { state.clockFormat = e.target.value; saveState(); tick(); };
document.getElementById('showCountdown').onchange = (e) => { state.showCountdown = e.target.checked; saveState(); tick(); };
document.getElementById('cdLabel').oninput        = (e) => { state.cdLabel = e.target.value; saveState(); tick(); };

function setCountdown() {
  const t = document.getElementById('cdTarget').value;
  if (!t) { alert('請選一個目標時間'); return; }
  const [h, m] = t.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  if (d.getTime() < Date.now()) d.setDate(d.getDate() + 1);
  state.cdTargetISO = d.toISOString();
  state.showCountdown = true;
  document.getElementById('showCountdown').checked = true;
  saveState();
  tick();
  flash(`⏱ 已設定倒數到 ${pad(h)}:${pad(m)}`);
}

function clearCountdown() {
  state.cdTargetISO = null;
  state.showCountdown = false;
  document.getElementById('showCountdown').checked = false;
  saveState();
  tick();
}

document.querySelectorAll('.quick-cd[data-mins]').forEach(btn => {
  btn.onclick = () => {
    const mins = parseInt(btn.dataset.mins);
    if (mins <= 0) return;
    const d = new Date(Date.now() + mins * 60000);
    state.cdTargetISO = d.toISOString();
    state.showCountdown = true;
    document.getElementById('showCountdown').checked = true;
    document.getElementById('cdTarget').value = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    saveState();
    tick();
    flash(`⏱ 倒數 ${mins} 分鐘開始`);
  };
});

function loadClockSettings() {
  document.getElementById('showClock').checked = !!state.showClock;
  document.getElementById('clockFormat').value = state.clockFormat || 'HH:mm';
  document.getElementById('showCountdown').checked = !!state.showCountdown;
  document.getElementById('cdLabel').value = state.cdLabel || '距下課';
  if (state.cdTargetISO) {
    const d = new Date(state.cdTargetISO);
    document.getElementById('cdTarget').value = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }
}

renderMessages();
renderTrack();
renderSettings();
loadClockSettings();
tick();
</script>
