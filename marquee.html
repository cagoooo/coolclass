<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📢 跑馬燈通知 · 阿凱老師的教室小幫手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    color: #2a2a3e;
    min-height: 100vh;
    background: #fffbe0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,220,120,.4), transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255,180,120,.3), transparent 50%);
  }
  .home-btn {
    position: fixed; top: 16px; left: 16px;
    background: #fff; border: 3px solid #ffd060; color: #a06010;
    padding: 10px 18px; border-radius: 999px; font-weight: 700;
    text-decoration: none; font-size: 14px;
    box-shadow: 0 4px 12px rgba(220,180,80,.25); z-index: 100;
    transition: transform .2s;
  }
  .home-btn:hover { transform: translateY(-2px) scale(1.05); }
  .home-btn.dim { opacity: .15; }
  .home-btn.dim:hover { opacity: 1; }

  header {
    text-align: center; padding: 50px 20px 14px;
  }
  header h1 {
    margin: 0; font-size: clamp(26px, 5vw, 40px); color: #6a4a10;
    text-shadow: 2px 2px 0 #fff;
  }
  header .sub { color: #8a6a30; margin-top: 8px; font-size: 14px; }

  /* 跑馬燈主舞台 */
  .stage {
    margin: 26px auto;
    max-width: 1500px;
    padding: 0 20px;
  }
  .marquee-box {
    position: relative;
    width: 100%;
    height: 140px;
    background: var(--m-bg, linear-gradient(135deg, #2a2a3e 0%, #4a4a6e 100%));
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 12px 30px rgba(0,0,0,.2), inset 0 0 0 4px rgba(255,255,255,.1);
    display: flex; align-items: center;
  }
  .marquee-track {
    display: flex;
    white-space: nowrap;
    animation: scroll var(--speed, 25s) linear infinite;
    color: var(--m-color, #ffe070);
    font-size: var(--m-size, 60px);
    font-weight: 900;
    text-shadow: 0 0 12px var(--m-glow, rgba(255,224,112,.6)),
                 2px 2px 0 rgba(0,0,0,.3);
    letter-spacing: 4px;
  }
  .marquee-track.paused { animation-play-state: paused; }
  .marquee-track .item {
    padding: 0 80px;
    display: inline-flex; align-items: center;
  }
  .marquee-track .sep {
    margin: 0 30px;
    opacity: .5;
    font-size: 0.7em;
  }
  @keyframes scroll {
    from { transform: translateX(100%); }
    to   { transform: translateX(-100%); }
  }

  /* 全螢幕模式 */
  body.fullscreen .home-btn { opacity: .15; }
  body.fullscreen header,
  body.fullscreen .control-panel,
  body.fullscreen footer { display: none; }
  body.fullscreen .stage {
    margin: 0; padding: 0; max-width: 100%;
    height: 100vh;
    display: flex; align-items: center;
  }
  body.fullscreen .marquee-box {
    height: 100vh;
    border-radius: 0;
    box-shadow: none;
  }
  body.fullscreen .marquee-track {
    font-size: clamp(80px, 14vw, 200px);
  }

  /* 控制台 */
  .control-panel {
    max-width: 1300px; margin: 14px auto 60px;
    background: rgba(255,255,255,.85);
    border-radius: 24px;
    padding: 24px 28px;
    box-shadow: 0 8px 20px rgba(180,140,60,.15);
    backdrop-filter: blur(6px);
  }
  .panel-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 28px;
  }
  @media (max-width: 780px) {
    .panel-grid { grid-template-columns: 1fr; gap: 20px; }
  }
  .panel-grid h3 {
    margin: 0 0 12px; color: #6a4a10; font-size: 18px;
    border-bottom: 3px solid #ffd060; padding-bottom: 6px;
    display: inline-block;
  }

  .msg-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; padding-right: 4px; }
  .msg-item {
    background: #fff; border-radius: 12px;
    padding: 10px 12px;
    display: flex; gap: 10px; align-items: center;
    border-left: 5px solid #ffd060;
    box-shadow: 0 2px 6px rgba(0,0,0,.05);
  }
  .msg-item.disabled { opacity: .4; border-left-color: #ccc; }
  .msg-item input[type="text"] {
    flex: 1; border: none; outline: none;
    font-size: 15px; background: transparent;
    font-family: inherit; padding: 4px;
  }
  .msg-item input[type="text"]:focus { background: #fff8dc; border-radius: 6px; }
  .msg-item .toggle {
    cursor: pointer; user-select: none;
    width: 20px; height: 20px; flex-shrink: 0;
  }
  .msg-item .del {
    background: transparent; border: none; cursor: pointer;
    color: #ccc; font-size: 18px;
  }
  .msg-item .del:hover { color: #ff6060; }

  .add-row {
    display: flex; gap: 8px; margin-top: 10px;
  }
  .add-row input {
    flex: 1; padding: 10px 12px;
    border: 2px solid #ffd060;
    border-radius: 12px;
    font-size: 15px; font-family: inherit;
    background: #fff;
  }
  .add-row input:focus { outline: none; border-color: #e0a040; }
  .add-row button {
    background: #ffc040; color: #fff;
    border: none; padding: 10px 18px;
    border-radius: 12px; cursor: pointer;
    font-weight: 700; font-family: inherit;
  }

  /* 範本快捷 */
  .templates { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .templates button {
    background: #fff8dc; border: 2px dashed #ffc040;
    padding: 6px 10px; border-radius: 999px;
    cursor: pointer; font-family: inherit; font-size: 12px;
    color: #a06010;
  }
  .templates button:hover { background: #ffd060; color: #6a4a10; }

  .setting-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }
  .setting-row label {
    width: 90px; flex-shrink: 0;
    font-size: 14px; font-weight: 700; color: #6a4a10;
  }
  .setting-row input[type="range"] { flex: 1; }
  .setting-row .val {
    min-width: 60px; text-align: right;
    font-weight: 700; color: #2a2a3e; font-size: 13px;
  }
  .setting-row select, .setting-row input[type="color"] {
    padding: 6px 10px; border: 2px solid #ffd060;
    border-radius: 8px; font-family: inherit; background: #fff;
  }
  .setting-row input[type="color"] { width: 50px; height: 38px; padding: 2px; cursor: pointer; }

  /* 主題快選 */
  .theme-pick { display: flex; gap: 8px; flex-wrap: wrap; }
  .theme-pick button {
    width: 44px; height: 44px; border-radius: 10px;
    cursor: pointer; border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,.15);
    transition: transform .2s;
  }
  .theme-pick button:hover { transform: scale(1.1); }
  .theme-pick button.on { border-color: #6a4a10; transform: scale(1.1); }

  .action-row {
    display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px;
    border-top: 2px dashed #ffd060; padding-top: 14px;
  }
  .action-row button {
    padding: 12px 20px; border-radius: 12px;
    border: none; font-weight: 700; cursor: pointer;
    font-family: inherit; font-size: 14px;
    transition: transform .2s;
  }
  .action-row button:hover { transform: translateY(-2px); }
  .btn-full { background: #2a2a3e; color: #ffe070; }
  .btn-pause { background: #ffc040; color: #fff; }
  .btn-save { background: #80c890; color: #fff; }

  footer {
    text-align: center; padding: 20px; font-size: 13px; color: #8a6a30;
  }
  footer a { color: #6a4a10; font-weight: 700; }

  .hint-fullscreen {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,.5); color: #fff;
    padding: 10px 18px; border-radius: 999px;
    font-size: 13px; display: none;
    pointer-events: none;
  }
  body.fullscreen .hint-fullscreen { display: block; animation: fade 3s forwards; }
  @keyframes fade {
    to { opacity: 0; }
  }
</style>
</head>
<body>

<a class="home-btn" href="index.html">← 回主頁</a>

<header>
  <h1>📢 跑馬燈通知</h1>
  <p class="sub">投影機 / 白板顯示用，可以放重要通知、課堂重點、表揚標語</p>
</header>

<div class="stage">
  <div class="marquee-box" id="marqueeBox" onclick="toggleFullscreen()">
    <div class="marquee-track" id="marqueeTrack"></div>
  </div>
</div>

<div class="hint-fullscreen">按 ESC 或點擊跑馬燈可離開全螢幕</div>

<div class="control-panel">
  <div class="panel-grid">

    <div>
      <h3>📝 訊息清單</h3>
      <div class="msg-list" id="msgList"></div>
      <div class="add-row">
        <input type="text" id="newMsg" placeholder="輸入新訊息，例：明天記得帶水彩用具 🎨" maxlength="100">
        <button onclick="addMsg()">＋ 加入</button>
      </div>
      <div class="templates">
        <button onclick="quickAdd('🎉 今天的優秀表現獎得主：')">🎉 表揚</button>
        <button onclick="quickAdd('📚 今日課堂重點：')">📚 重點</button>
        <button onclick="quickAdd('⏰ 重要提醒：')">⏰ 提醒</button>
        <button onclick="quickAdd('🎊 大家辛苦了，繼續加油！')">🎊 加油</button>
        <button onclick="quickAdd('📅 下週活動預告：')">📅 預告</button>
        <button onclick="quickAdd('🍎 健康小提醒：多喝水、勤洗手')">🍎 健康</button>
      </div>
    </div>

    <div>
      <h3>⚙️ 跑馬燈設定</h3>

      <div class="setting-row">
        <label>速度</label>
        <input type="range" id="speed" min="10" max="80" value="30">
        <span class="val" id="speedVal">中速</span>
      </div>

      <div class="setting-row">
        <label>字體大小</label>
        <input type="range" id="fontSize" min="30" max="120" value="60">
        <span class="val" id="fontVal">60px</span>
      </div>

      <div class="setting-row">
        <label>主題</label>
        <div class="theme-pick" id="themePick"></div>
      </div>

      <div class="setting-row">
        <label>自訂底色</label>
        <input type="color" id="bgColor" value="#2a2a3e">
        <label style="width:auto;">文字</label>
        <input type="color" id="textColor" value="#ffe070">
      </div>

      <div class="action-row">
        <button class="btn-full" onclick="toggleFullscreen()">🖥️ 全螢幕投影</button>
        <button class="btn-pause" id="pauseBtn" onclick="togglePause()">⏸️ 暫停</button>
        <button class="btn-save" onclick="saveAll()">💾 存設定</button>
      </div>
    </div>

  </div>
</div>

<footer>
  Made with ❤️ by <a href="https://www.smes.tyc.edu.tw/modules/tadnews/page.php?ncsn=11&nsn=16#a5" target="_blank" rel="noopener">阿凱老師</a> · 桃園市龍潭區石門國民小學
  <br><span style="font-size:11px;color:#a08a60;">設計參考自陳名峰老師</span>
</footer>

<script>
const STORAGE_KEY = 'akai_marquee_v1';

const THEMES = [
  { name: '深夜', bg: 'linear-gradient(135deg, #2a2a3e 0%, #4a4a6e 100%)', text: '#ffe070' },
  { name: '日出', bg: 'linear-gradient(135deg, #ff8a4c 0%, #ffd060 100%)', text: '#ffffff' },
  { name: '海洋', bg: 'linear-gradient(135deg, #2a6aae 0%, #4ad0e0 100%)', text: '#ffffff' },
  { name: '森林', bg: 'linear-gradient(135deg, #2a6a4e 0%, #80c890 100%)', text: '#ffffff' },
  { name: '櫻花', bg: 'linear-gradient(135deg, #ff8aaa 0%, #ffd1dc 100%)', text: '#5a2a4e' },
  { name: '彩虹', bg: 'linear-gradient(135deg, #ff8a4c 0%, #ffd060 25%, #80c890 50%, #4ac0e0 75%, #c8a8e6 100%)', text: '#ffffff' },
  { name: '純黑', bg: '#000000', text: '#ffffff' },
  { name: '紅榜', bg: '#c02020', text: '#ffe070' },
];

const PRESET = [
  { text: '🌟 歡迎來到阿凱老師的教室！', on: true },
  { text: '📚 今天上學認真學習，記得帶笑容回家 😊', on: true },
  { text: '🎯 班級目標：互相幫忙、勇敢嘗試、開心學習', on: true },
];

let state = loadState();
let paused = false;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const obj = JSON.parse(raw);
    if (!Array.isArray(obj.messages) || obj.messages.length === 0) obj.messages = PRESET.slice();
    return obj;
  } catch { return defaultState(); }
}
function defaultState() {
  return {
    messages: PRESET.slice(),
    speed: 30,
    fontSize: 60,
    themeIdx: 0,
    bg: THEMES[0].bg,
    text: THEMES[0].text,
  };
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function renderMessages() {
  const list = document.getElementById('msgList');
  list.innerHTML = '';
  state.messages.forEach((m, i) => {
    const row = document.createElement('div');
    row.className = 'msg-item' + (m.on ? '' : ' disabled');
    row.innerHTML = `
      <input type="checkbox" class="toggle" ${m.on ? 'checked' : ''}>
      <input type="text" value="">
      <button class="del" title="刪除">✕</button>
    `;
    const cb = row.querySelector('.toggle');
    const txt = row.querySelector('input[type="text"]');
    txt.value = m.text;
    cb.onchange = () => {
      state.messages[i].on = cb.checked;
      saveState(); renderMessages(); renderTrack();
    };
    txt.onchange = () => {
      state.messages[i].text = txt.value;
      saveState(); renderTrack();
    };
    row.querySelector('.del').onclick = () => {
      if (!confirm('刪除這則訊息？')) return;
      state.messages.splice(i, 1);
      saveState(); renderMessages(); renderTrack();
    };
    list.appendChild(row);
  });
}

function addMsg() {
  const inp = document.getElementById('newMsg');
  const v = inp.value.trim();
  if (!v) return;
  state.messages.push({ text: v, on: true });
  inp.value = '';
  saveState();
  renderMessages();
  renderTrack();
}
document.getElementById('newMsg').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addMsg();
});

function quickAdd(template) {
  document.getElementById('newMsg').value = template;
  document.getElementById('newMsg').focus();
}

function renderTrack() {
  const track = document.getElementById('marqueeTrack');
  const active = state.messages.filter(m => m.on && m.text.trim());
  if (active.length === 0) {
    track.innerHTML = '<span class="item">📢 還沒有訊息，下方加幾則吧～</span>';
    return;
  }
  track.innerHTML = active.map(m => `<span class="item">${escapeHtml(m.text)}</span><span class="sep">●</span>`).join('');
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderSettings() {
  document.getElementById('speed').value = state.speed;
  document.getElementById('fontSize').value = state.fontSize;
  document.getElementById('bgColor').value = colorOf(state.bg);
  document.getElementById('textColor').value = state.text;
  applyStyles();
  renderThemePick();
  updateLabels();
}

function colorOf(s) {
  if (s.startsWith('#')) return s;
  return '#2a2a3e';
}

function applyStyles() {
  const box = document.getElementById('marqueeBox');
  const track = document.getElementById('marqueeTrack');
  box.style.setProperty('--m-bg', state.bg);
  box.style.background = state.bg;
  track.style.setProperty('--m-color', state.text);
  track.style.color = state.text;
  track.style.setProperty('--speed', (90 - state.speed) + 's');
  track.style.setProperty('--m-size', state.fontSize + 'px');
  track.style.fontSize = state.fontSize + 'px';
  track.style.setProperty('--m-glow', state.text + '99');
  track.style.textShadow = `0 0 12px ${state.text}99, 2px 2px 0 rgba(0,0,0,.3)`;
}

function updateLabels() {
  const speedLabels = { 10: '極慢', 20: '慢', 30: '中', 40: '中', 50: '中快', 60: '快', 70: '極快', 80: '飛快' };
  let key = 30;
  Object.keys(speedLabels).forEach(k => { if (state.speed >= parseInt(k)) key = k; });
  document.getElementById('speedVal').textContent = speedLabels[key];
  document.getElementById('fontVal').textContent = state.fontSize + 'px';
}

function renderThemePick() {
  const wrap = document.getElementById('themePick');
  wrap.innerHTML = '';
  THEMES.forEach((t, i) => {
    const b = document.createElement('button');
    b.style.background = t.bg;
    b.title = t.name;
    if (state.themeIdx === i) b.classList.add('on');
    b.onclick = () => {
      state.themeIdx = i;
      state.bg = t.bg;
      state.text = t.text;
      document.getElementById('bgColor').value = colorOf(t.bg);
      document.getElementById('textColor').value = t.text;
      saveState();
      applyStyles();
      renderThemePick();
    };
    wrap.appendChild(b);
  });
}

document.getElementById('speed').oninput = (e) => {
  state.speed = parseInt(e.target.value);
  applyStyles(); updateLabels();
};
document.getElementById('speed').onchange = saveState;
document.getElementById('fontSize').oninput = (e) => {
  state.fontSize = parseInt(e.target.value);
  applyStyles(); updateLabels();
};
document.getElementById('fontSize').onchange = saveState;
document.getElementById('bgColor').onchange = (e) => {
  state.bg = e.target.value;
  state.themeIdx = -1;
  saveState();
  applyStyles();
  renderThemePick();
};
document.getElementById('textColor').onchange = (e) => {
  state.text = e.target.value;
  saveState();
  applyStyles();
};

function togglePause() {
  paused = !paused;
  document.getElementById('marqueeTrack').classList.toggle('paused', paused);
  document.getElementById('pauseBtn').textContent = paused ? '▶️ 播放' : '⏸️ 暫停';
}

function toggleFullscreen() {
  document.body.classList.toggle('fullscreen');
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.body.classList.contains('fullscreen')) {
    document.body.classList.remove('fullscreen');
  }
  if (e.key === ' ' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    togglePause();
  }
});

function saveAll() {
  saveState();
  flash('✓ 設定已存檔');
}

function flash(text) {
  const el = document.createElement('div');
  el.textContent = text;
  el.style.cssText = `
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: #80c890; color: #fff; padding: 12px 24px;
    border-radius: 999px; font-weight: 700; z-index: 9999;
    box-shadow: 0 8px 24px rgba(80,180,120,.4); font-size: 15px;
  `;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

renderMessages();
renderTrack();
renderSettings();
</script>

</body>
</html>
