<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>隨機抽號 · 教室小幫手</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff97c5">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Fraunces:opsz,ital,wght@9..144,1,500;9..144,1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="crayon.css">
<style>
  /* 大轉盤 */
  .display-box {
    background: var(--ink);
    color: var(--paper);
    border: 4px solid var(--ink);
    border-radius: var(--rad-lg);
    padding: 48px 30px;
    margin: 0 0 24px;
    text-align: center;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
  }
  .display-box::before {
    content: ''; position: absolute;
    inset: 12px;
    border: 3px dashed var(--y);
    border-radius: 20px;
    opacity: .35;
    pointer-events: none;
  }
  .display-box::after {
    content: ''; position: absolute;
    width: 240px; height: 240px;
    background: radial-gradient(var(--y) 2px, transparent 2.5px) 0 0/12px 12px;
    opacity: .12;
    bottom: -80px; right: -60px;
    border-radius: 50%;
    pointer-events: none;
  }
  .big-num {
    position: relative;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: clamp(140px, 24vw, 260px);
    font-weight: 900;
    line-height: 1;
    color: var(--y);
    text-shadow:
      6px 6px 0 var(--r),
      12px 12px 0 var(--b);
    font-variant-numeric: tabular-nums;
    transition: transform .25s;
  }
  .big-num.spinning {
    animation: spin .08s linear infinite;
  }
  @keyframes spin {
    0%   { transform: scale(1) rotate(-2deg); }
    50%  { transform: scale(1.07) rotate(2deg); }
    100% { transform: scale(1) rotate(-2deg); }
  }
  .big-num.reveal { animation: popReveal .6s cubic-bezier(.34,1.56,.64,1); }
  @keyframes popReveal {
    0%   { transform: scale(.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .big-name {
    position: relative;
    margin-top: 12px;
    font-weight: 900;
    font-size: clamp(26px, 4.6vw, 44px);
    color: var(--paper);
    min-height: 1.2em;
  }
  .big-num.idle { color: var(--paper); opacity: .4; text-shadow: none; }

  /* 切換開關 */
  .opt-row {
    display: flex; align-items: center; gap: 18px;
    flex-wrap: wrap;
  }
  .switch {
    display: inline-flex; align-items: center; gap: 10px;
    font-weight: 700;
    color: var(--ink);
    cursor: pointer;
    font-size: 14px;
  }
  .switch input { display: none; }
  .switch .knob {
    width: 44px; height: 24px;
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 999px;
    position: relative;
    transition: background .15s;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .switch .knob::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: var(--ink);
    border-radius: 50%;
    transition: transform .2s;
  }
  .switch input:checked + .knob { background: var(--g); }
  .switch input:checked + .knob::after { transform: translateX(20px); }

  /* 雙欄 */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  @media (max-width: 720px) { .panels { grid-template-columns: 1fr; } }

  .chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    min-height: 80px;
  }
  .chip {
    padding: 6px 12px;
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 999px;
    font-weight: 700;
    font-size: 13px;
    color: var(--ink);
    box-shadow: 2px 2px 0 var(--ink);
  }
  .chip.used {
    background: var(--ink);
    color: var(--paper);
    text-decoration: line-through;
  }
  .chip b {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 900;
    margin-right: 2px;
  }
</style>
<script src="tweaks.js"></script>
</head>
<body>

<div class="bg-deco" aria-hidden="true">
  <span class="blob blob-y"></span>
  <span class="blob blob-p"></span>
  <span class="squig squig-1"></span>
  <span class="squig squig-2"></span>
</div>

<a class="home-btn" href="index.html">← 回主頁</a>

<div class="wrap narrow">

  <section class="page-hero">
    <div>
      <span class="eyebrow">PICK · 公平點人</span>
      <h1>誰來<em>答題</em>？<br>讓老天爺決定。</h1>
      <p class="sub">
        <span class="badge" id="classBadge">— · 30 人</span>
        <span class="badge">⌨ 空白鍵 = 抽</span>
      </p>
    </div>
    <div class="right-aux">
      <span class="big" id="remainCount">30</span>
      <span class="sml">尚未抽過</span>
    </div>
  </section>

  <!-- 大字幕 -->
  <div class="display-box">
    <div class="big-num idle" id="bigNum">?</div>
    <div class="big-name" id="bigName"></div>
  </div>

  <div class="btn-bar center">
    <button class="btn primary xl" id="pickBtn" onclick="pick()">🎲 抽一個！</button>
    <button class="btn y lg" onclick="undo()">↩️ 上一個</button>
    <button class="btn r lg" onclick="resetAll()">🔄 全部重抽</button>
  </div>

  <section class="block" style="margin-top:22px;">
    <div class="block-head">
      <div class="step">⚙</div>
      <h2>選項</h2>
    </div>
    <div class="opt-row">
      <label class="switch">
        <input type="checkbox" id="excludeUsed" checked>
        <span class="knob"></span>
        排除已抽過的（公平模式）
      </label>
      <label class="switch">
        <input type="checkbox" id="sound" checked>
        <span class="knob"></span>
        🔊 抽中時播放音效
      </label>
      <a href="roster.html" class="btn sm" style="margin-left:auto;">👥 編輯班級名單</a>
    </div>
  </section>

  <div class="panels">
    <section class="block">
      <div class="block-head">
        <div class="step">▸</div>
        <h2>抽號歷史</h2>
        <span class="tail">最新在前</span>
      </div>
      <div class="chips" id="historyList">
        <div style="color:var(--mute-2);font-size:13px;padding:20px;">還沒抽過喔～</div>
      </div>
    </section>

    <section class="block">
      <div class="block-head">
        <div class="step">◯</div>
        <h2>待抽號碼</h2>
        <span class="tail" id="remainTail">— 個</span>
      </div>
      <div class="chips" id="remainList"></div>
    </section>
  </div>

  <footer class="f">
    Made with ♥ by <a href="https://www.smes.tyc.edu.tw/modules/tadnews/page.php?ncsn=11&nsn=16#a5" target="_blank" rel="noopener">阿凱老師</a> · 桃園市龍潭區石門國民小學
    <div class="ver">© 2026 · v3 “Crayon Pop”</div>
  </footer>
</div>

<div class="toast" id="toast">已抽中</div>

<script src="roster.js"></script>
<script src="sw-update.js" defer></script>
<script>
if (!window.AkaiRoster) {
  const KEY = 'akai_roster_v1';
  window.AkaiRoster = {
    load() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) return { className: '', count: 30, names: {} };
        const o = JSON.parse(raw);
        return { className: o.className || '', count: parseInt(o.count) || 30, names: o.names || {} };
      } catch { return { className: '', count: 30, names: {} }; }
    },
    getName(n) { return this.load().names[String(n)] || ''; }
  };
}
</script>

<script>
const STORAGE_KEY = 'akai_picker_v1';
const todayKey = () => new Date().toISOString().slice(0,10);

let state = loadState();
let spinning = false;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return {
      history: obj.history || [],
      excludeUsed: obj.excludeUsed !== false,
      sound: obj.sound !== false,
      day: obj.day || todayKey(),
    };
  } catch { return { history: [], excludeUsed: true, sound: true, day: todayKey() }; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

if (state.day !== todayKey()) {
  state.history = [];
  state.day = todayKey();
  saveState();
}

function getAllNums() {
  const r = AkaiRoster.load();
  const n = r.count || 30;
  const list = [];
  for (let i = 1; i <= n; i++) list.push(i);
  return list;
}

function getRemain() {
  const all = getAllNums();
  if (!state.excludeUsed) return all;
  const used = new Set(state.history);
  return all.filter(n => !used.has(n));
}

function pick() {
  if (spinning) return;
  const remain = getRemain();
  if (remain.length === 0) {
    flash('🎉 全班都抽過了！按「全部重抽」開始新一輪');
    return;
  }
  spinning = true;
  document.getElementById('pickBtn').disabled = true;
  const bigNum = document.getElementById('bigNum');
  bigNum.classList.remove('idle', 'reveal');
  bigNum.classList.add('spinning');
  document.getElementById('bigName').textContent = '';

  const allForAnim = getAllNums();
  const interval = setInterval(() => {
    bigNum.textContent = allForAnim[Math.floor(Math.random() * allForAnim.length)];
  }, 60);

  setTimeout(() => {
    clearInterval(interval);
    const picked = remain[Math.floor(Math.random() * remain.length)];
    state.history.unshift(picked);
    saveState();
    bigNum.classList.remove('spinning');
    bigNum.classList.add('reveal');
    bigNum.textContent = picked;
    const name = AkaiRoster.getName(picked);
    document.getElementById('bigName').textContent = name || '';
    spinning = false;
    document.getElementById('pickBtn').disabled = false;
    playSound();
    render();
  }, 1200);
}

function undo() {
  if (state.history.length === 0) return;
  state.history.shift();
  saveState();
  const bigNum = document.getElementById('bigNum');
  bigNum.textContent = '?';
  bigNum.classList.add('idle');
  bigNum.classList.remove('reveal');
  document.getElementById('bigName').textContent = '';
  render();
}

function resetAll() {
  if (state.history.length === 0) return;
  if (!confirm('要清空抽號歷史，重新開始嗎？')) return;
  state.history = [];
  saveState();
  const bigNum = document.getElementById('bigNum');
  bigNum.textContent = '?';
  bigNum.classList.add('idle');
  document.getElementById('bigName').textContent = '';
  render();
}

function render() {
  const r = AkaiRoster.load();
  const badge = document.getElementById('classBadge');
  badge.textContent = r.className ? `🏫 ${r.className} · ${r.count} 人` : `👥 ${r.count || 30} 人 · 未設定班級`;

  const histList = document.getElementById('historyList');
  if (state.history.length === 0) {
    histList.innerHTML = '<div style="color:var(--mute-2);font-size:13px;padding:20px;">還沒抽過喔～</div>';
  } else {
    histList.innerHTML = '';
    state.history.forEach(n => {
      const chip = document.createElement('span');
      chip.className = 'chip used';
      const name = AkaiRoster.getName(n);
      chip.innerHTML = name ? `<b>${n}</b> ${name}` : `<b>${n}</b>`;
      histList.appendChild(chip);
    });
  }

  const remList = document.getElementById('remainList');
  const remain = getRemain();
  document.getElementById('remainCount').textContent = remain.length;
  document.getElementById('remainTail').textContent = `${remain.length} 個`;
  if (remain.length === 0) {
    remList.innerHTML = '<div style="color:var(--g);font-size:14px;font-weight:700;padding:20px;">🎉 全部抽完了！</div>';
  } else {
    remList.innerHTML = '';
    remain.forEach(n => {
      const chip = document.createElement('span');
      chip.className = 'chip';
      const name = AkaiRoster.getName(n);
      chip.innerHTML = name ? `<b>${n}</b> ${name}` : `<b>${n}</b>`;
      remList.appendChild(chip);
    });
  }
}

function playSound() {
  if (!state.sound) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(800, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1600, ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    o.start();
    o.stop(ctx.currentTime + 0.3);
  } catch {}
}

document.getElementById('excludeUsed').checked = state.excludeUsed;
document.getElementById('sound').checked = state.sound;
document.getElementById('excludeUsed').onchange = (e) => { state.excludeUsed = e.target.checked; saveState(); render(); };
document.getElementById('sound').onchange = (e) => { state.sound = e.target.checked; saveState(); };

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
    pick();
  }
});

window.addEventListener('storage', (e) => {
  if (e.key === 'akai_roster_v1') render();
});
window.addEventListener('focus', render);

function flash(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(window._flashT);
  window._flashT = setTimeout(() => t.classList.remove('show'), 1800);
}

render();
</script>

</body>
</html>
