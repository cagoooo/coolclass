<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 隨機抽號 · 教室小幫手</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b9d">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    color: #2a3a4e;
    min-height: 100vh;
    background:
      radial-gradient(circle at 15% 15%, rgba(255,200,220,.5), transparent 50%),
      radial-gradient(circle at 85% 85%, rgba(255,230,180,.5), transparent 50%),
      linear-gradient(135deg, #fff5f8 0%, #fffaf0 100%);
  }
  .home-btn {
    position: fixed; top: 16px; left: 16px;
    background: #fff; border: 3px solid #ffc8d4; color: #c8568a;
    padding: 10px 18px; border-radius: 999px; font-weight: 700;
    text-decoration: none; font-size: 14px;
    box-shadow: 0 4px 12px rgba(255,150,180,.25); z-index: 100;
    transition: transform .2s;
  }
  .home-btn:hover { transform: translateY(-2px) scale(1.05); }

  header { text-align: center; padding: 50px 20px 10px; }
  header h1 {
    margin: 0; font-size: clamp(28px, 5vw, 44px); color: #c8568a;
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(255,180,200,.4);
  }
  header .sub { color: #8a6a9e; margin-top: 6px; font-size: 14px; }

  main { max-width: 900px; margin: 0 auto; padding: 10px 20px 60px; }

  .display-box {
    background: linear-gradient(135deg, #fff 0%, #fff5fa 100%);
    border-radius: 32px;
    padding: 40px 30px;
    margin: 24px 0;
    text-align: center;
    box-shadow: 0 16px 40px rgba(200,86,138,.18);
    border: 4px solid #ffd1dc;
    position: relative;
    overflow: hidden;
  }
  .display-box::before {
    content: '✨';
    position: absolute;
    top: 10px; left: 14px;
    font-size: 24px;
  }
  .display-box::after {
    content: '🎉';
    position: absolute;
    bottom: 10px; right: 14px;
    font-size: 24px;
  }

  .big-num {
    font-size: clamp(120px, 22vw, 240px);
    font-weight: 900;
    line-height: 1;
    color: #c8568a;
    text-shadow:
      4px 4px 0 #ffd1dc,
      8px 8px 0 #ffe5b8;
    transition: transform .3s;
    font-variant-numeric: tabular-nums;
  }
  .big-num.spinning {
    animation: spin .08s linear infinite;
  }
  @keyframes spin {
    0% { transform: scale(1) rotate(-2deg); }
    50% { transform: scale(1.05) rotate(2deg); }
    100% { transform: scale(1) rotate(-2deg); }
  }
  .big-num.reveal {
    animation: pop .6s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop {
    0% { transform: scale(.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .big-name {
    margin-top: 16px;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    color: #4a2a5e;
  }
  .big-empty {
    font-size: clamp(20px, 3vw, 28px);
    color: #aa8aae;
    font-weight: 700;
  }

  .actions {
    display: flex; gap: 12px; justify-content: center;
    flex-wrap: wrap; margin-top: 16px;
  }
  .big-btn {
    padding: 16px 36px;
    border-radius: 999px;
    border: none;
    font-weight: 900;
    font-size: 20px;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 8px 20px rgba(0,0,0,.15);
    transition: all .2s;
  }
  .big-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 28px rgba(0,0,0,.18); }
  .big-btn:active { transform: translateY(0) scale(.98); }
  .btn-pick { background: linear-gradient(135deg, #ff8aaa, #ffaa70); color: #fff; }
  .btn-undo { background: #fff; color: #c8568a; border: 3px solid #ffc8d4; }
  .btn-reset { background: #fff; color: #888; border: 3px solid #ddd; }

  .options {
    background: rgba(255,255,255,.85);
    border-radius: 20px;
    padding: 18px 22px;
    margin-top: 24px;
    box-shadow: 0 6px 16px rgba(200,150,180,.1);
  }
  .opt-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .opt-row label {
    font-weight: 700; color: #6a4a7e; font-size: 14px;
  }
  .toggle-switch {
    display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer;
  }
  .toggle-switch input { cursor: pointer; }

  /* 歷史 + 待抽號 */
  .panels {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-top: 18px;
  }
  @media (max-width: 700px) { .panels { grid-template-columns: 1fr; } }
  .panel-card {
    background: rgba(255,255,255,.85);
    border-radius: 20px;
    padding: 18px 22px;
    box-shadow: 0 6px 16px rgba(200,150,180,.1);
  }
  .panel-card h3 {
    margin: 0 0 10px; color: #c8568a; font-size: 16px;
  }
  .num-chip-list {
    display: flex; flex-wrap: wrap; gap: 6px;
    min-height: 60px;
  }
  .num-chip {
    padding: 6px 12px;
    background: #fff;
    border-radius: 999px;
    border: 2px solid #ffd1dc;
    font-weight: 700;
    font-size: 13px;
    color: #6a4a7e;
  }
  .num-chip.used {
    background: #ffd1dc;
    color: #fff;
    text-decoration: line-through;
  }
  .empty-tip {
    color: #aa8aae; font-size: 13px; text-align: center;
    padding: 20px;
  }
  .class-info {
    color: #8a6a9e; font-size: 13px; text-align: center;
    margin: 10px 0;
  }
  .class-info a { color: #c8568a; font-weight: 700; }

  footer {
    text-align: center; padding: 20px; font-size: 13px; color: #8a6a9e;
  }
  footer a { color: #c8568a; font-weight: 700; }
</style>
</head>
<body>

<a class="home-btn" href="index.html">← 回主頁</a>

<header>
  <h1>🎯 隨機抽號</h1>
  <p class="sub">公平的點人答題，誰都不會被偏心 ✨</p>
</header>

<main>

  <p class="class-info" id="classInfo"></p>

  <div class="display-box">
    <div class="big-num" id="bigNum">?</div>
    <div class="big-name" id="bigName"></div>
  </div>

  <div class="actions">
    <button class="big-btn btn-pick" id="pickBtn" onclick="pick()">🎲 抽一個！</button>
    <button class="big-btn btn-undo" onclick="undo()">↩️ 上一個</button>
    <button class="big-btn btn-reset" onclick="resetAll()">🔄 全部重抽</button>
  </div>

  <div class="options">
    <div class="opt-row">
      <label class="toggle-switch">
        <input type="checkbox" id="excludeUsed" checked>
        排除已抽過的（公平模式）
      </label>
      <label class="toggle-switch">
        <input type="checkbox" id="sound" checked>
        🔊 抽中時播放音效
      </label>
      <span style="flex:1;"></span>
      <a href="roster.html" style="color:#c8568a;font-weight:700;text-decoration:none;font-size:14px;">👥 編輯班級名單</a>
    </div>
  </div>

  <div class="panels">
    <div class="panel-card">
      <h3>📜 抽號歷史（最新在前）</h3>
      <div class="num-chip-list" id="historyList">
        <div class="empty-tip">還沒抽過喔～</div>
      </div>
    </div>
    <div class="panel-card">
      <h3>🎟️ 待抽號碼</h3>
      <div class="num-chip-list" id="remainList"></div>
    </div>
  </div>

</main>

<footer>
  Made with ❤️ by <a href="https://www.smes.tyc.edu.tw/modules/tadnews/page.php?ncsn=11&nsn=16#a5" target="_blank" rel="noopener">阿凱老師</a> · 桃園市龍潭區石門國民小學
</footer>

<script src="sw-update.js" defer></script>
<script src="roster.js"></script>
<script>
const STORAGE_KEY = 'akai_picker_v1';
const todayKey = () => new Date().toISOString().slice(0,10);

let state = loadState();
let spinning = false;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return {
      history: obj.history || [], // 本場抽過的（按時間順序）
      excludeUsed: obj.excludeUsed !== false,
      sound: obj.sound !== false,
      day: obj.day || todayKey(),
    };
  } catch { return { history: [], excludeUsed: true, sound: true, day: todayKey() }; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// 跨日自動重置
if (state.day !== todayKey()) {
  state.history = [];
  state.day = todayKey();
  saveState();
}

function getAllNums() {
  const r = AkaiRoster.load();
  const n = r.count || 30;
  const list = [];
  for (let i = 1; i <= n; i++) list.push(i);
  return list;
}

function getRemain() {
  const all = getAllNums();
  if (!state.excludeUsed) return all;
  const used = new Set(state.history);
  return all.filter(n => !used.has(n));
}

function pick() {
  if (spinning) return;
  const remain = getRemain();
  if (remain.length === 0) {
    flash('🎉 全班都抽過了！按「全部重抽」開始新一輪');
    return;
  }
  spinning = true;
  document.getElementById('pickBtn').disabled = true;
  const bigNum = document.getElementById('bigNum');
  bigNum.classList.add('spinning');
  bigNum.classList.remove('reveal');
  document.getElementById('bigName').textContent = '';

  // 動畫：先快速跳動 1.2 秒
  let ticks = 0;
  const allForAnim = getAllNums();
  const interval = setInterval(() => {
    bigNum.textContent = allForAnim[Math.floor(Math.random() * allForAnim.length)];
    ticks++;
  }, 60);

  setTimeout(() => {
    clearInterval(interval);
    const picked = remain[Math.floor(Math.random() * remain.length)];
    state.history.unshift(picked);
    saveState();
    bigNum.classList.remove('spinning');
    bigNum.classList.add('reveal');
    bigNum.textContent = picked;
    const name = AkaiRoster.getName(picked);
    document.getElementById('bigName').textContent = name ? `${name}` : '';
    spinning = false;
    document.getElementById('pickBtn').disabled = false;
    playSound();
    render();
  }, 1200);
}

function undo() {
  if (state.history.length === 0) return;
  state.history.shift();
  saveState();
  document.getElementById('bigNum').textContent = '?';
  document.getElementById('bigName').textContent = '';
  render();
}

function resetAll() {
  if (state.history.length === 0) return;
  if (!confirm('要清空抽號歷史，重新開始嗎？')) return;
  state.history = [];
  saveState();
  document.getElementById('bigNum').textContent = '?';
  document.getElementById('bigName').textContent = '';
  render();
}

function render() {
  // 班級資訊
  const r = AkaiRoster.load();
  const info = document.getElementById('classInfo');
  if (r.className) {
    info.innerHTML = `🏫 ${r.className} · 共 ${r.count} 位學生 · <a href="roster.html">編輯</a>`;
  } else {
    info.innerHTML = `👥 共 ${r.count || 30} 位學生 · <a href="roster.html">設定班級名單</a>`;
  }

  // 歷史
  const histList = document.getElementById('historyList');
  if (state.history.length === 0) {
    histList.innerHTML = '<div class="empty-tip">還沒抽過喔～</div>';
  } else {
    histList.innerHTML = '';
    state.history.forEach(n => {
      const chip = document.createElement('span');
      chip.className = 'num-chip used';
      const name = AkaiRoster.getName(n);
      chip.textContent = name ? `${n} ${name}` : `${n}`;
      histList.appendChild(chip);
    });
  }

  // 待抽
  const remList = document.getElementById('remainList');
  const remain = getRemain();
  if (remain.length === 0) {
    remList.innerHTML = '<div class="empty-tip">🎉 全部抽完了</div>';
  } else {
    remList.innerHTML = '';
    remain.forEach(n => {
      const chip = document.createElement('span');
      chip.className = 'num-chip';
      const name = AkaiRoster.getName(n);
      chip.textContent = name ? `${n} ${name}` : `${n}`;
      remList.appendChild(chip);
    });
  }
}

function playSound() {
  if (!state.sound) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(800, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1600, ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    o.start();
    o.stop(ctx.currentTime + 0.3);
  } catch {}
}

document.getElementById('excludeUsed').checked = state.excludeUsed;
document.getElementById('sound').checked = state.sound;
document.getElementById('excludeUsed').onchange = (e) => {
  state.excludeUsed = e.target.checked;
  saveState(); render();
};
document.getElementById('sound').onchange = (e) => {
  state.sound = e.target.checked;
  saveState();
};

// 空白鍵抽
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
    e.preventDefault();
    pick();
  }
});

window.addEventListener('storage', (e) => {
  if (e.key === 'akai_roster_v1') render();
});
window.addEventListener('focus', render);

function flash(text) {
  const el = document.createElement('div');
  el.textContent = text;
  el.style.cssText = `
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: #ff8aaa; color: #fff; padding: 12px 24px;
    border-radius: 999px; font-weight: 700; z-index: 9999;
    box-shadow: 0 8px 24px rgba(255,150,180,.4); font-size: 15px;
  `;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1800);
}

render();
</script>

</body>
</html>
