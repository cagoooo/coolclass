<script>
if (!window.AkaiRoster) {
  const KEY = 'akai_roster_v1';
  window.AkaiRoster = {
    load() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) return { className: '', count: 30, names: {} };
        const o = JSON.parse(raw);
        return { className: o.className || '', count: parseInt(o.count) || 30, names: o.names || {} };
      } catch { return { className: '', count: 30, names: {} }; }
    },
    getName(n) { return this.load().names[String(n)] || ''; }
  };
}
</script>

<script>
const STORAGE_KEY = 'akai_picker_v1';
const todayKey = () => new Date().toISOString().slice(0,10);

let state = loadState();
let spinning = false;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return {
      history: obj.history || [],
      excludeUsed: obj.excludeUsed !== false,
      sound: obj.sound !== false,
      day: obj.day || todayKey(),
      // v3.1 新增
      scope: obj.scope || 'all',                    // 'all' | 'range' | 'group'
      rangeFrom: obj.rangeFrom || 1,
      rangeTo: obj.rangeTo || 10,
      groupIdx: obj.groupIdx ?? 0,
      strategy: obj.strategy || 'random',           // 'random' | 'least'
      pickCounts: obj.pickCounts || {},             // { "5": 3 } 累積每號被抽次數
      voice: !!obj.voice,                            // v3.3：語音播報
    };
  } catch { return { history: [], excludeUsed: true, sound: true, day: todayKey(), scope: 'all', rangeFrom: 1, rangeTo: 10, groupIdx: 0, strategy: 'random', pickCounts: {}, voice: false }; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

if (state.day !== todayKey()) {
  state.history = [];
  state.day = todayKey();
  saveState();
}

function getAllNums() {
  const r = AkaiRoster.load();
  const n = r.count || 30;
  const list = [];
  for (let i = 1; i <= n; i++) list.push(i);
  return list;
}

/** 取得目前 scope 下的「候選號碼」（含當前範圍與分組設定，但還沒套用 excludeUsed） */
function getScopeNums() {
  const all = getAllNums();
  if (state.scope === 'range') {
    const from = Math.max(1, Math.min(state.rangeFrom, state.rangeTo));
    const to   = Math.min(all.length, Math.max(state.rangeFrom, state.rangeTo));
    return all.filter(n => n >= from && n <= to);
  }
  if (state.scope === 'group') {
    try {
      const g = JSON.parse(localStorage.getItem('akai_grouper_v1') || '{}');
      const groups = g.lastGroups || [];
      const idx = Math.min(state.groupIdx, groups.length - 1);
      if (idx >= 0 && groups[idx]) {
        return groups[idx].map(m => parseInt(m.num)).filter(n => !isNaN(n));
      }
    } catch {}
    return all; // fallback
  }
  return all;
}

function getRemain() {
  const scope = getScopeNums();
  if (!state.excludeUsed) return scope;
  const used = new Set(state.history);
  return scope.filter(n => !used.has(n));
}

/** 「最少被抽優先」策略：在候選裡找累積次數最少的那批，再從裡面隨機 */
function weightedPick(candidates) {
  if (candidates.length === 0) return null;
  if (state.strategy !== 'least') {
    return candidates[Math.floor(Math.random() * candidates.length)];
  }
  // 找最少次數
  let minCount = Infinity;
  candidates.forEach(n => {
    const c = state.pickCounts[String(n)] || 0;
    if (c < minCount) minCount = c;
  });
  const least = candidates.filter(n => (state.pickCounts[String(n)] || 0) === minCount);
  return least[Math.floor(Math.random() * least.length)];
}

function pick() {
  if (spinning) return;
  const remain = getRemain();
  if (remain.length === 0) {
    flash('🎉 全班都抽過了！按「全部重抽」開始新一輪');
    return;
  }
  spinning = true;
  document.getElementById('pickBtn').disabled = true;
  const bigNum = document.getElementById('bigNum');
  bigNum.classList.remove('idle', 'reveal');
  bigNum.classList.add('spinning');
  document.getElementById('bigName').textContent = '';

  const allForAnim = getAllNums();
  const interval = setInterval(() => {
    bigNum.textContent = allForAnim[Math.floor(Math.random() * allForAnim.length)];
  }, 60);

  setTimeout(() => {
    clearInterval(interval);
    const picked = weightedPick(remain);
    if (picked === null) { spinning = false; document.getElementById('pickBtn').disabled = false; return; }
    state.history.unshift(picked);
    state.pickCounts[String(picked)] = (state.pickCounts[String(picked)] || 0) + 1;
    saveState();
    bigNum.classList.remove('spinning');
    bigNum.classList.add('reveal');
    bigNum.textContent = picked;
    const name = AkaiRoster.getName(picked);
    document.getElementById('bigName').textContent = name || '';
    spinning = false;
    document.getElementById('pickBtn').disabled = false;
    playSound();
    // v3.3：語音播報
    if (state.voice) speakStudent(picked, name);
    // v3.4 G2：顯示快速加積點按鈕
    const qa = document.getElementById('quickActions');
    if (qa) { qa.style.display = 'flex'; qa.dataset.num = picked; }
    render();
  }, 1200);
}

/** v3.4 G2：給剛抽中的學生加積點（寫 akai_points_v1） */
function addPointToPicked(delta) {
  const qa = document.getElementById('quickActions');
  const num = parseInt(qa.dataset.num);
  if (!num) return;
  try {
    const raw = localStorage.getItem('akai_points_v1');
    const pts = raw ? JSON.parse(raw) : { mode: 'individual', points: {}, groupPoints: {}, lastChange: {} };
    if (!pts.points) pts.points = {};
    if (!pts.lastChange) pts.lastChange = {};
    const k = String(num);
    pts.points[k] = (pts.points[k] || 0) + delta;
    pts.lastChange[k] = new Date().toISOString();
    localStorage.setItem('akai_points_v1', JSON.stringify(pts));
    const name = AkaiRoster.getName(num);
    const label = name ? `${num} 號 ${name}` : `${num} 號`;
    const sign = delta > 0 ? '+' : '';
    flash(`🏆 ${label} ${sign}${delta} 積點（目前 ${pts.points[k]}）`);
  } catch (e) {
    flash('加積點失敗：' + e.message);
  }
}

/** v3.3：語音播報「N 號 ○○○」用 speechSynthesis（中文）*/
function speakStudent(num, name) {
  try {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();  // 取消佇列
    const text = name ? `${num} 號，${name}` : `${num} 號`;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-TW';
    u.rate = 0.95;
    u.pitch = 1.05;
    u.volume = 0.9;
    // 偏好台灣中文女聲（若有）
    const voices = window.speechSynthesis.getVoices();
    const zhVoice = voices.find(v => /zh-TW|zh_TW/i.test(v.lang)) || voices.find(v => /zh/i.test(v.lang));
    if (zhVoice) u.voice = zhVoice;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}
// 預載語音清單（有些瀏覽器要 onvoiceschanged 才會給）
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => {};
}

function undo() {
  if (state.history.length === 0) return;
  state.history.shift();
  saveState();
  const bigNum = document.getElementById('bigNum');
  bigNum.textContent = '?';
  bigNum.classList.add('idle');
  bigNum.classList.remove('reveal');
  document.getElementById('bigName').textContent = '';
  const qa = document.getElementById('quickActions'); if (qa) qa.style.display = 'none';
  render();
}

function resetAll() {
  if (state.history.length === 0) return;
  if (!confirm('要清空抽號歷史，重新開始嗎？')) return;
  state.history = [];
  saveState();
  const bigNum = document.getElementById('bigNum');
  bigNum.textContent = '?';
  bigNum.classList.add('idle');
  document.getElementById('bigName').textContent = '';
  const qa = document.getElementById('quickActions'); if (qa) qa.style.display = 'none';
  render();
}

function render() {
  const r = AkaiRoster.load();
  const badge = document.getElementById('classBadge');
  badge.textContent = r.className ? `🏫 ${r.className} · ${r.count} 人` : `👥 ${r.count || 30} 人 · 未設定班級`;

  const histList = document.getElementById('historyList');
  if (state.history.length === 0) {
    histList.innerHTML = '<div style="color:var(--mute-2);font-size:13px;padding:20px;">還沒抽過喔～</div>';
  } else {
    histList.innerHTML = '';
    state.history.forEach(n => {
      const chip = document.createElement('span');
      chip.className = 'chip used';
      const name = AkaiRoster.getName(n);
      chip.innerHTML = name ? `<b>${n}</b> ${name}` : `<b>${n}</b>`;
      histList.appendChild(chip);
    });
  }

  const remList = document.getElementById('remainList');
  const remain = getRemain();
  document.getElementById('remainCount').textContent = remain.length;
  document.getElementById('remainTail').textContent = `${remain.length} 個`;
  if (remain.length === 0) {
    remList.innerHTML = '<div style="color:var(--g);font-size:14px;font-weight:700;padding:20px;">🎉 全部抽完了！</div>';
  } else {
    remList.innerHTML = '';
    remain.forEach(n => {
      const chip = document.createElement('span');
      chip.className = 'chip';
      const name = AkaiRoster.getName(n);
      chip.innerHTML = name ? `<b>${n}</b> ${name}` : `<b>${n}</b>`;
      remList.appendChild(chip);
    });
  }
}

function playSound() {
  if (!state.sound) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(800, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1600, ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    o.start();
    o.stop(ctx.currentTime + 0.3);
  } catch {}
}

document.getElementById('excludeUsed').checked = state.excludeUsed;
document.getElementById('sound').checked = state.sound;
document.getElementById('excludeUsed').onchange = (e) => { state.excludeUsed = e.target.checked; saveState(); render(); };
document.getElementById('sound').onchange = (e) => { state.sound = e.target.checked; saveState(); };
document.getElementById('voice').checked = state.voice;
document.getElementById('voice').onchange = (e) => { state.voice = e.target.checked; saveState(); if (e.target.checked) speakStudent(0, '已啟用語音'); };

// ===== v3.1：範圍 + 策略 =====
function syncScopeUI() {
  document.querySelectorAll('#scopePick button').forEach(b => {
    b.classList.toggle('on', b.dataset.scope === state.scope);
  });
  document.getElementById('rangeRow').style.display = state.scope === 'range' ? '' : 'none';
  document.getElementById('groupRow').style.display = state.scope === 'group' ? '' : 'none';

  const r = AkaiRoster.load();
  let hint = '';
  if (state.scope === 'all') hint = `＝ 1～${r.count || 30} 號全部`;
  else if (state.scope === 'range') hint = `＝ ${Math.min(state.rangeFrom, state.rangeTo)}～${Math.max(state.rangeFrom, state.rangeTo)} 號`;
  else if (state.scope === 'group') {
    try {
      const g = JSON.parse(localStorage.getItem('akai_grouper_v1') || '{}');
      const groups = g.lastGroups || [];
      hint = groups.length > 0 ? `＝ 第 ${state.groupIdx + 1} 組，共 ${groups[state.groupIdx]?.length || 0} 人` : `＝ 還沒分組，請先去「隨機分組」`;
    } catch { hint = ''; }
  }
  document.getElementById('scopeHint').textContent = hint;

  // 填組別下拉
  if (state.scope === 'group') {
    const sel = document.getElementById('groupSelect');
    try {
      const g = JSON.parse(localStorage.getItem('akai_grouper_v1') || '{}');
      const groups = g.lastGroups || [];
      sel.innerHTML = groups.length === 0
        ? '<option value="">（還沒分組）</option>'
        : groups.map((gr, i) => `<option value="${i}"${i===state.groupIdx?' selected':''}>第 ${i+1} 組（${gr.length} 人）</option>`).join('');
    } catch {}
  }
}

function syncStrategyUI() {
  document.querySelectorAll('#strategyPick button').forEach(b => {
    b.classList.toggle('on', b.dataset.strategy === state.strategy);
  });
  document.getElementById('strategyHint').textContent =
    state.strategy === 'random'
      ? '＝ 每次都從候選裡隨機抽'
      : '＝ 累積最少被抽過的優先（更公平）';
}

document.querySelectorAll('#scopePick button').forEach(b => {
  b.onclick = () => { state.scope = b.dataset.scope; saveState(); syncScopeUI(); render(); };
});
document.querySelectorAll('#strategyPick button').forEach(b => {
  b.onclick = () => { state.strategy = b.dataset.strategy; saveState(); syncStrategyUI(); render(); };
});

['rangeFrom','rangeTo'].forEach(id => {
  const el = document.getElementById(id);
  el.value = state[id];
  el.onchange = (e) => {
    state[id] = Math.max(1, parseInt(e.target.value) || 1);
    saveState(); syncScopeUI(); render();
  };
});
document.getElementById('groupSelect').onchange = (e) => {
  state.groupIdx = parseInt(e.target.value) || 0;
  saveState(); syncScopeUI(); render();
};

syncScopeUI();
syncStrategyUI();

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
    pick();
  }
});

window.addEventListener('storage', (e) => {
  if (e.key === 'akai_roster_v1') render();
});
window.addEventListener('focus', render);

function flash(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(window._flashT);
  window._flashT = setTimeout(() => t.classList.remove('show'), 1800);
}

render();
</script>
