<style>

  .tut-head { display: flex; align-items: flex-start; gap: 10px; }

let currentCat = '';
let currentSearch = '';

function render() {
  const grid = document.getElementById('grid');
  let filtered = TUTORIALS.filter(t => {
    if (currentCat && t.cat !== currentCat) return false;
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      const hay = `${t.t} ${t.scene} ${t.catLabel} ${t.steps}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  document.getElementById('visibleCount').textContent = filtered.length;
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-msg" style="grid-column:1/-1;">找不到符合的工具 🤔<br>試試其他關鍵字或選擇「全部」</div>';
    return;
  }
  grid.innerHTML = filtered.map(t => `
    <div class="tut-card">
      <div class="tut-head">
        <div class="num">${t.n}</div>
        <div class="titles">
          <h3>${t.emo} ${escapeHtml(t.t)}</h3>
          <div class="cat">${t.catLabel}</div>
        </div>
      </div>
      <div class="tut-preview">
        <span class="big-emoji">${t.emo}</span>
        <small>（GIF 範例將陸續錄製補上）</small>
      </div>
      <div class="tut-scene">${escapeHtml(t.scene)}</div>
      <div class="tut-steps">${escapeHtml(t.steps)}</div>
      <div class="tut-actions">
        <a href="${t.f}">▶ 立刻試試</a>
        <a class="ghost" href="${t.f}" target="_blank">↗ 新分頁</a>
      </div>
    </div>
  `).join('');
}

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// 分類 chip
document.querySelectorAll('.chip[data-cat]').forEach(c => {
  c.onclick = () => {
    currentCat = c.dataset.cat;
    document.querySelectorAll('.chip[data-cat]').forEach(x => x.classList.toggle('on', x === c));
    render();
  };
});

// 搜尋
let searchT;
document.getElementById('searchInp').addEventListener('input', (e) => {
  clearTimeout(searchT);
  searchT = setTimeout(() => {
    currentSearch = e.target.value.trim();
    render();
  }, 200);
});

render();
</script>
