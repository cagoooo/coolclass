<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 班級 To-Do List · 阿凱老師的教室小幫手</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#80c890">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    color: #4a4a4a;
    min-height: 100vh;
    background:
      radial-gradient(circle at 10% 10%, rgba(255,200,200,.4), transparent 40%),
      radial-gradient(circle at 50% 10%, rgba(255,240,180,.4), transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(200,240,200,.4), transparent 40%),
      linear-gradient(180deg, #fff9f0 0%, #f0fff5 100%);
  }
  .home-btn {
    position: fixed; top: 16px; left: 16px;
    background: #fff; border: 3px solid #c8f0d0; color: #4a8a5e;
    padding: 10px 18px; border-radius: 999px; font-weight: 700;
    text-decoration: none; font-size: 14px;
    box-shadow: 0 4px 12px rgba(150,200,160,.25); z-index: 100;
    transition: transform .2s;
  }
  .home-btn:hover { transform: translateY(-2px) scale(1.05); }

  header {
    text-align: center; padding: 50px 20px 16px;
  }
  header h1 {
    margin: 0; font-size: clamp(28px, 5vw, 42px); color: #4a4a6e;
    text-shadow: 2px 2px 0 #fff;
  }
  header .sub {
    color: #7a7a8e; margin-top: 8px; font-size: 14px;
  }

  .top-bar {
    max-width: 1300px; margin: 10px auto; padding: 0 20px;
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  }
  .top-bar button {
    padding: 10px 20px; border-radius: 999px; border: none;
    font-weight: 700; cursor: pointer; font-family: inherit;
    box-shadow: 0 3px 10px rgba(0,0,0,.08);
    transition: transform .2s; font-size: 14px;
  }
  .top-bar button:hover { transform: translateY(-2px); }
  .top-bar .save { background: #95c5e6; color: #fff; }
  .top-bar .reset { background: #ffaa90; color: #fff; }
  .top-bar .export { background: #c8a8e6; color: #fff; }
  .top-bar .info { background: #fff; color: #888; }

  .board {
    max-width: 1400px; margin: 20px auto 80px; padding: 0 20px;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  @media (max-width: 900px) {
    .board { grid-template-columns: 1fr; }
  }
  .column {
    background: rgba(255,255,255,.85);
    border-radius: 24px;
    padding: 18px;
    min-height: 400px;
    border: 4px solid;
    box-shadow: 0 8px 24px rgba(0,0,0,.06);
    backdrop-filter: blur(6px);
    display: flex; flex-direction: column;
  }
  .column.red    { border-color: #ff9090; background: linear-gradient(180deg, rgba(255,224,224,.7), rgba(255,255,255,.85)); }
  .column.yellow { border-color: #ffd060; background: linear-gradient(180deg, rgba(255,244,200,.7), rgba(255,255,255,.85)); }
  .column.green  { border-color: #80c890; background: linear-gradient(180deg, rgba(216,244,224,.7), rgba(255,255,255,.85)); }

  .col-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .col-head .ico { font-size: 32px; }
  .col-head .title { font-size: 22px; font-weight: 900; }
  .col-head .count {
    margin-left: auto; background: #fff; padding: 4px 12px;
    border-radius: 999px; font-weight: 700; font-size: 14px;
    border: 2px solid currentColor;
  }
  .column.red .col-head { color: #d04040; }
  .column.yellow .col-head { color: #c08010; }
  .column.green .col-head { color: #2e8050; }

  .add-btn {
    width: 100%; padding: 12px; border-radius: 16px; border: 3px dashed;
    background: rgba(255,255,255,.6); cursor: pointer; font-family: inherit;
    font-weight: 700; font-size: 15px; transition: all .2s;
    margin-bottom: 12px;
  }
  .column.red .add-btn    { border-color: #ff9090; color: #d04040; }
  .column.yellow .add-btn { border-color: #ffd060; color: #c08010; }
  .column.green .add-btn  { border-color: #80c890; color: #2e8050; }
  .add-btn:hover { background: #fff; transform: translateY(-2px); }

  .items {
    flex: 1; display: flex; flex-direction: column; gap: 10px;
    min-height: 100px;
    padding: 6px; border-radius: 16px;
    transition: background .2s;
  }
  .items.drag-over {
    background: rgba(0,0,0,.05);
    box-shadow: inset 0 0 0 3px rgba(0,0,0,.1);
  }

  .item {
    background: #fff; border-radius: 14px; padding: 12px 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,.08);
    cursor: grab;
    border-left: 5px solid;
    transition: transform .2s, box-shadow .2s;
  }
  .item:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.12); }
  .item.dragging { opacity: .4; cursor: grabbing; }
  .item.red    { border-left-color: #ff7070; }
  .item.yellow { border-left-color: #ffc040; }
  .item.green  { border-left-color: #60b080; }

  .item-row {
    display: flex; align-items: flex-start; gap: 8px;
  }
  .item-title {
    flex: 1; font-weight: 700; font-size: 16px; color: #2a2a3e;
    outline: none; min-height: 22px;
    word-break: break-word;
  }
  .item-title:focus, .item-note:focus {
    background: #fff8dc; border-radius: 6px;
    box-shadow: 0 0 0 2px #ffd060;
  }
  .item-del {
    background: transparent; border: none; cursor: pointer;
    font-size: 18px; color: #c0c0c0; padding: 0 4px;
    line-height: 1;
  }
  .item-del:hover { color: #ff6060; }
  .item-note {
    margin-top: 8px; font-size: 13px; color: #6a6a8e;
    outline: none; min-height: 16px; line-height: 1.5;
    word-break: break-word;
  }
  .item-note:empty::before {
    content: '📝 點這裡寫備註…';
    color: #c0c0d0;
  }

  .empty {
    text-align: center; color: #aaa; padding: 30px 10px; font-size: 13px;
    border: 2px dashed #ddd; border-radius: 14px;
  }

  .save-status {
    position: fixed; bottom: 20px; right: 20px;
    background: #fff; padding: 8px 16px; border-radius: 999px;
    font-size: 13px; color: #4a8a5e;
    box-shadow: 0 4px 12px rgba(0,0,0,.1);
    opacity: 0; transition: opacity .3s;
    pointer-events: none;
  }
  .save-status.show { opacity: 1; }

  footer {
    text-align: center; padding: 20px; font-size: 13px; color: #8a7a9e;
  }
  footer a { color: #6a4a8e; font-weight: 700; }
</style>
</head>
<body>

<a class="home-btn" href="index.html">← 回主頁</a>

<header>
  <h1>📝 班級 To-Do List 任務牆</h1>
  <p class="sub">紅色 = 最緊急 · 黃色 = 進行中 · 綠色 = 準備區　|　拖曳卡片在欄位之間移動</p>
</header>

<div class="top-bar">
  <button class="save" onclick="saveNow()">💾 立即存檔</button>
  <button class="export" onclick="exportData()">📤 匯出備份</button>
  <button class="info" onclick="importData()">📥 匯入備份</button>
  <button class="reset" onclick="resetAll()">🔄 全部重置</button>
</div>

<div class="board" id="board">
  <div class="column red" data-col="red">
    <div class="col-head">
      <span class="ico">🔴</span>
      <span class="title">最緊急</span>
      <span class="count" id="count-red">0</span>
    </div>
    <button class="add-btn" onclick="addItem('red')">＋ 新增緊急項目</button>
    <div class="items" id="items-red"></div>
  </div>

  <div class="column yellow" data-col="yellow">
    <div class="col-head">
      <span class="ico">🟡</span>
      <span class="title">進行中</span>
      <span class="count" id="count-yellow">0</span>
    </div>
    <button class="add-btn" onclick="addItem('yellow')">＋ 新增進行項目</button>
    <div class="items" id="items-yellow"></div>
  </div>

  <div class="column green" data-col="green">
    <div class="col-head">
      <span class="ico">🟢</span>
      <span class="title">準備區</span>
      <span class="count" id="count-green">0</span>
    </div>
    <button class="add-btn" onclick="addItem('green')">＋ 新增待辦項目</button>
    <div class="items" id="items-green"></div>
  </div>
</div>

<div class="save-status" id="saveStatus">✓ 已自動存檔</div>

<footer>
  Made with ❤️ by <a href="https://www.smes.tyc.edu.tw/modules/tadnews/page.php?ncsn=11&nsn=16#a5" target="_blank" rel="noopener">阿凱老師</a> · 桃園市龍潭區石門國民小學
</footer>

<script src="sw-update.js" defer></script>
<script>
const STORAGE_KEY = 'akai_todo_v1';
const COLS = ['red', 'yellow', 'green'];

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { red: [], yellow: [], green: [] };
    const obj = JSON.parse(raw);
    COLS.forEach(c => { if (!Array.isArray(obj[c])) obj[c] = []; });
    return obj;
  } catch(e) { return { red: [], yellow: [], green: [] }; }
}

function saveState(silent) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if (!silent) {
    const el = document.getElementById('saveStatus');
    el.classList.add('show');
    clearTimeout(window._saveT);
    window._saveT = setTimeout(() => el.classList.remove('show'), 1200);
  }
}

function uid() { return 't_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

function addItem(col) {
  state[col].push({ id: uid(), title: '新項目', note: '' });
  saveState();
  render();
  // focus 新加的
  setTimeout(() => {
    const wrap = document.getElementById('items-' + col);
    const last = wrap.lastElementChild;
    if (last) {
      const t = last.querySelector('.item-title');
      t.focus();
      // 選取全文
      const range = document.createRange();
      range.selectNodeContents(t);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
  }, 30);
}

function deleteItem(col, id) {
  state[col] = state[col].filter(x => x.id !== id);
  saveState();
  render();
}

function updateField(col, id, field, value) {
  const it = state[col].find(x => x.id === id);
  if (!it) return;
  it[field] = value;
  saveState();
}

function render() {
  COLS.forEach(col => {
    const wrap = document.getElementById('items-' + col);
    const cnt = document.getElementById('count-' + col);
    cnt.textContent = state[col].length;
    wrap.innerHTML = '';
    if (state[col].length === 0) {
      const e = document.createElement('div');
      e.className = 'empty';
      e.textContent = '空空的～拖個卡片過來，或按上面的 ＋ 新增';
      wrap.appendChild(e);
      return;
    }
    state[col].forEach(item => {
      const el = document.createElement('div');
      el.className = 'item ' + col;
      el.draggable = true;
      el.dataset.id = item.id;
      el.dataset.col = col;
      el.innerHTML = `
        <div class="item-row">
          <div class="item-title" contenteditable="true" spellcheck="false"></div>
          <button class="item-del" title="刪除">✕</button>
        </div>
        <div class="item-note" contenteditable="true" spellcheck="false"></div>
      `;
      const titleEl = el.querySelector('.item-title');
      const noteEl = el.querySelector('.item-note');
      titleEl.textContent = item.title;
      noteEl.textContent = item.note;

      titleEl.addEventListener('input', () => updateField(col, item.id, 'title', titleEl.textContent));
      noteEl.addEventListener('input', () => updateField(col, item.id, 'note', noteEl.textContent));
      titleEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); noteEl.focus(); }
      });

      el.querySelector('.item-del').addEventListener('click', () => {
        if (confirm('要刪掉這個項目嗎？')) deleteItem(col, item.id);
      });

      // 拖曳
      el.addEventListener('dragstart', (e) => {
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', JSON.stringify({ id: item.id, from: col }));
      });
      el.addEventListener('dragend', () => el.classList.remove('dragging'));

      wrap.appendChild(el);
    });
  });
}

// 拖放目標
COLS.forEach(col => {
  const wrap = document.getElementById('items-' + col);
  wrap.addEventListener('dragover', (e) => {
    e.preventDefault();
    wrap.classList.add('drag-over');
  });
  wrap.addEventListener('dragleave', (e) => {
    if (!wrap.contains(e.relatedTarget)) wrap.classList.remove('drag-over');
  });
  wrap.addEventListener('drop', (e) => {
    e.preventDefault();
    wrap.classList.remove('drag-over');
    let data;
    try { data = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
    const { id, from } = data;
    if (from === col) {
      // 在同欄重新排序
      reorder(col, id, e.clientY);
    } else {
      // 跨欄移動
      const idx = state[from].findIndex(x => x.id === id);
      if (idx < 0) return;
      const [moved] = state[from].splice(idx, 1);
      // 找放下位置
      const items = [...wrap.querySelectorAll('.item:not(.dragging)')];
      const after = items.find(child => {
        const r = child.getBoundingClientRect();
        return e.clientY < r.top + r.height / 2;
      });
      if (after) {
        const insertIdx = state[col].findIndex(x => x.id === after.dataset.id);
        state[col].splice(insertIdx, 0, moved);
      } else {
        state[col].push(moved);
      }
    }
    saveState();
    render();
  });
});

function reorder(col, id, clientY) {
  const wrap = document.getElementById('items-' + col);
  const items = [...wrap.querySelectorAll('.item:not(.dragging)')];
  const after = items.find(child => {
    if (child.dataset.id === id) return false;
    const r = child.getBoundingClientRect();
    return clientY < r.top + r.height / 2;
  });
  const idx = state[col].findIndex(x => x.id === id);
  if (idx < 0) return;
  const [moved] = state[col].splice(idx, 1);
  if (after) {
    const insertIdx = state[col].findIndex(x => x.id === after.dataset.id);
    state[col].splice(insertIdx, 0, moved);
  } else {
    state[col].push(moved);
  }
}

function saveNow() {
  saveState();
}

function resetAll() {
  if (!confirm('要清掉三個欄位裡所有的項目嗎？這個動作沒辦法復原喔！')) return;
  state = { red: [], yellow: [], green: [] };
  saveState();
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `todo_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'application/json';
  inp.onchange = () => {
    const file = inp.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(reader.result);
        COLS.forEach(c => { if (!Array.isArray(obj[c])) obj[c] = []; });
        if (!confirm('要用這個備份覆蓋目前的資料嗎？')) return;
        state = obj;
        saveState();
        render();
      } catch { alert('檔案格式不對 :('); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

render();
</script>

</body>
</html>
