<link rel="stylesheet" href="crayon.css">
<style>
  /* 任務牆 */
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  @media (max-width: 900px) {
    .board { grid-template-columns: 1fr; }
  }
  .col {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: var(--rad-lg);
    padding: 18px 16px 20px;
    min-height: 460px;
    box-shadow: var(--shadow);
    display: flex; flex-direction: column;
    position: relative;
  }
  .col.red    { background: var(--r); color: #fff; }
  .col.yellow { background: var(--y); color: var(--ink); }
  .col.green  { background: var(--g); color: #1a3e22; }

  .col-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
    border-bottom: 3px solid currentColor;
    padding-bottom: 12px;
  }
  .col-head .ico {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--ink);
    color: currentColor;
    border: 3px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900;
    flex-shrink: 0;
    font-size: 18px;
  }
  .col.red    .col-head .ico { background: #fff; color: var(--r); border-color: #fff; }
  .col.yellow .col-head .ico { background: var(--ink); color: var(--y); border-color: var(--ink); }
  .col.green  .col-head .ico { background: #1a3e22; color: var(--g); border-color: #1a3e22; }

  .col-head .title { font-weight: 900; font-size: 22px; line-height: 1; }
  .col-head .title small { display:block; font-weight: 500; font-size: 12px; opacity: .8; margin-top: 2px; font-family: 'Fraunces',serif; font-style: italic; }
  .col-head .count {
    margin-left: auto;
    background: #fff; color: var(--ink);
    border: 2px solid var(--ink);
    padding: 4px 12px;
    border-radius: 999px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 900;
    font-size: 16px;
  }
  .col.yellow .col-head .count { background: var(--ink); color: var(--y); }

  .add-btn {
    width: 100%;
    background: rgba(255,255,255,.6);
    border: 3px dashed var(--ink);
    border-radius: var(--rad-sm);
    padding: 12px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
    margin-bottom: 12px;
    transition: transform .12s, background .12s;
  }
  .col.red .add-btn   { background: rgba(255,255,255,.18); border-color: #fff; color: #fff; }
  .col.green .add-btn { background: rgba(255,255,255,.5); color: #1a3e22; border-color: #1a3e22; }
  .add-btn:hover {
    background: rgba(255,255,255,.9);
    transform: translateY(-2px);
  }
  .col.red .add-btn:hover { background: #fff; color: var(--r); }

  .items {
    flex: 1;
    display: flex; flex-direction: column; gap: 10px;
    min-height: 100px;
    padding: 4px;
    border-radius: var(--rad-sm);
    transition: background .15s, box-shadow .15s;
  }
  .items.drag-over {
    background: rgba(255,255,255,.5);
    box-shadow: inset 0 0 0 3px var(--ink);
  }

  .item {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: var(--rad-sm);
    padding: 12px 14px;
    box-shadow: 3px 3px 0 var(--ink);
    cursor: grab;
    color: var(--ink);
    transition: transform .15s, box-shadow .15s;
  }
  .item:hover {
    transform: translate(-2px, -2px);
    box-shadow: 5px 5px 0 var(--ink);
  }
  .item.dragging { opacity: .4; cursor: grabbing; }

  .item-row {
    display: flex; align-items: flex-start; gap: 8px;
  }
  .item-title {
    flex: 1; font-weight: 700; font-size: 16px;
    outline: none; min-height: 22px;
    word-break: break-word;
    line-height: 1.4;
  }
  .item-title:focus, .item-note:focus {
    background: var(--y);
    border-radius: 6px;
    box-shadow: 0 0 0 3px var(--ink);
  }
  .item-del {
    background: var(--ink); color: #fff;
    border: none; cursor: pointer;
    font-size: 12px;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    line-height: 1;
  }
  .item-del:hover { background: var(--r); }
  .item-note {
    margin-top: 8px; font-size: 13px;
    color: var(--muted);
    outline: none; min-height: 16px;
    line-height: 1.55;
    word-break: break-word;
  }
  .item-note:empty::before {
    content: '✎ 點這裡寫備註…';
    color: var(--mute-2);
  }

  .col-empty {
    text-align: center;
    color: rgba(0,0,0,.45);
    padding: 30px 10px;
    font-size: 13px;
    border: 2px dashed currentColor;
    border-radius: var(--rad-sm);
  }
  .col.red    .col-empty { color: rgba(255,255,255,.7); }
  .col.green  .col-empty { color: rgba(26,62,34,.55); }
</style>
<script src="tweaks.js"></script>
</head>
<body>

<div class="bg-deco" aria-hidden="true">
  <span class="blob blob-y"></span>
  <span class="blob blob-b"></span>
  <span class="dots dots-1"></span>
  <span class="squig squig-2"></span>
</div>

<a class="home-btn" href="index.html">← 回主頁</a>

<div class="wrap wide">

  <section class="page-hero">
    <div>
      <span class="eyebrow">KANBAN · 三色任務牆</span>
      <h1>把今天的事 <em>拆開</em>，<br>一張一張放上來。</h1>
      <p class="sub">
        <b>🔴 最緊急</b>　·　<b>🟡 進行中</b>　·　<b>🟢 準備區</b>　·　卡片可以在欄位間拖曳，內容會自動存檔。
      </p>
    </div>
    <div class="right-aux">
      <span class="big" id="heroTotal">0</span>
      <span class="sml">項任務</span>
    </div>
  </section>

  <div class="btn-bar center" style="margin-bottom: 22px;">
    <button class="btn b" onclick="saveNow()">💾 立即存檔</button>
    <button class="btn p" onclick="exportData()">📤 匯出備份</button>
    <button class="btn" onclick="importData()">📥 匯入備份</button>
    <button class="btn r" onclick="resetAll()">🔄 全部重置</button>
  </div>

  <div class="board" id="board">
    <div class="col red" data-col="red">
      <div class="col-head">
        <span class="ico">🔥</span>
        <div class="title">最緊急<small>red · do first</small></div>
        <span class="count" id="count-red">0</span>
      </div>
      <button class="add-btn" onclick="addItem('red')">＋ 新增緊急項目</button>
      <div class="items" id="items-red"></div>
    </div>

    <div class="col yellow" data-col="yellow">
      <div class="col-head">
        <span class="ico">⏳</span>
        <div class="title">進行中<small>yellow · in progress</small></div>
        <span class="count" id="count-yellow">0</span>
      </div>
      <button class="add-btn" onclick="addItem('yellow')">＋ 新增進行項目</button>
      <div class="items" id="items-yellow"></div>
    </div>

    <div class="col green" data-col="green">
      <div class="col-head">
        <span class="ico">✓</span>
        <div class="title">準備區<small>green · todo / done</small></div>
        <span class="count" id="count-green">0</span>
      </div>
      <button class="add-btn" onclick="addItem('green')">＋ 新增待辦項目</button>
      <div class="items" id="items-green"></div>
    </div>
  </div>

  <footer class="f">
    Made with ♥ by <a href="https://www.smes.tyc.edu.tw/modules/tadnews/page.php?ncsn=11&nsn=16#a5" target="_blank" rel="noopener">阿凱老師</a> · 桃園市龍潭區石門國民小學
    <div class="ver">© 2026 · v3 “Crayon Pop”</div>
  </footer>
</div>

<div class="toast" id="toast">已存檔</div>

<script src="sw-update.js" defer></script>
<script>
const STORAGE_KEY = 'akai_todo_v1';
const COLS = ['red', 'yellow', 'green'];

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { red: [], yellow: [], green: [] };
    const obj = JSON.parse(raw);
    COLS.forEach(c => { if (!Array.isArray(obj[c])) obj[c] = []; });
    return obj;
  } catch(e) { return { red: [], yellow: [], green: [] }; }
}

function saveState(silent) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  updateTotal();
  if (!silent) flash('✓ 已自動存檔');
}

function updateTotal() {
  let t = 0;
  COLS.forEach(c => t += state[c].length);
  document.getElementById('heroTotal').textContent = t;
}

function uid() { return 't_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

function addItem(col) {
  state[col].push({ id: uid(), title: '新項目', note: '' });
  saveState(true);
  render();
  setTimeout(() => {
    const wrap = document.getElementById('items-' + col);
    const last = wrap.lastElementChild;
    if (last) {
      const t = last.querySelector('.item-title');
      t.focus();
      const range = document.createRange();
      range.selectNodeContents(t);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
  }, 30);
}

function deleteItem(col, id) {
  state[col] = state[col].filter(x => x.id !== id);
  saveState(true);
  render();
}

function updateField(col, id, field, value) {
  const it = state[col].find(x => x.id === id);
  if (!it) return;
  it[field] = value;
  saveState();
}

function render() {
  COLS.forEach(col => {
    const wrap = document.getElementById('items-' + col);
    const cnt = document.getElementById('count-' + col);
    cnt.textContent = state[col].length;
    wrap.innerHTML = '';
    if (state[col].length === 0) {
      const e = document.createElement('div');
      e.className = 'col-empty';
      e.textContent = '空空的～拖個卡片過來，或按上面的 ＋ 新增';
      wrap.appendChild(e);
      return;
    }
    state[col].forEach(item => {
      const el = document.createElement('div');
      el.className = 'item';
      el.draggable = true;
      el.dataset.id = item.id;
      el.dataset.col = col;
      el.innerHTML = `
        <div class="item-row">
          <div class="item-title" contenteditable="true" spellcheck="false"></div>
          <button class="item-del" title="刪除">✕</button>
        </div>
        <div class="item-note" contenteditable="true" spellcheck="false"></div>
      `;
      const titleEl = el.querySelector('.item-title');
      const noteEl = el.querySelector('.item-note');
      titleEl.textContent = item.title;
      noteEl.textContent = item.note;

      titleEl.addEventListener('input', () => updateField(col, item.id, 'title', titleEl.textContent));
      noteEl.addEventListener('input', () => updateField(col, item.id, 'note', noteEl.textContent));
      titleEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); noteEl.focus(); }
      });

      el.querySelector('.item-del').addEventListener('click', () => {
        if (confirm('要刪掉這個項目嗎？')) deleteItem(col, item.id);
      });

      el.addEventListener('dragstart', (e) => {
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', JSON.stringify({ id: item.id, from: col }));
      });
      el.addEventListener('dragend', () => el.classList.remove('dragging'));

      wrap.appendChild(el);
    });
  });
  updateTotal();
}

COLS.forEach(col => {
  const wrap = document.getElementById('items-' + col);
  wrap.addEventListener('dragover', (e) => {
    e.preventDefault();
    wrap.classList.add('drag-over');
  });
  wrap.addEventListener('dragleave', (e) => {
    if (!wrap.contains(e.relatedTarget)) wrap.classList.remove('drag-over');
  });
  wrap.addEventListener('drop', (e) => {
    e.preventDefault();
    wrap.classList.remove('drag-over');
    let data;
    try { data = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
    const { id, from } = data;
    if (from === col) {
      reorder(col, id, e.clientY);
    } else {
      const idx = state[from].findIndex(x => x.id === id);
      if (idx < 0) return;
      const [moved] = state[from].splice(idx, 1);
      const items = [...wrap.querySelectorAll('.item:not(.dragging)')];
      const after = items.find(child => {
        const r = child.getBoundingClientRect();
        return e.clientY < r.top + r.height / 2;
      });
      if (after) {
        const insertIdx = state[col].findIndex(x => x.id === after.dataset.id);
        state[col].splice(insertIdx, 0, moved);
      } else {
        state[col].push(moved);
      }
    }
    saveState();
    render();
  });
});

function reorder(col, id, clientY) {
  const wrap = document.getElementById('items-' + col);
  const items = [...wrap.querySelectorAll('.item:not(.dragging)')];
  const after = items.find(child => {
    if (child.dataset.id === id) return false;
    const r = child.getBoundingClientRect();
    return clientY < r.top + r.height / 2;
  });
  const idx = state[col].findIndex(x => x.id === id);
  if (idx < 0) return;
  const [moved] = state[col].splice(idx, 1);
  if (after) {
    const insertIdx = state[col].findIndex(x => x.id === after.dataset.id);
    state[col].splice(insertIdx, 0, moved);
  } else {
    state[col].push(moved);
  }
}

function saveNow() { saveState(); }

function resetAll() {
  if (!confirm('要清掉三個欄位裡所有的項目嗎？這個動作沒辦法復原喔！')) return;
  state = { red: [], yellow: [], green: [] };
  saveState(true);
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `todo_${date}.json`; a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'application/json';
  inp.onchange = () => {
    const file = inp.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(reader.result);
        COLS.forEach(c => { if (!Array.isArray(obj[c])) obj[c] = []; });
        if (!confirm('要用這個備份覆蓋目前的資料嗎？')) return;
        state = obj;
        saveState(true);
        render();
        flash('✓ 已匯入');
      } catch { alert('檔案格式不對 :('); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function flash(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(window._flashT);
  window._flashT = setTimeout(() => t.classList.remove('show'), 1200);
}

render();
</script>

</body>
</html>
