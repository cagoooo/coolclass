<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教室計時器 · 教室小幫手</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6bcb77">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Fraunces:opsz,ital,wght@9..144,1,500;9..144,1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="crayon.css">
<style>
  /* 模式背景切換 */
  body { transition: background .3s; }
  body.warn-mode { background: #ffe9c8; }
  body.done-mode {
    background: #ffd4d4;
    animation: flashbg 0.8s infinite;
  }
  @keyframes flashbg {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(1.1); }
  }
  body.warn-mode .bg-deco, body.done-mode .bg-deco { opacity: .5; }

  /* 計時主面板 */
  .timer-panel {
    background: var(--ink);
    color: var(--paper);
    border: 4px solid var(--ink);
    border-radius: var(--rad-lg);
    padding: 40px 30px 30px;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
    text-align: center;
    margin-bottom: 24px;
  }
  body.warn-mode .timer-panel { background: var(--orange); border-color: var(--ink); color: #fff; }
  body.done-mode .timer-panel { background: var(--r); border-color: var(--ink); color: #fff; }
  .timer-panel::before {
    content: ''; position: absolute; inset: 14px;
    border: 3px dashed currentColor;
    border-radius: 20px;
    opacity: .25;
    pointer-events: none;
  }

  .timer-display {
    cursor: pointer;
    user-select: none;
    position: relative;
  }

  .time-num {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: clamp(140px, 26vw, 320px);
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--y);
    text-shadow:
      6px 6px 0 var(--r),
      12px 12px 0 var(--b);
    letter-spacing: -6px;
    transition: color .2s, transform .15s;
  }
  body.warn-mode .time-num { color: #fff; text-shadow: 6px 6px 0 var(--ink), 12px 12px 0 var(--r); }
  body.done-mode .time-num { color: #fff; text-shadow: 6px 6px 0 var(--ink), 12px 12px 0 var(--y); }

  .time-num.tick { animation: tickAnim .15s ease-out; }
  @keyframes tickAnim {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.03); }
    100% { transform: scale(1); }
  }

  .timer-label {
    position: relative;
    margin-top: 16px;
    font-size: clamp(18px, 2.6vw, 28px);
    font-weight: 700;
    color: currentColor;
    opacity: .9;
  }

  /* 進度條 */
  .progress-wrap {
    background: rgba(255,255,255,.15);
    border: 3px solid var(--paper);
    border-radius: 999px;
    height: 22px;
    overflow: hidden;
    margin: 24px auto 10px;
    max-width: 700px;
    position: relative;
  }
  .progress-bar {
    height: 100%;
    background: var(--y);
    transition: width .3s, background .3s;
    border-radius: 999px 0 0 999px;
  }
  body.warn-mode .progress-bar { background: var(--ink); }
  body.done-mode .progress-bar { background: var(--ink); }

  /* 預設 grid */
  .preset-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 10px;
  }
  @media (max-width: 720px) { .preset-grid { grid-template-columns: repeat(4, 1fr); } }
  .preset-btn {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: var(--rad-sm);
    padding: 16px 8px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    color: var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform .12s, box-shadow .12s, background .12s;
    text-align: center;
  }
  .preset-btn:hover {
    transform: translate(-2px, -2px);
    background: var(--y);
    box-shadow: 5px 5px 0 var(--ink);
  }
  .preset-btn .mins {
    display: block;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 28px;
    font-weight: 900;
    line-height: 1;
  }
  .preset-btn .label {
    display: block;
    font-size: 11px;
    opacity: .65;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .custom-row {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    margin-top: 16px;
    border-top: 2px dashed var(--ink);
    padding-top: 16px;
  }
  .custom-row .input { width: 80px; text-align: center; }
  .custom-row .lbl { font-weight: 700; font-size: 14px; }

  /* 切換 */
  .switch {
    display: inline-flex; align-items: center; gap: 10px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  .switch input { display: none; }
  .switch .knob {
    width: 44px; height: 24px;
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 999px;
    position: relative;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .switch .knob::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: var(--ink);
    border-radius: 50%;
    transition: transform .2s;
  }
  .switch input:checked + .knob { background: var(--g); }
  .switch input:checked + .knob::after { transform: translateX(20px); }

  .settings-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;
  }
  @media (max-width: 720px) { .settings-grid { grid-template-columns: 1fr; } }

  /* 全螢幕 */
  body.fullscreen .home-btn { opacity: .15; }
  body.fullscreen .page-hero,
  body.fullscreen .block,
  body.fullscreen footer.f { display: none; }
  body.fullscreen .bg-deco { opacity: .15; }
  body.fullscreen .timer-panel { padding: 80px 40px; margin-top: 4vh; }
  body.fullscreen .time-num { font-size: clamp(220px, 38vw, 600px); }
  body.fullscreen .btn-bar { margin-top: 32px; }
</style>
<script src="tweaks.js"></script>
</head>
<body>

<div class="bg-deco" aria-hidden="true">
  <span class="blob blob-y"></span>
  <span class="blob blob-b"></span>
  <span class="dots dots-1"></span>
</div>

<a class="home-btn" href="index.html">← 回主頁</a>

<div class="wrap">

  <section class="page-hero">
    <div>
      <span class="eyebrow">TIMER · 倒數計時</span>
      <h1>大字幕<em>倒數</em>，<br>專注就在眼前。</h1>
      <p class="sub">
        <span class="badge">⌨ 空白鍵 = 開始/暫停</span>
        <span class="badge">R = 重設</span>
        <span class="badge">F = 全螢幕</span>
      </p>
    </div>
    <div class="right-aux">
      <span class="big" id="heroMin">10</span>
      <span class="sml">分鐘 · 預設</span>
    </div>
  </section>

  <!-- 主計時面板 -->
  <div class="timer-panel">
    <div class="timer-display" id="display" onclick="toggleStart()">
      <div class="time-num" id="timeNum">10:00</div>
      <div class="timer-label" id="timerLabel">準備開始</div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:100%"></div></div>
    <div class="btn-bar center" style="margin-top:18px;">
      <button class="btn y lg" id="startBtn" onclick="toggleStart()">▶ 開始</button>
      <button class="btn g lg" onclick="addTime(60)">+1 分</button>
      <button class="btn lg" onclick="reset()">🔄 重設</button>
      <button class="btn b lg" onclick="toggleFull()">🖥 全螢幕</button>
    </div>
  </div>

  <!-- 快速設定 -->
  <section class="block">
    <div class="block-head">
      <div class="step">⚡</div>
      <h2>快速設定</h2>
      <span class="tail">點一下立刻套用</span>
    </div>
    <div class="preset-grid">
      <button class="preset-btn" data-sec="60"><span class="mins">1</span><span class="label">MINUTE</span></button>
      <button class="preset-btn" data-sec="180"><span class="mins">3</span><span class="label">MINUTES</span></button>
      <button class="preset-btn" data-sec="300"><span class="mins">5</span><span class="label">MINUTES</span></button>
      <button class="preset-btn" data-sec="600"><span class="mins">10</span><span class="label">MINUTES</span></button>
      <button class="preset-btn" data-sec="1200"><span class="mins">20</span><span class="label">MINUTES</span></button>
      <button class="preset-btn" data-sec="1800"><span class="mins">30</span><span class="label">MINUTES</span></button>
      <button class="preset-btn" data-sec="2400"><span class="mins">40</span><span class="label">MINUTES</span></button>
      <button class="preset-btn" data-sec="3000"><span class="mins">50</span><span class="label">MINUTES</span></button>
    </div>
    <div class="custom-row">
      <span class="lbl">自訂：</span>
      <input type="number" id="customMin" class="input" min="0" max="180" placeholder="分">
      <span class="lbl">分</span>
      <input type="number" id="customSec" class="input" min="0" max="59" placeholder="秒">
      <span class="lbl">秒</span>
      <button class="btn primary" onclick="applyCustom()">設定</button>
    </div>
  </section>

  <!-- 設定 -->
  <section class="block">
    <div class="block-head">
      <div class="step">⚙</div>
      <h2>設定</h2>
    </div>
    <div class="settings-grid">
      <label class="switch">
        <input type="checkbox" id="sound" checked>
        <span class="knob"></span>
        🔔 時間到時播放鈴聲
      </label>
      <label class="switch">
        <input type="checkbox" id="warnTick" checked>
        <span class="knob"></span>
        ⏰ 最後 30 秒切警示色
      </label>
      <label class="switch">
        <input type="checkbox" id="tickSound">
        <span class="knob"></span>
        🔊 每秒滴答聲（考試專用）
      </label>
    </div>
  </section>

  <footer class="f">
    Made with ♥ by <a href="https://www.smes.tyc.edu.tw/modules/tadnews/page.php?ncsn=11&nsn=16#a5" target="_blank" rel="noopener">阿凱老師</a> · 桃園市龍潭區石門國民小學
    <div class="ver">© 2026 · v3 “Crayon Pop”</div>
  </footer>
</div>

<script src="sw-update.js" defer></script>
<script>
const STORAGE_KEY = 'akai_timer_v1';
let settings = loadSettings();

let totalSec = settings.lastSec;
let remainSec = totalSec;
let running = false;
let intervalId = null;
let endAt = 0;

function loadSettings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return {
      sound: obj.sound !== false,
      warnTick: obj.warnTick !== false,
      tickSound: !!obj.tickSound,
      lastSec: obj.lastSec || 600,
    };
  } catch { return { sound: true, warnTick: true, tickSound: false, lastSec: 600 }; }
}
function saveSettings() { localStorage.setItem(STORAGE_KEY, JSON.stringify(settings)); }

function pad(n) { return String(n).padStart(2, '0'); }
function fmt(sec) {
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}

function updateDisplay() {
  const el = document.getElementById('timeNum');
  el.textContent = fmt(remainSec);
  el.classList.remove('tick'); void el.offsetWidth; el.classList.add('tick');

  document.getElementById('heroMin').textContent = Math.round(totalSec / 60);

  const pct = totalSec > 0 ? (remainSec / totalSec * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';

  if (remainSec <= 0) {
    document.body.classList.add('done-mode');
    document.body.classList.remove('warn-mode');
    document.getElementById('timerLabel').textContent = '⏰ 時間到！';
  } else if (settings.warnTick && remainSec <= 30) {
    document.body.classList.add('warn-mode');
    document.body.classList.remove('done-mode');
    document.getElementById('timerLabel').textContent = '⚡ 最後衝刺！';
  } else {
    document.body.classList.remove('warn-mode', 'done-mode');
    document.getElementById('timerLabel').textContent = running ? '⏳ 計時中…' : '⏸ 已暫停';
  }
}

function toggleStart() {
  if (remainSec <= 0) { reset(); return; }
  if (running) pause(); else start();
}

function start() {
  if (remainSec <= 0) return;
  running = true;
  endAt = Date.now() + remainSec * 1000;
  document.getElementById('startBtn').innerHTML = '⏸ 暫停';
  document.body.classList.remove('done-mode');
  intervalId = setInterval(tick, 200);
  tick();
}

function pause() {
  running = false;
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  document.getElementById('startBtn').innerHTML = '▶ 繼續';
  updateDisplay();
}

function tick() {
  const left = Math.max(0, Math.round((endAt - Date.now()) / 1000));
  if (left !== remainSec) {
    remainSec = left;
    updateDisplay();
    if (settings.tickSound && running && remainSec > 0) playTick();
  }
  if (left <= 0 && running) {
    clearInterval(intervalId); intervalId = null;
    running = false;
    document.getElementById('startBtn').innerHTML = '🔄 重設';
    playBell();
  }
}

function reset() {
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  running = false;
  remainSec = totalSec;
  document.getElementById('startBtn').innerHTML = '▶ 開始';
  document.body.classList.remove('done-mode', 'warn-mode');
  updateDisplay();
}

function setTotal(sec) {
  totalSec = Math.max(1, sec);
  remainSec = totalSec;
  settings.lastSec = totalSec;
  saveSettings();
  reset();
}

function addTime(sec) {
  if (remainSec <= 0) { setTotal(sec); start(); return; }
  remainSec += sec;
  totalSec += sec;
  if (running) endAt += sec * 1000;
  updateDisplay();
}

function applyCustom() {
  const m = parseInt(document.getElementById('customMin').value) || 0;
  const s = parseInt(document.getElementById('customSec').value) || 0;
  const t = m * 60 + s;
  if (t <= 0) { alert('請輸入大於 0 的時間'); return; }
  setTotal(t);
}

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.onclick = () => setTotal(parseInt(btn.dataset.sec));
});

document.getElementById('sound').checked = settings.sound;
document.getElementById('warnTick').checked = settings.warnTick;
document.getElementById('tickSound').checked = settings.tickSound;
document.getElementById('sound').onchange    = e => { settings.sound = e.target.checked; saveSettings(); };
document.getElementById('warnTick').onchange = e => { settings.warnTick = e.target.checked; saveSettings(); updateDisplay(); };
document.getElementById('tickSound').onchange= e => { settings.tickSound = e.target.checked; saveSettings(); };

function toggleFull() { document.body.classList.toggle('fullscreen'); }

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); toggleStart(); }
  else if (e.code === 'KeyR') reset();
  else if (e.code === 'KeyF') toggleFull();
  else if (e.code === 'Escape' && document.body.classList.contains('fullscreen')) toggleFull();
});

function playBell() {
  if (!settings.sound) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.4, 0.8].forEach(t => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(900, ctx.currentTime + t);
      g.gain.setValueAtTime(0.4, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + t + 0.4);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + 0.4);
    });
  } catch {}
}
function playTick() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'square';
    o.frequency.setValueAtTime(400, ctx.currentTime);
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
    o.start();
    o.stop(ctx.currentTime + 0.05);
  } catch {}
}

updateDisplay();
</script>

</body>
</html>
