<style>
  /* 模式背景切換 */
  body { transition: background .3s; }
  body.warn-mode { background: #ffe9c8; }
  body.done-mode {
    background: #ffd4d4;
    animation: flashbg 0.8s infinite;
  }
  @keyframes flashbg {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(1.1); }
  }
  body.warn-mode .bg-deco, body.done-mode .bg-deco { opacity: .5; }

  /* 計時主面板 */
  .timer-panel {
    background: var(--ink);
    color: var(--paper);
    border: 4px solid var(--ink);
    border-radius: var(--rad-lg);
    padding: 40px 30px 30px;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
    text-align: center;
    margin-bottom: 24px;
  }
  body.warn-mode .timer-panel { background: var(--orange); border-color: var(--ink); color: #fff; }
  body.done-mode .timer-panel { background: var(--r); border-color: var(--ink); color: #fff; }
  .timer-panel::before {
    content: ''; position: absolute; inset: 14px;
    border: 3px dashed currentColor;
    border-radius: 20px;
    opacity: .25;
    pointer-events: none;
  }

  .timer-display {
    cursor: pointer;
    user-select: none;
    position: relative;
  }

  .time-num {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: clamp(140px, 26vw, 320px);
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--y);
    text-shadow:
      6px 6px 0 var(--r),
      12px 12px 0 var(--b);
    letter-spacing: -6px;
    transition: color .2s, transform .15s;
  }
  body.warn-mode .time-num { color: #fff; text-shadow: 6px 6px 0 var(--ink), 12px 12px 0 var(--r); }
  body.done-mode .time-num { color: #fff; text-shadow: 6px 6px 0 var(--ink), 12px 12px 0 var(--y); }

  .time-num.tick { animation: tickAnim .15s ease-out; }
  @keyframes tickAnim {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.03); }
    100% { transform: scale(1); }
  }

  .timer-label {
    position: relative;
    margin-top: 16px;
    font-size: clamp(18px, 2.6vw, 28px);
    font-weight: 700;
    color: currentColor;
    opacity: .9;
  }

  /* 進度條 */
  .progress-wrap {
    background: rgba(255,255,255,.15);
    border: 3px solid var(--paper);
    border-radius: 999px;
    height: 22px;
    overflow: hidden;
    margin: 24px auto 10px;
    max-width: 700px;
    position: relative;
  }
  .progress-bar {
    height: 100%;
    background: var(--y);
    transition: width .3s, background .3s;
    border-radius: 999px 0 0 999px;
  }
  body.warn-mode .progress-bar { background: var(--ink); }
  body.done-mode .progress-bar { background: var(--ink); }

  /* 預設 grid */
  .preset-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 10px;
  }
  @media (max-width: 720px) { .preset-grid { grid-template-columns: repeat(4, 1fr); } }
  .preset-btn {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: var(--rad-sm);
    padding: 16px 8px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    color: var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform .12s, box-shadow .12s, background .12s;
    text-align: center;
  }
  .preset-btn:hover {
    transform: translate(-2px, -2px);
    background: var(--y);
    box-shadow: 5px 5px 0 var(--ink);
  }
  .preset-btn .mins {
    display: block;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 28px;
    font-weight: 900;
    line-height: 1;
  }
  .preset-btn .label {
    display: block;
    font-size: 11px;
    opacity: .65;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .custom-row {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    margin-top: 16px;
    border-top: 2px dashed var(--ink);
    padding-top: 16px;
  }
  .custom-row .input { width: 80px; text-align: center; }
  .custom-row .lbl { font-weight: 700; font-size: 14px; }

  /* 切換 */
  .switch {
    display: inline-flex; align-items: center; gap: 10px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  .switch input { display: none; }
  .switch .knob {
    width: 44px; height: 24px;
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 999px;
    position: relative;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .switch .knob::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: var(--ink);
    border-radius: 50%;
    transition: transform .2s;
  }
  .switch input:checked + .knob { background: var(--g); }
  .switch input:checked + .knob::after { transform: translateX(20px); }

  .settings-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;
  }
  @media (max-width: 720px) { .settings-grid { grid-template-columns: 1fr; } }

  /* 全螢幕 */
  body.fullscreen .home-btn { opacity: .15; }
  body.fullscreen .page-hero,
  body.fullscreen .block,
  body.fullscreen footer.f { display: none; }
  body.fullscreen .bg-deco { opacity: .15; }
  body.fullscreen .timer-panel { padding: 80px 40px; margin-top: 4vh; }
  body.fullscreen .time-num { font-size: clamp(220px, 38vw, 600px); }
  body.fullscreen .btn-bar { margin-top: 32px; }

  /* ========== v3.2 RWD ========== */
  @media (max-width: 600px) {
    .timer-panel { padding: 24px 16px 20px; border-radius: var(--rad); box-shadow: 5px 5px 0 var(--ink) !important; }
    .timer-panel::before { inset: 8px; }
    .time-num { font-size: clamp(96px, 30vw, 180px) !important; letter-spacing: -3px; text-shadow: 4px 4px 0 var(--r), 8px 8px 0 var(--b) !important; }
    .timer-label { font-size: clamp(14px, 4vw, 18px) !important; margin-top: 10px; }
    .progress-wrap { height: 16px; margin: 16px auto 8px; border-width: 2px; }
    .btn-bar.center { gap: 6px; flex-wrap: wrap; }
    .btn-bar.center .btn.lg { padding: 10px 14px; font-size: 14px; }
    .preset-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .preset-btn { padding: 12px 4px; box-shadow: 2px 2px 0 var(--ink); }
    .preset-btn .mins { font-size: 22px; }
    .preset-btn .label { font-size: 9px; letter-spacing: 1px; }
    .custom-row { gap: 6px; padding-top: 12px; }
    .custom-row .input { width: 64px; padding: 8px; font-size: 16px; }
    .custom-row .lbl { font-size: 13px; }
    .settings-grid { grid-template-columns: 1fr !important; gap: 10px; }
    .extras-grid { grid-template-columns: 1fr !important; gap: 10px; }
    .ext-card { padding: 12px 14px; }
    .ext-time { font-size: 44px; }
  }
  @media (max-width: 380px) {
    .time-num { font-size: 80px !important; }
    .preset-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>

<script>
const STORAGE_KEY = 'akai_timer_v1';
let settings = loadSettings();

let totalSec = settings.lastSec;
let remainSec = totalSec;
let running = false;
let intervalId = null;
let endAt = 0;

function loadSettings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return {
      sound: obj.sound !== false,
      warnTick: obj.warnTick !== false,
      tickSound: !!obj.tickSound,
      lastSec: obj.lastSec || 600,
      extras: obj.extras || [],  // v3.1：額外計時器
    };
  } catch { return { sound: true, warnTick: true, tickSound: false, lastSec: 600, extras: [] }; }
}
function saveSettings() { localStorage.setItem(STORAGE_KEY, JSON.stringify(settings)); }

function pad(n) { return String(n).padStart(2, '0'); }
function fmt(sec) {
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}

function updateDisplay() {
  const el = document.getElementById('timeNum');
  el.textContent = fmt(remainSec);
  el.classList.remove('tick'); void el.offsetWidth; el.classList.add('tick');

  document.getElementById('heroMin').textContent = Math.round(totalSec / 60);

  const pct = totalSec > 0 ? (remainSec / totalSec * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';

  if (remainSec <= 0) {
    document.body.classList.add('done-mode');
    document.body.classList.remove('warn-mode');
    document.getElementById('timerLabel').textContent = '⏰ 時間到！';
  } else if (settings.warnTick && remainSec <= 30) {
    document.body.classList.add('warn-mode');
    document.body.classList.remove('done-mode');
    document.getElementById('timerLabel').textContent = '⚡ 最後衝刺！';
  } else {
    document.body.classList.remove('warn-mode', 'done-mode');
    document.getElementById('timerLabel').textContent = running ? '⏳ 計時中…' : '⏸ 已暫停';
  }
}

function toggleStart() {
  if (remainSec <= 0) { reset(); return; }
  if (running) pause(); else start();
}

function start() {
  if (remainSec <= 0) return;
  running = true;
  endAt = Date.now() + remainSec * 1000;
  document.getElementById('startBtn').innerHTML = '⏸ 暫停';
  document.body.classList.remove('done-mode');
  intervalId = setInterval(tick, 200);
  tick();
}

function pause() {
  running = false;
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  document.getElementById('startBtn').innerHTML = '▶ 繼續';
  updateDisplay();
}

function tick() {
  const left = Math.max(0, Math.round((endAt - Date.now()) / 1000));
  if (left !== remainSec) {
    remainSec = left;
    updateDisplay();
    if (settings.tickSound && running && remainSec > 0) playTick();
  }
  if (left <= 0 && running) {
    clearInterval(intervalId); intervalId = null;
    running = false;
    document.getElementById('startBtn').innerHTML = '🔄 重設';
    playBell();
  }
}

function reset() {
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  running = false;
  remainSec = totalSec;
  document.getElementById('startBtn').innerHTML = '▶ 開始';
  document.body.classList.remove('done-mode', 'warn-mode');
  updateDisplay();
}

function setTotal(sec) {
  totalSec = Math.max(1, sec);
  remainSec = totalSec;
  settings.lastSec = totalSec;
  saveSettings();
  reset();
}

function addTime(sec) {
  if (remainSec <= 0) { setTotal(sec); start(); return; }
  remainSec += sec;
  totalSec += sec;
  if (running) endAt += sec * 1000;
  updateDisplay();
}

function applyCustom() {
  const m = parseInt(document.getElementById('customMin').value) || 0;
  const s = parseInt(document.getElementById('customSec').value) || 0;
  const t = m * 60 + s;
  if (t <= 0) { alert('請輸入大於 0 的時間'); return; }
  setTotal(t);
}

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.onclick = () => setTotal(parseInt(btn.dataset.sec));
});

document.getElementById('sound').checked = settings.sound;
document.getElementById('warnTick').checked = settings.warnTick;
document.getElementById('tickSound').checked = settings.tickSound;
document.getElementById('sound').onchange    = e => { settings.sound = e.target.checked; saveSettings(); };
document.getElementById('warnTick').onchange = e => { settings.warnTick = e.target.checked; saveSettings(); updateDisplay(); };
document.getElementById('tickSound').onchange= e => { settings.tickSound = e.target.checked; saveSettings(); };

function toggleFull() { document.body.classList.toggle('fullscreen'); }

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); toggleStart(); }
  else if (e.code === 'KeyR') reset();
  else if (e.code === 'KeyF') toggleFull();
  else if (e.code === 'Escape' && document.body.classList.contains('fullscreen')) toggleFull();
});

function playBell() {
  if (!settings.sound) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.4, 0.8].forEach(t => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(900, ctx.currentTime + t);
      g.gain.setValueAtTime(0.4, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + t + 0.4);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + 0.4);
    });
  } catch {}
}
function playTick() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'square';
    o.frequency.setValueAtTime(400, ctx.currentTime);
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
    o.start();
    o.stop(ctx.currentTime + 0.05);
  } catch {}
}

updateDisplay();

// ===== v3.1：額外計時器（多計時並行） =====
function uidExt() { return 'x_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

function addExtra() {
  const min = parseInt(prompt('幾分鐘？', '5'));
  if (!min || min <= 0) return;
  const label = prompt('給這個計時器一個名字（可空白）', `計時器 ${settings.extras.length + 1}`);
  addExtraPreset(min * 60, label || `計時器 ${settings.extras.length + 1}`);
}

function addExtraPreset(sec, label) {
  settings.extras.push({
    id: uidExt(),
    label: label,
    totalSec: sec,
    remainSec: sec,
    running: false,
    endAt: 0,
  });
  saveSettings();
  renderExtras();
}

function removeExtra(id) {
  settings.extras = settings.extras.filter(t => t.id !== id);
  saveSettings();
  renderExtras();
}

function toggleExtra(id) {
  const t = settings.extras.find(x => x.id === id);
  if (!t) return;
  if (t.remainSec <= 0) {
    t.remainSec = t.totalSec;
    t.endAt = Date.now() + t.totalSec * 1000;
    t.running = true;
  } else if (t.running) {
    t.running = false;
    t.remainSec = Math.max(0, Math.round((t.endAt - Date.now()) / 1000));
  } else {
    t.running = true;
    t.endAt = Date.now() + t.remainSec * 1000;
  }
  saveSettings();
  renderExtras();
}

function resetExtra(id) {
  const t = settings.extras.find(x => x.id === id);
  if (!t) return;
  t.running = false;
  t.remainSec = t.totalSec;
  saveSettings();
  renderExtras();
}

function addExtraTime(id, sec) {
  const t = settings.extras.find(x => x.id === id);
  if (!t) return;
  t.totalSec += sec;
  if (t.running) t.endAt += sec * 1000;
  else t.remainSec += sec;
  saveSettings();
  renderExtras();
}

function renameExtra(id, newLabel) {
  const t = settings.extras.find(x => x.id === id);
  if (!t) return;
  t.label = newLabel;
  saveSettings();
}

function clearAllExtras() {
  if (settings.extras.length === 0) return;
  if (!confirm(`要清掉 ${settings.extras.length} 個額外計時器嗎？`)) return;
  settings.extras = [];
  saveSettings();
  renderExtras();
}

function renderExtras() {
  const wrap = document.getElementById('extraTimers');
  if (settings.extras.length === 0) {
    wrap.innerHTML = '<div class="empty">還沒有額外計時器。點下面「＋」新增。<br>例如：分組討論時各組各自一個計時器。</div>';
    return;
  }
  wrap.innerHTML = '';
  settings.extras.forEach(t => {
    const remainNow = t.running
      ? Math.max(0, Math.round((t.endAt - Date.now()) / 1000))
      : t.remainSec;
    const pct = t.totalSec > 0 ? (remainNow / t.totalSec) * 100 : 0;
    const isWarn = remainNow > 0 && remainNow <= 30;
    const isDone = remainNow <= 0;
    const card = document.createElement('div');
    card.className = 'ext-card' + (isWarn ? ' warn' : '') + (isDone ? ' done' : '');
    card.dataset.id = t.id;
    card.innerHTML = `
      <div class="ext-head">
        <input class="ext-label" value="${escapeAttr(t.label)}" maxlength="20">
        <button class="ext-x" title="刪除">✕</button>
      </div>
      <div class="ext-time">${fmt(remainNow)}</div>
      <div class="ext-progress"><div style="width:${pct}%"></div></div>
      <div class="ext-bar">
        <button class="ext-play">${isDone ? '🔄' : t.running ? '⏸' : '▶'}</button>
        <button class="ext-add">+30s</button>
        <button>+1分</button>
        <button class="ext-reset">🔄</button>
      </div>
    `;
    card.querySelector('.ext-label').onchange = (e) => renameExtra(t.id, e.target.value);
    card.querySelector('.ext-x').onclick = () => { if (confirm('刪除這個計時器？')) removeExtra(t.id); };
    card.querySelector('.ext-play').onclick = () => toggleExtra(t.id);
    const bars = card.querySelectorAll('.ext-bar button');
    bars[1].onclick = () => addExtraTime(t.id, 30);
    bars[2].onclick = () => addExtraTime(t.id, 60);
    bars[3].onclick = () => resetExtra(t.id);
    wrap.appendChild(card);
  });
}

function escapeAttr(s) {
  return String(s).replace(/"/g, '&quot;');
}

// 額外計時器的 tick：每秒檢查、有結束的響鈴
let extraDoneIds = new Set(); // 避免重複響
setInterval(() => {
  if (settings.extras.length === 0) return;
  let needRender = false;
  let needSave = false;
  settings.extras.forEach(t => {
    if (!t.running) return;
    const left = Math.max(0, Math.round((t.endAt - Date.now()) / 1000));
    if (left <= 0 && !extraDoneIds.has(t.id)) {
      extraDoneIds.add(t.id);
      t.running = false;
      t.remainSec = 0;
      needSave = true;
      playBell();
      flashToast(`⏰ 「${t.label}」時間到！`);
    }
    needRender = true;
  });
  if (needSave) saveSettings();
  if (needRender) renderExtras();
}, 1000);

function flashToast(text) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(window._flashT);
  window._flashT = setTimeout(() => t.classList.remove('show'), 2000);
}

renderExtras();
</script>

<div class="toast" id="toast">已存檔</div>
