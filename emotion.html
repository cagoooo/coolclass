<style>
  /* 情緒大按鈕 */
  .emo-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
  }
  @media (max-width: 720px) {
    .emo-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .emo-btn {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: var(--rad);
    padding: 22px 12px 18px;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    box-shadow: 5px 5px 0 var(--ink);
    transition: transform .15s, box-shadow .15s;
  }
  .emo-btn:hover:not(.disabled) {
    transform: translate(-3px, -3px);
    box-shadow: 8px 8px 0 var(--ink);
  }
  .emo-btn .face {
    font-size: 64px;
    line-height: 1;
    display: block;
    margin-bottom: 10px;
    transition: transform .3s;
  }
  .emo-btn:hover:not(.disabled) .face { transform: scale(1.15) rotate(-8deg); }
  .emo-btn .label {
    font-size: 17px;
    font-weight: 900;
    color: var(--ink);
  }
  .emo-btn[data-mood="happy"]   { background: var(--y); }
  .emo-btn[data-mood="angry"]   { background: var(--r); color: #fff; }
  .emo-btn[data-mood="angry"] .label { color: #fff; }
  .emo-btn[data-mood="sad"]     { background: var(--b); color: #fff; }
  .emo-btn[data-mood="sad"] .label { color: #fff; }
  .emo-btn[data-mood="nervous"] { background: var(--p); color: #fff; }
  .emo-btn[data-mood="nervous"] .label { color: #fff; }
  .emo-btn[data-mood="calm"]    { background: var(--g); }
  .emo-btn[data-mood="calm"] .label { color: #1a3e22; }
  .emo-btn.disabled {
    opacity: .35;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: 5px 5px 0 var(--ink) !important;
  }

  /* 打卡牆 */
  .wall {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 12px;
    min-height: 120px;
  }
  .sticky {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: var(--rad-sm);
    padding: 12px 8px 10px;
    text-align: center;
    box-shadow: 4px 4px 0 var(--ink);
    position: relative;
    animation: pop .35s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop {
    from { transform: scale(0.4) rotate(-8deg); opacity: 0; }
    to   { transform: scale(1) rotate(var(--rot, 0deg)); opacity: 1; }
  }
  .sticky:nth-child(3n+1) { --rot: -1.5deg; }
  .sticky:nth-child(3n+2) { --rot:  1deg; }
  .sticky:nth-child(3n)   { --rot:  -0.6deg; }
  .sticky .face { font-size: 32px; line-height: 1; }
  .sticky .nums {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 900;
    font-size: 16px;
    margin-top: 4px;
  }
  .sticky .name {
    font-size: 12px;
    font-weight: 700;
    margin-top: 2px;
    word-break: break-all;
  }
  .sticky[data-mood="happy"]   { background: var(--y); }
  .sticky[data-mood="angry"]   { background: var(--r); color: #fff; }
  .sticky[data-mood="sad"]     { background: var(--b); color: #fff; }
  .sticky[data-mood="nervous"] { background: var(--p); color: #fff; }
  .sticky[data-mood="calm"]    { background: var(--g); color: #1a3e22; }

  /* 統計 */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  @media (max-width: 720px) {
    .stat-row { grid-template-columns: repeat(5, 1fr); gap: 8px; }
  }
  .mini-stat {
    border: 3px solid var(--ink);
    border-radius: var(--rad-sm);
    padding: 12px 8px;
    text-align: center;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .mini-stat .face { font-size: 28px; line-height: 1; }
  .mini-stat .lbl  { font-size: 11px; font-weight: 700; margin-top: 4px; }
  .mini-stat .cnt  {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 900;
    font-size: 26px;
    line-height: 1;
    margin-top: 4px;
  }
  .mini-stat[data-mood="happy"]   { background: var(--y); color: var(--ink); }
  .mini-stat[data-mood="angry"]   { background: var(--r); color: #fff; }
  .mini-stat[data-mood="sad"]     { background: var(--b); color: #fff; }
  .mini-stat[data-mood="nervous"] { background: var(--p); color: #fff; }
  .mini-stat[data-mood="calm"]    { background: var(--g); color: #1a3e22; }

  /* v3.4 G1：出勤狀態聯動（請假 / 缺席） */
  .num-btn.on-leave {
    background: var(--p) !important;
    color: #fff !important;
    opacity: .85;
    position: relative;
  }
  .num-btn.on-leave::after {
    content: '假';
    position: absolute;
    top: 3px; right: 4px;
    background: #fff;
    color: var(--p);
    border-radius: 999px;
    padding: 0 6px;
    font-size: 10px;
    font-weight: 900;
  }
  .num-btn.is-absent {
    background: rgba(255,107,107,.2) !important;
    color: var(--r) !important;
    opacity: .6;
    text-decoration: line-through;
    position: relative;
  }
  .num-btn.is-absent::after {
    content: '缺';
    position: absolute;
    top: 3px; right: 4px;
    background: var(--r);
    color: #fff;
    border-radius: 999px;
    padding: 0 6px;
    font-size: 10px;
    font-weight: 900;
    text-decoration: none;
  }

  /* ========== v3.2 RWD：手機（< 600px） ========== */
  @media (max-width: 600px) {
    /* 號碼按鈕 grid 5 欄（從 auto-fill 改成固定 5） */
    .num-grid { grid-template-columns: repeat(5, 1fr) !important; gap: 8px !important; }
    .num-btn { min-height: 60px !important; font-size: 20px !important; }
    .num-btn .name-tag { font-size: 9px !important; }

    /* 情緒大按鈕：mobile 一律 64px face + 12px label */
    .emo-grid { gap: 8px; }
    .emo-grid { grid-template-columns: repeat(5, 1fr); }
    .emo-btn { padding: 10px 4px; }
    .emo-btn .face { font-size: 36px; }
    .emo-btn .label { font-size: 12px; letter-spacing: 1px; }

    /* 統計列：5 欄改成 2 欄式（每行 2-3 個情緒） */
    .stat-row { grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .mini-stat { padding: 8px 4px; }
    .mini-stat .face { font-size: 22px; }
    .mini-stat .lbl { font-size: 10px; }
    .mini-stat .cnt { font-size: 20px; }

    /* 打卡牆 sticky：縮小 */
    .wall { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)) !important; gap: 8px !important; }
    .sticky { padding: 8px 6px !important; }
    .sticky .face { font-size: 26px; }
    .sticky .nums { font-size: 11px; }
    .sticky .name { font-size: 10px; }

    /* 三步驟 chip 縮小 */
    .step-chip { font-size: 12px; padding: 6px 10px; }
  }
  @media (max-width: 380px) {
    .num-grid { grid-template-columns: repeat(4, 1fr) !important; }
    .num-btn { min-height: 52px !important; font-size: 18px !important; }
    .emo-btn .face { font-size: 32px; }
    .emo-btn .label { font-size: 11px; }
  }
</style>

<script>
if (!window.AkaiRoster) {
  const KEY = 'akai_roster_v1';
  window.AkaiRoster = {
    load() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) return { className: '', count: 30, names: {} };
        const o = JSON.parse(raw);
        return { className: o.className || '', count: parseInt(o.count) || 30, names: o.names || {} };
      } catch { return { className: '', count: 30, names: {} }; }
    },
    getName(n) { return this.load().names[String(n)] || ''; }
  };
}
</script>

<script>
const EMOTIONS = [
  { key: 'happy',   face: '😄', label: '開心' },
  { key: 'angry',   face: '😠', label: '生氣' },
  { key: 'sad',     face: '😢', label: '難過' },
  { key: 'nervous', face: '😬', label: '緊張' },
  { key: 'calm',    face: '😌', label: '平靜' },
];

const STORAGE_KEY = 'akai_emotion_v1';
const todayKey = () => new Date().toISOString().slice(0,10);

const state = loadState();
let selectedNum = null;

function getMaxNum() { return AkaiRoster.load().count || state.maxNum || 30; }

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { maxNum: 30, records: {} };
    const obj = JSON.parse(raw);
    if (!obj.records) obj.records = {};
    if (!obj.maxNum) obj.maxNum = 30;
    return obj;
  } catch(e) { return { maxNum: 30, records: {} }; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function todayRecords() {
  const k = todayKey();
  if (!state.records[k]) state.records[k] = {};
  return state.records[k];
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderHeader() {
  const d = new Date();
  const wk = ['日','一','二','三','四','五','六'];
  document.getElementById('dateBadge').textContent =
    `📅 ${d.getMonth()+1}月${d.getDate()}日 · 星期${wk[d.getDay()]}`;
  const r = AkaiRoster.load();
  const badge = document.getElementById('classBadge');
  if (r.className) {
    badge.innerHTML = `🏫 ${escapeHtml(r.className)} <a href="roster.html">編輯</a>`;
  } else {
    badge.innerHTML = `👥 還沒設定班級 <a href="roster.html">去設定</a>`;
  }
  document.getElementById('heroTotal').textContent = r.count || 30;
}

/** v3.4 G1：讀今日出勤狀態，回傳 { num: 'present'|'late'|'leave'|'absent' } */
function getTodayAttendance() {
  try {
    const atn = JSON.parse(localStorage.getItem('akai_attendance_v1') || '{}');
    const d = new Date();
    const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const dKey = `${ym}-${String(d.getDate()).padStart(2,'0')}`;
    return atn.sheets?.[ym]?.marks?.[dKey] || {};
  } catch { return {}; }
}

function renderNumbers() {
  const grid = document.getElementById('numberGrid');
  const records = todayRecords();
  const maxNum = getMaxNum();
  const attn = getTodayAttendance();  // v3.4：今日出勤
  grid.innerHTML = '';
  for (let i = 1; i <= maxNum; i++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.dataset.num = i;
    const name = AkaiRoster.getName(i);
    const checked = records[i];
    const attnState = attn[i];

    if (checked) {
      btn.classList.add('done');
      const emo = EMOTIONS.find(e => e.key === checked);
      btn.innerHTML = `${i}${name ? `<span class="name-tag">${escapeHtml(name)}</span>` : ''}<span class="emoji-tag">${emo?.face || ''}</span>`;
    } else {
      btn.innerHTML = `${i}${name ? `<span class="name-tag">${escapeHtml(name)}</span>` : ''}`;
    }
    // v3.4：套出勤狀態樣式（請假/缺席的覆蓋一般狀態）
    if (!checked && attnState === 'leave') {
      btn.classList.add('on-leave');
      btn.title = `${i} 號${name ? ' ' + name : ''} · 今日請假`;
    } else if (!checked && attnState === 'absent') {
      btn.classList.add('is-absent');
      btn.title = `${i} 號${name ? ' ' + name : ''} · 今日缺席`;
    } else {
      btn.title = name ? `${i} 號 ${name}` : `${i} 號`;
    }
    if (selectedNum === i) btn.classList.add('selected');
    btn.onclick = () => selectNumber(i);
    grid.appendChild(btn);
  }
}

function renderEmotions() {
  const grid = document.getElementById('emotionGrid');
  grid.innerHTML = '';
  EMOTIONS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emo-btn';
    btn.dataset.mood = e.key;
    btn.innerHTML = `<span class="face">${e.face}</span><span class="label">${e.label}</span>`;
    if (selectedNum === null) btn.classList.add('disabled');
    btn.onclick = () => clockIn(e.key);
    grid.appendChild(btn);
  });
  document.getElementById('emoTail').textContent =
    selectedNum === null ? '先選號碼才能點' : `為 ${selectedNum} 號選一個心情`;
}

function renderWall() {
  const wall = document.getElementById('wall');
  const records = todayRecords();
  const grouped = {};
  EMOTIONS.forEach(e => grouped[e.key] = []);
  Object.entries(records).forEach(([num, mood]) => {
    if (grouped[mood]) grouped[mood].push(parseInt(num));
  });

  // 統計區
  const row = document.getElementById('statRow');
  row.innerHTML = '';
  EMOTIONS.forEach(e => {
    const cnt = grouped[e.key].length;
    const div = document.createElement('div');
    div.className = 'mini-stat';
    div.dataset.mood = e.key;
    div.innerHTML = `
      <div class="face">${e.face}</div>
      <div class="lbl">${e.label}</div>
      <div class="cnt">${cnt}</div>
    `;
    row.appendChild(div);
  });

  // 牆
  const total = Object.keys(records).length;
  const maxNum = getMaxNum();
  document.getElementById('heroDone').textContent = total;
  document.getElementById('totalTail').textContent = `${total} / ${maxNum} 人`;
  if (total === 0) {
    wall.innerHTML = `<div class="empty"><b>還沒有人打卡</b>等等吧～ ☁️<br><span style="font-size:12px;color:var(--mute-2);">班級共 ${maxNum} 人</span></div>`;
    return;
  }
  wall.innerHTML = '';
  EMOTIONS.forEach(e => {
    grouped[e.key].sort((a,b)=>a-b).forEach(n => {
      const card = document.createElement('div');
      card.className = 'sticky';
      card.dataset.mood = e.key;
      const name = AkaiRoster.getName(n);
      card.innerHTML = `<div class="face">${e.face}</div><div class="nums">${n}</div>${name ? `<div class="name">${escapeHtml(name)}</div>` : ''}`;
      card.title = '雙擊取消這位同學的打卡';
      card.ondblclick = () => {
        if (confirm(`要取消 ${n} 號的打卡嗎？`)) {
          delete todayRecords()[n];
          saveState();
          renderAll();
        }
      };
      wall.appendChild(card);
    });
  });
}

function selectNumber(n) {
  selectedNum = n;
  updateSteps();
  renderNumbers();
  renderEmotions();
}

function clockIn(moodKey) {
  if (selectedNum === null) return;
  todayRecords()[selectedNum] = moodKey;
  saveState();
  const done = selectedNum;
  selectedNum = null;
  updateSteps();
  renderAll();
  flash(`✨ ${done} 號打卡成功！`);
}

function updateSteps() {
  document.getElementById('step1').classList.toggle('active', selectedNum === null);
  document.getElementById('step1').classList.toggle('done', selectedNum !== null);
  document.getElementById('step2').classList.toggle('active', selectedNum !== null);
}

function renderAll() {
  renderNumbers();
  renderEmotions();
  renderWall();
  updateSteps();
}

function resetToday() {
  if (!confirm('要清掉今天所有人的打卡嗎？（過去日期不會被刪除）')) return;
  state.records[todayKey()] = {};
  saveState();
  selectedNum = null;
  renderAll();
}

function exportData() {
  const records = todayRecords();
  const r = AkaiRoster.load();
  const d = new Date();
  const wk = ['日','一','二','三','四','五','六'];
  const lines = [`📅 ${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} (星期${wk[d.getDay()]}) 情緒打卡記錄`];
  if (r.className) lines.push(`🏫 ${r.className}`);
  lines.push('');
  EMOTIONS.forEach(e => {
    const items = Object.entries(records)
      .filter(([_,m])=>m===e.key)
      .map(([n])=>parseInt(n))
      .sort((a,b)=>a-b)
      .map(n => {
        const name = AkaiRoster.getName(n);
        return name ? `${n}號(${name})` : `${n}號`;
      });
    lines.push(`${e.face} ${e.label}（${items.length}人）：${items.join('、') || '—'}`);
  });
  const maxNum = getMaxNum();
  lines.push('', `總打卡：${Object.keys(records).length} / ${maxNum} 人`);
  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `情緒打卡_${todayKey()}.txt`; a.click();
  URL.revokeObjectURL(url);
}

function flash(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(window._flashT);
  window._flashT = setTimeout(() => t.classList.remove('show'), 1500);
}

window.addEventListener('storage', (e) => {
  if (e.key === 'akai_roster_v1') { renderHeader(); renderAll(); }
});
window.addEventListener('focus', () => { renderHeader(); renderAll(); });

renderHeader();
renderAll();
</script>
