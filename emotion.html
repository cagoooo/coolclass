<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>😊 情緒打卡牆 · 阿凱老師的教室小幫手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    color: #4a4a4a;
    min-height: 100vh;
    background:
      radial-gradient(circle at 15% 10%, rgba(255,209,220,.6), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(255,234,200,.7), transparent 45%),
      radial-gradient(circle at 80% 90%, rgba(255,200,220,.6), transparent 45%),
      linear-gradient(135deg, #fff7ee 0%, #fff0f5 100%);
  }
  /* 回首頁 */
  .home-btn {
    position: fixed;
    top: 16px;
    left: 16px;
    background: #fff;
    border: 3px solid #ffc8d4;
    color: #6a4a6e;
    padding: 10px 18px;
    border-radius: 999px;
    font-weight: 700;
    text-decoration: none;
    font-size: 14px;
    box-shadow: 0 4px 12px rgba(255,150,180,.25);
    z-index: 100;
    transition: transform .2s;
  }
  .home-btn:hover { transform: translateY(-2px) scale(1.05); }

  header {
    text-align: center;
    padding: 50px 20px 20px;
  }
  header h1 {
    margin: 0;
    font-size: clamp(28px, 5vw, 44px);
    color: #5a4a6e;
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(255,180,200,.6);
  }
  header .date {
    margin-top: 10px;
    font-size: 16px;
    color: #7a6a8e;
    font-weight: 700;
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 10px 20px 80px;
  }

  /* 步驟條 */
  .steps {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin: 10px 0 30px;
    flex-wrap: wrap;
  }
  .step {
    background: #fff;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    color: #8a7a9e;
    border: 3px dashed #ffd1dc;
  }
  .step.active {
    background: #ffe0e8;
    color: #c8568a;
    border-style: solid;
    border-color: #ff9ab0;
  }
  .step.done {
    background: #c8f0d0;
    color: #4a8a5e;
    border-style: solid;
    border-color: #8ac8a0;
  }

  .section {
    background: rgba(255,255,255,.85);
    border-radius: 28px;
    padding: 24px 28px;
    margin-bottom: 24px;
    box-shadow: 0 8px 24px rgba(180,130,160,.1);
    backdrop-filter: blur(6px);
  }
  .section h2 {
    margin: 0 0 16px;
    color: #5a4a6e;
    font-size: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section h2 .num {
    background: #ff9ab0;
    color: #fff;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  /* 號碼按鈕 */
  .number-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(64px, 1fr));
    gap: 10px;
  }
  .num-btn {
    aspect-ratio: 1;
    border: 3px solid #ffd1dc;
    background: #fff;
    border-radius: 18px;
    font-size: 22px;
    font-weight: 900;
    color: #6a4a6e;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
  }
  .num-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 6px 14px rgba(255,150,180,.3);
  }
  .num-btn.selected {
    background: #ff9ab0;
    color: #fff;
    border-color: #ff9ab0;
    transform: scale(1.1);
    box-shadow: 0 6px 18px rgba(255,150,180,.5);
  }
  .num-btn.checked {
    background: #c8f0d0;
    border-color: #8ac8a0;
    color: #4a8a5e;
  }
  .num-btn.checked::after {
    content: attr(data-emoji);
    position: absolute;
  }
  .num-btn.checked .check-emoji {
    display: block;
    font-size: 14px;
    margin-top: -4px;
  }

  /* 情緒 */
  .emotion-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
  }
  .emo-btn {
    background: #fff;
    border: 4px solid transparent;
    border-radius: 24px;
    padding: 20px 12px;
    cursor: pointer;
    transition: all .25s;
    font-family: inherit;
    text-align: center;
  }
  .emo-btn .face {
    font-size: 64px;
    line-height: 1;
    display: block;
    margin-bottom: 8px;
    transition: transform .3s;
  }
  .emo-btn .label {
    font-size: 18px;
    font-weight: 900;
    color: #5a4a6e;
  }
  .emo-btn:hover .face { transform: scale(1.15) rotate(-5deg); }
  .emo-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 24px rgba(0,0,0,.1);
  }
  .emo-btn[data-mood="happy"] { background: #fff5b3; }
  .emo-btn[data-mood="angry"] { background: #ffc8b8; }
  .emo-btn[data-mood="sad"] { background: #c5e3f6; }
  .emo-btn[data-mood="nervous"] { background: #e2d3f4; }
  .emo-btn[data-mood="calm"] { background: #c8f0d0; }
  .emo-btn.disabled {
    opacity: .5;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* 打卡牆 */
  .wall {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
    min-height: 100px;
  }
  .sticky {
    background: #fff;
    border-radius: 14px;
    padding: 10px 8px;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0,0,0,.08);
    border: 2px solid #fff;
    position: relative;
    animation: pop .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .sticky .face { font-size: 32px; line-height: 1; }
  .sticky .nums { font-size: 12px; color: #8a7a9e; margin-top: 4px; }
  .sticky[data-mood="happy"] { background: #fffadc; border-color: #ffe89a; }
  .sticky[data-mood="angry"] { background: #ffe4dc; border-color: #ffaa90; }
  .sticky[data-mood="sad"] { background: #e0f0fa; border-color: #95c5e6; }
  .sticky[data-mood="nervous"] { background: #efe5fa; border-color: #c0a8e6; }
  .sticky[data-mood="calm"] { background: #e0f4e5; border-color: #a0d6b0; }

  /* 統計 */
  .stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat {
    background: #fff;
    border-radius: 16px;
    padding: 12px 8px;
    text-align: center;
    border: 3px solid;
  }
  .stat .ico { font-size: 32px; }
  .stat .lbl { font-size: 13px; color: #6a5a7e; }
  .stat .cnt { font-size: 24px; font-weight: 900; color: #4a3a5e; }

  /* 控制鈕 */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 18px;
  }
  .ctrl-btn {
    padding: 12px 24px;
    border-radius: 999px;
    border: none;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    transition: transform .2s;
  }
  .ctrl-btn:hover { transform: translateY(-2px); }
  .ctrl-btn.reset { background: #ffaa90; color: #fff; }
  .ctrl-btn.export { background: #95c5e6; color: #fff; }
  .ctrl-btn.config { background: #c8f0d0; color: #4a8a5e; }

  .empty-tip {
    text-align: center;
    color: #aa9abe;
    padding: 30px;
    font-size: 14px;
  }

  /* dialog */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(80,60,100,.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 24px;
    padding: 28px;
    max-width: 380px;
    width: 90%;
    text-align: center;
  }
  .modal h3 { margin-top: 0; color: #5a4a6e; }
  .modal input {
    padding: 10px 14px;
    border: 2px solid #ffd1dc;
    border-radius: 12px;
    font-size: 16px;
    width: 80px;
    text-align: center;
    font-family: inherit;
  }
  footer {
    text-align: center;
    padding: 20px;
    font-size: 13px;
    color: #8a7a9e;
  }
  footer a { color: #6a4a8e; font-weight: 700; }
</style>
</head>
<body>

<a class="home-btn" href="index.html">← 回主頁</a>

<header>
  <h1>😊 今天的心情打卡牆 🌈</h1>
  <p class="date" id="today"></p>
</header>

<main>

  <!-- 步驟提示 -->
  <div class="steps">
    <span class="step" id="step1">① 點自己的號碼</span>
    <span class="step" id="step2">② 選一個心情</span>
    <span class="step" id="step3">③ 貼上打卡牆 ✨</span>
  </div>

  <!-- 統計 -->
  <div class="section">
    <h2>📊 今天大家的心情</h2>
    <div class="stats" id="stats"></div>
  </div>

  <!-- 號碼 -->
  <div class="section">
    <h2><span class="num">1</span>選你的號碼</h2>
    <div class="number-grid" id="numberGrid"></div>
    <div style="text-align:center;margin-top:14px;color:#8a7a9e;font-size:13px;">
      💡 綠色 = 已經打卡過的號碼，粉紅 = 你正在選的號碼
    </div>
  </div>

  <!-- 情緒 -->
  <div class="section">
    <h2><span class="num">2</span>選你的心情</h2>
    <div class="emotion-grid" id="emotionGrid"></div>
  </div>

  <!-- 打卡牆 -->
  <div class="section">
    <h2><span class="num">3</span>今天的打卡牆</h2>
    <div class="wall" id="wall">
      <div class="empty-tip">還沒有人打卡，等等吧～ ☁️</div>
    </div>
    <div class="controls">
      <button class="ctrl-btn config" onclick="changeMaxNumber()">⚙️ 修改學生人數</button>
      <button class="ctrl-btn export" onclick="exportData()">💾 下載今天記錄</button>
      <button class="ctrl-btn reset" onclick="resetToday()">🔄 重置今天</button>
    </div>
  </div>
</main>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>修改學生人數</h3>
    <p style="color:#7a6a8e;">輸入 1～50 之間的數字</p>
    <input type="number" id="maxInput" min="1" max="50">
    <div style="margin-top:18px;display:flex;gap:10px;justify-content:center;">
      <button class="ctrl-btn config" onclick="saveMaxNumber()">儲存</button>
      <button class="ctrl-btn" style="background:#eee;color:#666;" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<footer>
  Made with ❤️ by <a href="https://www.smes.tyc.edu.tw/modules/tadnews/page.php?ncsn=11&nsn=16#a5" target="_blank" rel="noopener">阿凱老師</a> · 桃園市龍潭區石門國民小學
</footer>

<script>
const EMOTIONS = [
  { key: 'happy',   face: '😄', label: '開心' },
  { key: 'angry',   face: '😠', label: '生氣' },
  { key: 'sad',     face: '😢', label: '難過' },
  { key: 'nervous', face: '😬', label: '緊張' },
  { key: 'calm',    face: '😌', label: '平靜' },
];

const STORAGE_KEY = 'akai_emotion_v1';
const todayKey = () => new Date().toISOString().slice(0,10);

const state = loadState();
let selectedNum = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { maxNum: 30, records: {} };
    const obj = JSON.parse(raw);
    if (!obj.records) obj.records = {};
    if (!obj.maxNum) obj.maxNum = 30;
    return obj;
  } catch(e) { return { maxNum: 30, records: {} }; }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function todayRecords() {
  const k = todayKey();
  if (!state.records[k]) state.records[k] = {};
  return state.records[k];
}

function renderToday() {
  const d = new Date();
  const wk = ['日','一','二','三','四','五','六'];
  document.getElementById('today').textContent = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} (星期${wk[d.getDay()]})`;
}

function renderNumbers() {
  const grid = document.getElementById('numberGrid');
  const records = todayRecords();
  grid.innerHTML = '';
  for (let i = 1; i <= state.maxNum; i++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.dataset.num = i;
    btn.style.position = 'relative';
    const checked = records[i];
    if (checked) {
      btn.classList.add('checked');
      const emo = EMOTIONS.find(e => e.key === checked);
      btn.innerHTML = `${i}<span class="check-emoji">${emo?.face || ''}</span>`;
    } else {
      btn.textContent = i;
    }
    if (selectedNum === i) btn.classList.add('selected');
    btn.onclick = () => selectNumber(i);
    grid.appendChild(btn);
  }
}

function renderEmotions() {
  const grid = document.getElementById('emotionGrid');
  grid.innerHTML = '';
  EMOTIONS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emo-btn';
    btn.dataset.mood = e.key;
    btn.innerHTML = `<span class="face">${e.face}</span><span class="label">${e.label}</span>`;
    if (selectedNum === null) btn.classList.add('disabled');
    btn.onclick = () => clockIn(e.key);
    grid.appendChild(btn);
  });
}

function renderWall() {
  const wall = document.getElementById('wall');
  const records = todayRecords();
  const grouped = {};
  EMOTIONS.forEach(e => grouped[e.key] = []);
  Object.entries(records).forEach(([num, mood]) => {
    if (grouped[mood]) grouped[mood].push(parseInt(num));
  });

  // 統計
  const stats = document.getElementById('stats');
  stats.innerHTML = '';
  EMOTIONS.forEach(e => {
    const cnt = grouped[e.key].length;
    const div = document.createElement('div');
    div.className = 'stat';
    const colors = { happy:'#ffe89a', angry:'#ffaa90', sad:'#95c5e6', nervous:'#c0a8e6', calm:'#a0d6b0' };
    div.style.borderColor = colors[e.key];
    div.innerHTML = `
      <div class="ico">${e.face}</div>
      <div class="lbl">${e.label}</div>
      <div class="cnt">${cnt}</div>
    `;
    stats.appendChild(div);
  });

  // 牆
  const total = Object.keys(records).length;
  if (total === 0) {
    wall.innerHTML = '<div class="empty-tip">還沒有人打卡，等等吧～ ☁️</div>';
    return;
  }
  wall.innerHTML = '';
  EMOTIONS.forEach(e => {
    grouped[e.key].sort((a,b)=>a-b).forEach(n => {
      const card = document.createElement('div');
      card.className = 'sticky';
      card.dataset.mood = e.key;
      card.innerHTML = `<div class="face">${e.face}</div><div class="nums">${n} 號</div>`;
      card.title = '雙擊取消這位同學的打卡';
      card.ondblclick = () => {
        if (confirm(`要取消 ${n} 號的打卡嗎？`)) {
          delete todayRecords()[n];
          saveState();
          renderAll();
        }
      };
      wall.appendChild(card);
    });
  });
}

function selectNumber(n) {
  selectedNum = n;
  updateSteps();
  renderNumbers();
  renderEmotions();
}

function clockIn(moodKey) {
  if (selectedNum === null) return;
  todayRecords()[selectedNum] = moodKey;
  saveState();
  const done = selectedNum;
  selectedNum = null;
  updateSteps();
  renderAll();
  // 小慶祝
  flash(`✨ ${done} 號打卡成功！`);
}

function updateSteps() {
  document.getElementById('step1').classList.toggle('active', selectedNum === null);
  document.getElementById('step1').classList.toggle('done', selectedNum !== null);
  document.getElementById('step2').classList.toggle('active', selectedNum !== null);
}

function renderAll() {
  renderNumbers();
  renderEmotions();
  renderWall();
  updateSteps();
}

function resetToday() {
  if (!confirm('要清掉今天所有人的打卡嗎？（過去日期不會被刪除）')) return;
  state.records[todayKey()] = {};
  saveState();
  selectedNum = null;
  renderAll();
}

function exportData() {
  const records = todayRecords();
  const lines = [`📅 ${document.getElementById('today').textContent} 情緒打卡記錄`, ''];
  EMOTIONS.forEach(e => {
    const nums = Object.entries(records).filter(([_,m])=>m===e.key).map(([n])=>n).sort((a,b)=>a-b);
    lines.push(`${e.face} ${e.label}（${nums.length}人）：${nums.join(', ') || '—'}`);
  });
  lines.push('', `總打卡：${Object.keys(records).length} / ${state.maxNum} 人`);
  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `情緒打卡_${todayKey()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

function changeMaxNumber() {
  document.getElementById('maxInput').value = state.maxNum;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal() { document.getElementById('modalBg').classList.remove('show'); }
function saveMaxNumber() {
  const v = parseInt(document.getElementById('maxInput').value);
  if (isNaN(v) || v < 1 || v > 50) { alert('請輸入 1~50 之間的數字'); return; }
  state.maxNum = v;
  saveState();
  closeModal();
  renderAll();
}

function flash(text) {
  const el = document.createElement('div');
  el.textContent = text;
  el.style.cssText = `
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: #ff9ab0; color: #fff; padding: 12px 24px;
    border-radius: 999px; font-weight: 700; z-index: 300;
    box-shadow: 0 8px 24px rgba(255,150,180,.4);
    animation: pop .4s; font-size: 16px;
  `;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

renderToday();
renderAll();
</script>

</body>
</html>
