<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班級積點榜 · 教室小幫手</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffd23f">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<meta property="og:type" content="website">
<meta property="og:url" content="https://cagoooo.github.io/coolclass/">
<meta property="og:title" content="班級積點榜 · 教室小幫手">
<meta property="og:description" content="給學生 / 小組加減分，週末公布排行。">
<meta property="og:image" content="https://cagoooo.github.io/coolclass/og-image.png">
<meta property="og:locale" content="zh_TW">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Fraunces:opsz,ital,wght@9..144,1,500;9..144,1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="crayon.css">
<style>
  .leaderboard {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 10px;
  }
  .stu {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: var(--rad-sm);
    padding: 10px;
    text-align: center;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform .15s;
    position: relative;
  }
  .stu:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--ink); }
  .stu .rank {
    position: absolute; top: -10px; left: -10px;
    background: var(--ink); color: var(--y);
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-style: italic; font-weight: 900;
    font-size: 16px;
    border: 3px solid #fff;
  }
  .stu.medal-1 { background: linear-gradient(180deg, #fff5b3 0%, #fff 60%); }
  .stu.medal-1 .rank { background: var(--y); color: var(--ink); }
  .stu.medal-2 { background: linear-gradient(180deg, #e8e8e8 0%, #fff 60%); }
  .stu.medal-3 { background: linear-gradient(180deg, #ffe0c8 0%, #fff 60%); }
  .stu .num {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 14px; color: var(--muted); font-weight: 700;
  }
  .stu .name {
    font-weight: 900; font-size: 18px; margin: 2px 0 8px;
  }
  .stu .score {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 48px; font-weight: 900; line-height: 1;
    color: var(--ink);
  }
  .stu .score.minus { color: var(--r); }
  .stu .score.zero { color: var(--mute-2); }
  .stu .bar {
    display: flex; gap: 4px; margin-top: 8px; justify-content: center;
  }
  .stu .bar button {
    border: 2px solid var(--ink);
    background: #fff;
    width: 36px; height: 32px;
    border-radius: var(--rad-sm);
    cursor: pointer; font-weight: 900;
    box-shadow: 2px 2px 0 var(--ink);
    font-family: inherit; font-size: 14px;
    color: var(--ink);
  }
  .stu .bar button:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
  .stu .bar .plus { background: var(--g); color: #fff; }
  .stu .bar .minus { background: var(--r); color: #fff; }
  .stu .last {
    font-size: 10px; color: var(--mute-2); margin-top: 4px;
    font-family: 'Fraunces', serif; font-style: italic;
  }

  /* 群組模式 */
  .groups-board {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
  }
  .grp {
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: var(--rad);
    padding: 18px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .grp .name { font-weight: 900; font-size: 22px; margin-bottom: 8px; }
  .grp .score {
    font-family: 'Fraunces', serif; font-style: italic;
    font-weight: 900; font-size: 64px; line-height: 1;
    margin: 8px 0;
  }
  .grp .bar { display: flex; gap: 6px; justify-content: center; }
  .grp .bar button {
    flex: 1;
    border: 2px solid var(--ink);
    background: #fff;
    padding: 8px;
    cursor: pointer; font-weight: 900;
    box-shadow: 2px 2px 0 var(--ink);
    font-family: inherit;
    border-radius: var(--rad-sm);
    color: var(--ink);
  }
  .grp .bar .plus { background: var(--g); color: #fff; }
  .grp .bar .minus { background: var(--r); color: #fff; }
</style>
<script src="tweaks.js"></script>
</head>
<body>

<div class="bg-deco" aria-hidden="true">
  <span class="blob blob-y"></span>
  <span class="blob blob-g"></span>
  <span class="dots dots-1"></span>
</div>

<a class="home-btn" href="index.html">← 回主頁</a>

<div class="wrap">

  <section class="page-hero">
    <div>
      <span class="eyebrow">POINTS · 班級積點</span>
      <h1>記錄孩子的<em>努力與善行</em>，<br>累積成週末小驚喜。</h1>
      <p class="sub">
        <span class="badge" id="classBadge">— 人</span>
        <span class="badge">點 +1 / -1 加減分</span>
        <span class="badge">可切換個人 / 小組</span>
      </p>
    </div>
    <div class="right-aux">
      <span class="big" id="topScore">—</span>
      <span class="sml">分 · 目前最高</span>
    </div>
  </section>

  <!-- 模式切換 + 操作 -->
  <section class="block">
    <div class="block-head">
      <div class="step">⚙</div>
      <h2>顯示模式</h2>
    </div>
    <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;">
      <div class="mode-pick" id="modePick">
        <button data-mode="individual" class="on">個人積點</button>
        <button data-mode="group">小組積點</button>
      </div>
      <span style="color:var(--muted);font-size:13px;" id="modeHint">＝ 每位學生獨立計分</span>
      <span style="flex:1;"></span>
      <a class="btn sm" href="roster.html">👥 編輯名單</a>
      <a class="btn sm" href="grouper.html">👥 去分組</a>
      <button class="btn r sm" onclick="resetAll()">🔄 全部歸零</button>
    </div>
  </section>

  <style>
    .mode-pick {
      display: inline-flex; gap: 0;
      border: 3px solid var(--ink);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: 3px 3px 0 var(--ink);
    }
    .mode-pick button {
      padding: 8px 16px;
      border: none;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      color: var(--ink);
      font-size: 13px;
    }
    .mode-pick button + button { border-left: 3px solid var(--ink); }
    .mode-pick button.on { background: var(--ink); color: var(--paper); }
  </style>

  <!-- 個人榜 -->
  <section class="block" id="individualBoard">
    <div class="block-head">
      <div class="step">👤</div>
      <h2>個人積點榜</h2>
      <span class="tail">按分數由高到低排序</span>
    </div>
    <div class="leaderboard" id="indList"></div>
  </section>

  <!-- 小組榜 -->
  <section class="block" id="groupBoard" style="display:none;">
    <div class="block-head">
      <div class="step">👥</div>
      <h2>小組積點榜</h2>
      <span class="tail">使用「隨機分組」的最近一次結果</span>
    </div>
    <div class="groups-board" id="grpList">
      <div class="empty">尚未分組。<br><a class="btn sm" href="grouper.html">先去分組</a></div>
    </div>
  </section>

  <footer class="f">
    Made with ♥ by <a href="https://www.smes.tyc.edu.tw/modules/tadnews/page.php?ncsn=11&nsn=16#a5" target="_blank" rel="noopener">阿凱老師</a> · 桃園市龍潭區石門國民小學
    <div class="ver">© 2026 · v3 "Crayon Pop"</div>
  </footer>
</div>

<div class="toast" id="toast">+1</div>

<script src="sw-update.js" defer></script>
<script src="roster.js"></script>
<script>
const STORAGE_KEY = 'akai_points_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return {
      mode: obj.mode || 'individual',
      points: obj.points || {},        // { "1": 5, "2": -1 }
      groupPoints: obj.groupPoints || {}, // { "0": 10, "1": -2 }
      lastChange: obj.lastChange || {},   // { "1": iso }
    };
  } catch { return { mode: 'individual', points: {}, groupPoints: {}, lastChange: {} }; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = loadState();

function renderClassBadge() {
  const r = AkaiRoster.load();
  document.getElementById('classBadge').textContent = r.className ? `🏫 ${r.className} · ${r.count} 人` : `👥 ${r.count || 30} 人`;
}

function syncMode() {
  document.querySelectorAll('#modePick button').forEach(b =>
    b.classList.toggle('on', b.dataset.mode === state.mode));
  document.getElementById('modeHint').textContent =
    state.mode === 'individual' ? '＝ 每位學生獨立計分' : '＝ 使用「隨機分組」最近一次結果';
  document.getElementById('individualBoard').style.display = state.mode === 'individual' ? '' : 'none';
  document.getElementById('groupBoard').style.display = state.mode === 'group' ? '' : 'none';
}

function renderIndividual() {
  const r = AkaiRoster.load();
  const n = r.count || 30;
  const all = [];
  for (let i = 1; i <= n; i++) {
    all.push({
      num: i,
      name: AkaiRoster.getName(i) || '—',
      score: state.points[String(i)] || 0,
      last: state.lastChange[String(i)] || null,
    });
  }
  all.sort((a, b) => b.score - a.score || a.num - b.num);

  // 找最高分
  document.getElementById('topScore').textContent = all[0] ? all[0].score : '—';

  const list = document.getElementById('indList');
  list.innerHTML = '';
  all.forEach((stu, idx) => {
    const rank = idx + 1;
    const card = document.createElement('div');
    card.className = 'stu';
    if (rank === 1 && stu.score > 0) card.classList.add('medal-1');
    else if (rank === 2 && stu.score > 0) card.classList.add('medal-2');
    else if (rank === 3 && stu.score > 0) card.classList.add('medal-3');
    const scoreCls = stu.score > 0 ? '' : (stu.score < 0 ? 'minus' : 'zero');
    card.innerHTML = `
      <div class="rank">${rank}</div>
      <div class="num">${stu.num} 號</div>
      <div class="name">${escapeHtml(stu.name)}</div>
      <div class="score ${scoreCls}">${stu.score > 0 ? '+' : ''}${stu.score}</div>
      <div class="bar">
        <button class="minus" title="-1">−</button>
        <button class="plus" title="+1">+</button>
        <button title="+5">+5</button>
      </div>
      ${stu.last ? `<div class="last">最後加分：${timeAgo(stu.last)}</div>` : ''}
    `;
    const [minus, plus, plus5] = card.querySelectorAll('button');
    minus.onclick = () => changePoint(stu.num, -1);
    plus.onclick = () => changePoint(stu.num, 1);
    plus5.onclick = () => changePoint(stu.num, 5);
    list.appendChild(card);
  });
}

function changePoint(num, delta) {
  const k = String(num);
  state.points[k] = (state.points[k] || 0) + delta;
  state.lastChange[k] = new Date().toISOString();
  saveState();
  renderIndividual();
  flash(`${num} 號 ${delta > 0 ? '+' : ''}${delta}`);
}

function renderGroup() {
  const list = document.getElementById('grpList');
  let g;
  try { g = JSON.parse(localStorage.getItem('akai_grouper_v1') || '{}'); } catch { g = {}; }
  const groups = g.lastGroups || [];
  if (groups.length === 0) {
    list.innerHTML = '<div class="empty">尚未分組。<br><a class="btn sm" href="grouper.html">先去分組</a></div>';
    return;
  }
  const colors = ['#ff97c5', '#ff9d4d', '#ffd23f', '#6bcb77', '#4ec5d8', '#b070ff', '#ff6b6b', '#5aa080', '#e0a040', '#7a8ad4'];
  list.innerHTML = '';
  groups.forEach((mems, i) => {
    const score = state.groupPoints[String(i)] || 0;
    const c = colors[i % colors.length];
    const card = document.createElement('div');
    card.className = 'grp';
    card.style.borderColor = c;
    card.style.background = `linear-gradient(180deg, ${c}30 0%, #fff 100%)`;
    card.style.boxShadow = `5px 5px 0 ${c}`;
    card.innerHTML = `
      <div class="name">第 ${i+1} 組</div>
      <div style="font-size:12px;color:var(--muted);">${mems.length} 人</div>
      <div class="score" style="color:${score >= 0 ? c.replace(/^#/,'') === c.replace(/^#/,'') ? 'var(--ink)' : 'var(--ink)' : 'var(--r)'};">${score > 0 ? '+' : ''}${score}</div>
      <div class="bar">
        <button class="minus">−</button>
        <button class="plus">+</button>
        <button style="font-size:13px;">+5</button>
      </div>
    `;
    const [minus, plus, plus5] = card.querySelectorAll('button');
    minus.onclick = () => { state.groupPoints[String(i)] = (state.groupPoints[String(i)] || 0) - 1; saveState(); renderGroup(); flash(`第 ${i+1} 組 −1`); };
    plus.onclick = () => { state.groupPoints[String(i)] = (state.groupPoints[String(i)] || 0) + 1; saveState(); renderGroup(); flash(`第 ${i+1} 組 +1`); };
    plus5.onclick = () => { state.groupPoints[String(i)] = (state.groupPoints[String(i)] || 0) + 5; saveState(); renderGroup(); flash(`第 ${i+1} 組 +5`); };
    list.appendChild(card);
  });
}

document.querySelectorAll('#modePick button').forEach(b => {
  b.onclick = () => {
    state.mode = b.dataset.mode;
    saveState();
    syncMode();
    render();
  };
});

function resetAll() {
  if (!confirm('要把目前模式的所有積點歸零嗎？')) return;
  if (state.mode === 'individual') {
    state.points = {};
    state.lastChange = {};
  } else {
    state.groupPoints = {};
  }
  saveState();
  render();
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return '剛剛';
  if (mins < 60) return `${mins} 分鐘前`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs} 小時前`;
  const days = Math.floor(hrs / 24);
  return `${days} 天前`;
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function flash(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(window._fT);
  window._fT = setTimeout(() => t.classList.remove('show'), 800);
}

function render() {
  renderClassBadge();
  if (state.mode === 'individual') renderIndividual();
  else renderGroup();
}

window.addEventListener('storage', (e) => {
  if (e.key === 'akai_roster_v1' || e.key === 'akai_grouper_v1') render();
});
window.addEventListener('focus', render);

syncMode();
render();
</script>

</body>
</html>
